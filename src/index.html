function renderTl(rows){
  const list=document.getElementById('tlList');
  const reviewField=getReviewFieldDef_();
  const reviewIdx=myFields.findIndex(field=>field&&field.type==='review');

  // フォーカス中フィールドのインデックスを取得
  const focusIdx=myFields.findIndex(f=>f.key===focusField);
  const visibleIdxs=getTimelineVisibleIndexes(focusIdx);

  const posted=rows
    .filter(r=>visibleIdxs.some(idx=>r.customs[idx]))
    .sort(compareTimelineRows_);

  if(!posted.length){
    list.innerHTML='<div class="tl-empty">まだだれもかいていないよ✨</div>';
    return;
  }

  list.innerHTML=posted.map(r=>{
    const fieldEntries=myFields
      .map((f,i)=>({
        idx:i,
        label:f.label||`項目${i+1}`,
        value:r.customs[i]||'',
      }))
      .filter(item=>visibleIdxs.includes(item.idx) && item.value);
    const sortedEntries=fieldEntries.sort((a,b)=>{
      if(a.idx===focusIdx) return -1;
      if(b.idx===focusIdx) return 1;
      return a.idx-b.idx;
    });
    const reviewText=reviewIdx>=0 ? String(r?.customs?.[reviewIdx] || '') : '';
    const reviewCount=getRowReviewLength_(r, reviewField, reviewIdx);
    const reviewFieldIdx=sortedEntries.findIndex(item=>isReviewField(myFields[item.idx]));
    const medalHtml=renderMedal(r.medal,r.medalColor);
    return `
    <div class="tl-card ${r.num===myNum?'is-me':''} ${r.submitted?'submitted':''}">
      <div class="tl-top">
        <div class="tl-num">${r.num}</div>
        <span class="tl-name">${esc(r.name)||r.num+'ばん'} さん</span>
        <span class="tl-medal-wrap">${medalHtml}</span>
      </div>
      <div class="tl-fields">${sortedEntries.map(item=>`
        <div class="tl-field ${item.idx===focusIdx?'is-focus':''}">
          <div class="tl-field-label">${esc(item.label)}${item.idx===sortedEntries[reviewFieldIdx]?.idx && reviewCount>0 ? `<span class="tl-chip count-chip">${reviewCount}もじ</span>` : ''}</div>
          <div class="tl-text">${item.idx===sortedEntries[reviewFieldIdx]?.idx ? renderInlineChipText_(normalizeDisplayText_(item.value), extractReviewChipLabelsFromText_(reviewText, reviewField)) : esc(normalizeDisplayText_(item.value)).replace(/\n/g,'<br>')}</div>
        </div>
      `).join('')}</div>
    </div>`;
  }).join('');
}

function getRowReviewLength_(row, reviewField, reviewIdx){
  if(reviewIdx<0) return 0;
  return stripReviewHintLines_(String(row?.customs?.[reviewIdx] || ''), reviewField).length;
}

function getTimelineMedalScore_(medal){
  const value=String(medal||'').trim();
  if(!value) return 999;
  if(value==='🥇') return 1;
  if(value==='🥈') return 2;
  if(value==='🥉') return 3;
  const numeric=parseInt(value.replace('th',''),10);
  return Number.isFinite(numeric) ? numeric + 3 : 999;
}

function getTimelineTextVolume_(row){
  return (row.customs||[]).reduce((sum,value)=>sum+String(value||'').trim().length,0);
}

function compareTimelineRows_(a,b){
  const submittedDiff=Number(Boolean(b&&b.submitted))-Number(Boolean(a&&a.submitted));
  if(submittedDiff) return submittedDiff;
  const medalDiff=getTimelineMedalScore_(a&&a.medal)-getTimelineMedalScore_(b&&b.medal);
  if(medalDiff) return medalDiff;
  const textDiff=getTimelineTextVolume_(b)-getTimelineTextVolume_(a);
  if(textDiff) return textDiff;
  return Number(a&&a.num||0)-Number(b&&b.num||0);
}

function getTimelineVisibleIndexes(focusIdx){
  if(submitted){
    const submittedIdxs=myFields
      .map((field,idx)=>({field,idx}))
      .filter(({field})=>isReviewField(field)||isUnderstandingField(field))
      .map(({idx})=>idx);
    return submittedIdxs.length?submittedIdxs:myFields.map((_,idx)=>idx);
  }
  const forcedIdx=teacherTimelineFieldKey?myFields.findIndex(f=>String(f.key||'')===String(teacherTimelineFieldKey)): -1;
  if(forcedIdx>=0){
    const forcedField=myFields[forcedIdx]||{};
    const pairMode=isReviewField(forcedField)||isUnderstandingField(forcedField);
    if(!pairMode) return [forcedIdx];
    const forcedIdxs=myFields
      .map((field,idx)=>({field,idx}))
      .filter(({field})=>isReviewField(field)||isUnderstandingField(field))
      .map(({idx})=>idx);
    return forcedIdxs.length?forcedIdxs:[forcedIdx];
  }
  if(focusIdx<0){
    return myFields.map((_,idx)=>idx);
  }
  const focusFieldDef=myFields[focusIdx]||{};
  const pairMode=isReviewField(focusFieldDef)||isUnderstandingField(focusFieldDef);
  if(!pairMode) return [focusIdx];
  const idxs=myFields
    .map((field,idx)=>({field,idx}))
    .filter(({field})=>isReviewField(field)||isUnderstandingField(field))
    .map(({idx})=>idx);
  return idxs.length?idxs:[focusIdx];
}

function isReviewField(field){
  return field?.type==='review';
}

function isUnderstandingField(field){
  const text=`${field?.key||''} ${field?.label||''}`.toLowerCase();
  return /理解|りかい|わか|自己評価|じこひょうか|達成|たっせい|self|score|check/.test(text);
}

function renderMedal(medal,color){
  if(!medal) return '';
  if(['🥇','🥈','🥉'].includes(medal)) return medal;
  const num=medal.replace('th','');
  return `<span class="medal-num" style="background:${color||'#999'}">${num}</span>`;
}

// =====================================
//  AIコメント
// =====================================
function showAIBox(comment,rank,medal,medalColor){
  document.getElementById('aiComment').textContent=comment||'';
  document.getElementById('myRank').textContent=rank?'ランク：'+rank:'';
  const mb=document.getElementById('myMedal');
  if(['🥇','🥈','🥉'].includes(medal)){
    mb.textContent=medal;
  } else if(medal){
    const num=medal.replace('th','');
    mb.innerHTML=`<span class="medal-num" style="background:${medalColor||'#999'};font-size:20px;width:36px;height:36px;">${num}</span>`;
  } else { mb.textContent=''; }
  document.getElementById('aiBox').style.display='block';
}

function setStudentCommentTitle_(hasAiComment){
  const el=document.getElementById('studentAiCommentTitle');
  if(!el) return;
  el.textContent=hasAiComment ? '🤖 AIせんせいからのコメント' : '💬 せんせいからのコメント';
}

function scrollToAiCommentBox_(){
  const box=document.getElementById('aiBox');
  if(!box) return;
  setTimeout(()=>{
    const pane=box.closest('.pane-form');
    if(pane&&typeof pane.scrollTo==='function'){
      pane.scrollTo({top:Math.max(0,box.offsetTop-12),behavior:'smooth'});
      return;
    }
    box.scrollIntoView({behavior:'smooth',block:'start'});
  },180);
}

function showAiArrivalBanner_(row){
  const banner=document.getElementById('aiArrivalBanner');
  if(!banner) return;
  const key=[String(row?.aiProcessedAt||''),String(row?.comment||'').trim()].join('|');
  if(key && key===lastAiArrivalBannerKey) return;
  lastAiArrivalBannerKey=key;
  if(aiArrivalBannerTimer){
    clearTimeout(aiArrivalBannerTimer);
    aiArrivalBannerTimer=null;
  }
  banner.classList.add('show');
  aiArrivalBannerTimer=setTimeout(()=>hideAiArrivalBanner_(),5000);
}

function hideAiArrivalBanner_(){
  const banner=document.getElementById('aiArrivalBanner');
  if(!banner) return;
  banner.classList.remove('show');
  if(aiArrivalBannerTimer){
    clearTimeout(aiArrivalBannerTimer);
    aiArrivalBannerTimer=null;
  }
}

function handleAiArrivalBannerClick(){
  hideAiArrivalBanner_();
  highlightAiBox_();
  scrollToAiCommentBox_();
}

function highlightAiBox_(){
  const box=document.getElementById('aiBox');
  if(!box) return;
  box.classList.remove('arrival-highlight');
  void box.offsetWidth;
  box.classList.add('arrival-highlight');
  setTimeout(()=>box.classList.remove('arrival-highlight'),1900);
}

// =====================================
//  画面切替 / Toast / esc
// =====================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const el=document.getElementById(id);
  el.style.display='flex';el.classList.add('active');
  if(id==='screen-select') syncStudentSelectViewportVar_();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function truncateText_(text, maxLen){
  const value=String(text||'').trim();
  if(!maxLen||value.length<=maxLen) return value;
  return value.slice(0,Math.max(0,maxLen-1))+'…';
}

function normalizeDisplayText_(text){
  return String(text||'').replace(/^[・\-●]\s*/gm,'').trim();
}
syncStudentSelectViewportVar_();
window.addEventListener('resize', syncStudentSelectViewportVar_);
window.addEventListener('orientationchange', syncStudentSelectViewportVar_);
if(window.visualViewport && typeof window.visualViewport.addEventListener==='function'){
  window.visualViewport.addEventListener('resize', syncStudentSelectViewportVar_);
  window.visualViewport.addEventListener('scroll', syncStudentSelectViewportVar_);
}
