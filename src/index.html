*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);}
.screen{display:none;flex-direction:column;}
.screen.active{display:flex;}
.system-banner{
  position:sticky;top:0;z-index:980;display:none;padding:10px 14px;
  font-size:13px;line-height:1.5;font-weight:bold;
}
.system-banner.show{display:block;}
.system-banner.info{background:#FFF8E1;color:#8D6E63;border-bottom:2px solid #FFE082;}
.system-banner.warn{background:#FFF3E0;color:#BF6000;border-bottom:2px solid #FFCC80;}
.system-banner.stop{background:#FFEBEE;color:#B71C1C;border-bottom:2px solid #EF9A9A;}

/* 番号選択 */
#screen-select{
  align-items:center;justify-content:center;
  min-height:var(--student-select-vh,100dvh);
  padding:calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));
  overflow:hidden;
}
.student-select-panel{
  width:min(96vw,980px);
  max-height:calc(var(--student-select-vh,100dvh) - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 24px);
  padding:20px min(3.2vw,28px);
  border-radius:26px;
  background:rgba(255,255,255,.96);
  box-shadow:0 18px 38px rgba(26,35,126,.14);
  border:1px solid rgba(215,227,248,.9);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.student-select-scroll{
  display:flex;
  flex-direction:column;
  min-height:0;
  overflow:auto;
  padding-right:2px;
}
.brand-lockup{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:8px;}
.brand-mascot{
  display:inline-block;background-image:var(--mascot);background-size:cover;background-position:center;background-repeat:no-repeat;border-radius:50%;
  box-shadow:0 4px 14px rgba(26,35,126,.18);
}
.brand-mascot-lg{width:96px;height:96px;}
.brand-mascot-sm{width:34px;height:34px;flex:0 0 34px;}
.sel-title{font-size:26px;font-weight:bold;margin-bottom:4px;text-align:center;}
.sel-sub{font-size:14px;color:var(--muted);margin-bottom:16px;text-align:center;line-height:1.7;}
.resume-box{
  width:100%;max-width:none;margin:0 auto 14px;padding:12px 14px;border-radius:14px;
  background:#FFF8E1;border:2px solid #FFE082;box-shadow:var(--sh);display:none;
}
.resume-title{font-size:13px;font-weight:bold;color:#8D6E63;}
.resume-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.resume-btn{
  border:none;border-radius:999px;padding:9px 14px;font-family:var(--font);font-size:12px;font-weight:bold;cursor:pointer;
}
.resume-btn.primary{background:linear-gradient(135deg,var(--green),#388E3C);color:#fff;}
.resume-btn.secondary{background:#E3F2FD;color:#4E6F8B;}
.num-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:8px;width:100%;max-width:none;}
@media(min-width:768px) and (orientation:landscape){
  .student-select-panel{width:min(96vw,1120px);padding:24px 28px;}
  .num-grid{grid-template-columns:repeat(auto-fit,minmax(82px,1fr));gap:10px;}
}
@media(max-width:480px){.num-grid{grid-template-columns:repeat(auto-fit,minmax(60px,1fr));}}
.num-btn{
  background:#fff;border:2.5px solid var(--sky);border-radius:12px;
  font-size:18px;font-weight:bold;color:var(--sky);aspect-ratio:1;cursor:pointer;
  box-shadow:var(--sh);display:flex;align-items:center;justify-content:center;
  transition:transform .12s,background .12s;
}
.num-btn:active{transform:scale(.9);background:var(--sky);color:#fff;}
.num-btn.selected,.num-btn.loading{background:var(--sky);color:#fff;}
.num-btn.loading{opacity:.78;position:relative;font-size:12px;}
.num-btn.loading::after{
  content:"";position:absolute;right:7px;bottom:7px;width:8px;height:8px;border-radius:50%;
  border:2px solid rgba(255,255,255,.7);border-top-color:transparent;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* 時間目選択 */
#screen-period{align-items:center;justify-content:center;min-height:100vh;padding:24px 16px;}
.period-title{font-size:22px;font-weight:bold;text-align:center;margin-bottom:6px;}
.period-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:20px;}
.period-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:400px;width:100%;}
.period-btn{
  background:#fff;border:2.5px solid var(--green);border-radius:12px;
  font-size:16px;font-weight:bold;color:var(--green);aspect-ratio:1;cursor:pointer;
  box-shadow:var(--sh);display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;transition:transform .12s,background .12s;
}
.period-btn:active{transform:scale(.9);background:var(--green);color:#fff;}
.period-btn .sub{font-size:10px;font-weight:normal;opacity:.7;}

/* ヘッダー */
.app-header{
  background:linear-gradient(135deg,var(--sky),#0288D1);color:#fff;
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.2);position:sticky;top:0;z-index:200;
}
.app-header h1{font-size:15px;letter-spacing:.03em;}
.student-brand{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.student-brand-name{display:inline-flex;align-items:center;}
.app-header .meta{font-size:11px;opacity:.85;margin-top:1px;}
.auto-ctrl{display:flex;align-items:center;gap:5px;font-size:11px;}

/* 2分割 */
.split{display:flex;flex:1;overflow:hidden;}
@media(max-width:700px){
  .split{flex-direction:column;}
  .pane-tl{width:100%!important;max-height:36vh;border-right:none;border-bottom:2px solid #e0e0e0;}
  .student-top-tabs{justify-content:flex-start;margin-top:6px;}
  .brand-mascot-lg{width:82px;height:82px;}
}
.pane-tl{width:38%;flex-shrink:0;overflow-y:auto;padding:10px;border-right:2px solid #e0e0e0;background:#F0F7FF;}
.pane-form{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}

/* タイムライン */
.pane-label{font-size:11px;font-weight:bold;color:var(--muted);letter-spacing:.06em;
  margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.pane-label-actions{margin-left:auto;display:flex;align-items:center;gap:6px;}
.timeline-retry-btn{
  border:none;border-radius:999px;padding:5px 10px;
  background:#E3F2FD;color:#1976D2;font-family:var(--font);font-size:10px;font-weight:bold;cursor:pointer;
}
.timeline-retry-btn[hidden]{display:none!important;}
.timeline-error-note{font-size:10px;color:#C62828;margin:0 0 8px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--coral);
  animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.tl-card{
  background:#fff;border-radius:10px;padding:9px 11px;margin-bottom:7px;
  box-shadow:0 2px 6px rgba(0,0,0,.07);border-left:4px solid #B0BEC5;
}
.tl-card.submitted{border-left-color:var(--green);}
.tl-card.is-me{border-left-color:var(--sky);background:#E3F2FD;}
.tl-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.tl-num{min-width:26px;height:26px;border-radius:50%;background:var(--sky);
  color:#fff;font-size:12px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tl-card.is-me .tl-num,.tl-card.submitted .tl-num{background:var(--green);}
.tl-name{font-size:11px;color:var(--muted);}
.tl-rank{font-size:10px;font-weight:bold;color:var(--purple);margin-left:2px;}
.tl-medal-wrap{margin-left:auto;font-size:16px;}
.medal-num{display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;color:#fff;font-size:11px;font-weight:bold;}
.tl-text{font-size:12px;line-height:1.5;word-break:break-all;color:#37474F;}
.tl-fields{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.tl-field{font-size:12px;line-height:1.5;color:#37474F;background:#F8FBFF;border-radius:8px;padding:6px 8px;}
.tl-field.is-focus{background:#E3F2FD;border:1px solid #90CAF9;}
.tl-field-label{font-size:10px;font-weight:bold;color:var(--muted);margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tl-chip-row,.entry-chip-row,.history-chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.tl-chip,.entry-chip{
  display:inline-flex;align-items:center;gap:4px;max-width:100%;
  padding:3px 8px;border-radius:999px;background:#E8F5E9;color:#2E7D32;
  font-size:10px;font-weight:bold;line-height:1.4;
}
.entry-chip-row{margin:4px 0 8px;}
.entry-chip{background:#FFF3E0;color:#BF6000;font-size:11px;}
.count-chip{background:#E8F5E9 !important;color:#2E7D32 !important;}
.inline-chip{
  display:inline-flex;align-items:center;vertical-align:middle;margin:1px 4px 1px 0;
  padding:1px 9px;border-radius:999px;background:transparent;color:#1976D2;
  border:1.8px solid #64B5F6;
  font-size:.92em;font-weight:bold;line-height:1.5;
}
.tl-empty{text-align:center;color:var(--muted);font-size:12px;padding:14px;}

/* フォーム */
.card{background:var(--card);border-radius:var(--r);padding:13px 15px;box-shadow:var(--sh);}
.card-title{font-size:12px;font-weight:bold;color:var(--muted);margin-bottom:7px;
  display:flex;align-items:center;gap:4px;}
.prev-box{font-size:12px;line-height:1.6;color:#546E7A;
  background:#ECEFF1;border-radius:8px;padding:9px 11px;}
.student-top-tabs{display:flex;justify-content:flex-end;gap:8px;margin:8px 0 0;}
.student-view-tabs{
  display:flex;gap:8px;flex-wrap:wrap;
}
.student-view-tab{
  border:none;border-radius:999px;padding:9px 14px;font-family:var(--font);
  font-size:12px;font-weight:bold;background:#E3F2FD;color:#5C6F82;cursor:pointer;
}
.student-view-tab.active{background:linear-gradient(135deg,var(--sky),#0288D1);color:#fff;}
.student-view-tab:disabled{opacity:.5;cursor:default;}
.tab-panel{display:none;flex-direction:column;gap:10px;}
.tab-panel.active{display:flex;}
.choice-group{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.choice-btn{
  min-height:52px;padding:10px 8px;border:2px solid #CFD8DC;border-radius:12px;
  background:#fff;color:#546E7A;cursor:pointer;text-align:center;font-size:13px;font-weight:bold;line-height:1.4;
}
.choice-btn.selected{border-color:var(--sky);background:#E3F2FD;color:var(--sky);}
.choice-btn.missing{border-color:#E53935;background:#FFEBEE;}

/* フィールドラベル */
.field-wrap{margin-bottom:10px;}
.field-label{font-size:13px;font-weight:bold;margin-bottom:4px;display:block;}
.field-hint{font-size:11px;font-weight:normal;color:var(--muted);margin-left:4px;}
.field-required{
  display:inline-flex;align-items:center;margin-left:6px;padding:2px 7px;border-radius:999px;
  background:#FFEBEE;color:#C62828;font-size:10px;font-weight:bold;vertical-align:middle;
}
.field-wrap.understanding-wrap{
  background:#F8FBFF;border:1.5px solid #D6EAF8;
  border-radius:12px;padding:10px 10px 8px;margin-bottom:12px;
}
.field-wrap.understanding-wrap .field-label{font-size:14px;margin-bottom:6px;color:var(--ink);}
.understanding-group{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.understanding-btn{
  min-height:58px;padding:10px 8px;border:2px solid #FFE082;border-radius:12px;
  background:#fff;color:#6D4C41;cursor:pointer;text-align:center;font-size:13px;font-weight:bold;line-height:1.4;
}
.understanding-btn{border-color:#CFD8DC;color:#546E7A;}
.understanding-btn.selected{border-color:var(--sky);background:#E3F2FD;color:var(--sky);}
.understanding-btn.missing{border-color:#E53935;background:#FFEBEE;}
@media(max-width:520px){.understanding-group{grid-template-columns:1fr;}.choice-group{grid-template-columns:1fr;}}

/* テキストエリア */
textarea.f,select.f{
  width:100%;border:2px solid #CFD8DC;border-radius:9px;
  padding:9px 11px;font-family:var(--font);font-size:15px;color:var(--ink);
  background:#F9FAFB;resize:vertical;transition:border-color .2s;-webkit-appearance:none;
}
textarea.f:focus,select.f:focus{outline:none;border-color:var(--sky);background:#fff;}
textarea.f{min-height:70px;}

/* ラジオボタン */
.radio-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;}
.radio-btn{
  flex:1;min-width:80px;padding:10px 6px;border:2px solid #CFD8DC;border-radius:10px;
  text-align:center;cursor:pointer;font-size:13px;font-weight:bold;
  color:var(--muted);background:#F9FAFB;transition:.15s;
}
.radio-btn.selected{border-color:var(--sky);color:var(--sky);background:#E3F2FD;}
.radio-btn:active{transform:scale(.95);}

/* ふりかえりヒント */
.hints-wrap{
  display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;
}
.hint-tag{
  font-size:11px;padding:3px 9px;border-radius:12px;
  background:#E3F2FD;color:var(--sky);cursor:pointer;border:1.5px solid var(--sky);
  transition:.12s;
}
.hint-tag:active{background:var(--sky);color:#fff;}
.hint-tag.used{background:#E8F5E9;color:var(--green);border-color:var(--green);}

/* ボタン */
.btn-row{display:flex;gap:8px;margin-top:6px;}
.btn{
  flex:1;border:none;border-radius:11px;padding:13px;
  font-size:15px;font-weight:bold;cursor:pointer;
  box-shadow:var(--sh);transition:transform .1s,opacity .2s;
  font-family:var(--font);letter-spacing:.03em;
}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.45;cursor:default;}
.btn-save{background:linear-gradient(135deg,#90CAF9,var(--sky));color:#fff;}
.btn-submit{background:linear-gradient(135deg,var(--green),#388E3C);color:#fff;}
.btn-rewrite{background:linear-gradient(135deg,#FFB74D,var(--coral));color:#fff;width:100%;margin-top:6px;}
#rewriteRow{display:none;}
.submit-note{font-size:11px;color:var(--muted);margin-top:5px;text-align:center;}
.link-btn{
  border:none;background:transparent;color:#1976D2;font-size:11px;font-weight:bold;cursor:pointer;padding:0;
}

/* AIコメント */
.ai-box{
  background:linear-gradient(135deg,#FFF8E1,#FFF3CD);
  border:2px solid var(--yellow);border-radius:var(--r);padding:13px;display:none;
}
.ai-box.arrival-highlight{
  animation:aiArrivalGlow 1.8s ease-out 1;
  box-shadow:0 0 0 4px rgba(255,213,79,.18),0 8px 24px rgba(255,193,7,.28);
}
.ai-label{font-size:11px;font-weight:bold;color:#E65100;margin-bottom:5px;}
.ai-comment{font-size:14px;line-height:1.7;}
.rank-badge{
  display:inline-block;margin-top:7px;padding:3px 13px;border-radius:18px;
  font-size:16px;font-weight:bold;letter-spacing:.06em;
  background:linear-gradient(135deg,var(--purple),#7B1FA2);color:#fff;
}
.medal-big{font-size:32px;text-align:center;margin-top:5px;}
@keyframes aiArrivalGlow{
  0%{transform:scale(.985);box-shadow:0 0 0 0 rgba(255,213,79,.05);}
  30%{transform:scale(1.01);box-shadow:0 0 0 6px rgba(255,213,79,.24),0 10px 28px rgba(255,193,7,.34);}

<script>
// =====================================
//  State
// =====================================
let myNum      = null;
let myUnitId   = null;
let myPeriod   = null;
let myFields   = [];   // 有効フィールド定義
let submitted  = false;
let focusField = 'review';
let teacherTimelineFieldKey = '';
let autoTimer  = null;
let pollTimer  = null;
let initBusy   = false;
let pollBusy   = false;
let timelineRefreshPending = false;
let lastAiCommentText = '';
let aiCommentAutoScrolled = false;
let studentStateReady = false;
let submitInFlight = false;
let lastTimelineServerNow = '';
let lastAiArrivalMetricKey = '';
let lastAiArrivalNoteText = '';
let lastAiArrivalBannerKey = '';
let aiArrivalBannerTimer = null;
let studentAiEnabled = false;
let studentAiAutoSubmitEnabled = false;
let lastKnownAiStatus = '';
let activeStudentTab = 'current';
let studentHistoryGroups = [];
let studentHistoryScopeKey = 'unit';
let studentHistoryRows = [];
let studentHistoryIndex = 0;
let studentHistoryLoaded = false;
let studentHistoryLoading = false;
let studentHistoryPreloadTimer = null;
let studentMaintenanceMode = false;
let currentStudentShellState = {};
let currentStudentUnitInfo = null;
let currentStudentName = '';
let currentStudentCustoms = [];
let currentStudentStateKey = '';
let studentActiveReloading = false;
let myLessonId = '';
let myActiveRevision = 0;
let currentStudentInitRequestId = 0;
let currentTimelineRequestId = 0;
let autoSaveInFlight = false;
let studentDraftSaveTimer = null;
let studentDraftDirty = false;
let lastServerSavedSignature = '';
const AUTO_SAVE_BASE_MS = 28000;
const AUTO_SAVE_JITTER_MS = 8000;
const LOCAL_DRAFT_SAVE_MS = 1000;
const POLL_IDLE_MS = 4000;
const POLL_WAITING_AI_MS = 2500;
const POLL_DONE_MS = 6000;
const STUDENT_CACHE_TTL_MS = 5 * 60 * 1000;
const STUDENT_ENTRY_CACHE_TTL_MS = 24 * 60 * 60 * 1000;
const STUDENT_CLASS_SNAPSHOT_CACHE_TTL_MS = 60 * 1000;
const STUDENT_NUMBER_CACHE_TTL_MS = 90 * 24 * 60 * 60 * 1000;
const STUDENT_ENTRY_CACHE_KEY = 'furikaeri:studentEntryOptions';
const STUDENT_CLASS_SNAPSHOT_CACHE_KEY = 'furikaeri:studentClassSnapshot';
let studentClassSnapshotPreloadBusy = false;
let studentClassSnapshotPreloadScheduled = false;
const STUDENT_CLIENT_BUILD = 'client-20260704-1035';
const studentClientPerfState = {
  pageStartedAt:(typeof performance!=='undefined' && performance && typeof performance.now==='function') ? performance.now() : Date.now(),
  initCalls:0,
  periodSelectCalls:0,
  loadMainCalls:0,
  activeInitSession:null,
  activeTimelineSession:null,
};
const studentDebugFooterState = {
  apiText:'API waiting',
  clientText:'CLIENT waiting',
  isError:false,
};

function studentNowMs_(){
  return (typeof performance!=='undefined' && performance && typeof performance.now==='function')
    ? performance.now()
    : Date.now();
}

function logStudentClientPerf_(name, payload){
  try{
    const apiInfo=(window.__portableGas && typeof window.__portableGas.getResolvedApiInfo==='function')
      ? window.__portableGas.getResolvedApiInfo()
      : null;
    const eventPayload={
      name:String(name||''),
      apiUrl:apiInfo && apiInfo.apiUrl || '',
      apiSource:apiInfo && apiInfo.source || '',
      ...(payload && typeof payload==='object' ? payload : {}),
    };
    console.info('[student_client_perf]', JSON.stringify(eventPayload));
    const details=[];
    if(eventPayload.totalMs!==undefined) details.push(`${Math.round(Number(eventPayload.totalMs||0))}ms`);
    if(eventPayload.period!==undefined && Number(eventPayload.period||0)>0) details.push(`${Number(eventPayload.period||0)}じかんめ`);
    if(eventPayload.cacheOnly===true) details.push('cache');
    if(eventPayload.bootstrapSource) details.push(String(eventPayload.bootstrapSource));
    if(eventPayload.error) details.push('error');
    studentDebugFooterState.clientText=`CLIENT ${String(name||'')} ${details.join(' / ')}`.trim();
    if(eventPayload.error) studentDebugFooterState.isError=true;
    updateStudentDebugFooter_();
  }catch(_err){}
}

function afterNextPaint_(callback){
  const run=()=>window.requestAnimationFrame(()=>window.requestAnimationFrame(()=>{
    try{ callback(); }catch(_err){}
  }));
  if(typeof window.requestAnimationFrame==='function'){
    run();
    return;
  }
  setTimeout(()=>{ try{ callback(); }catch(_err){} },0);
}

function startStudentInitPerfSession_(studentNumber){
  const session={
    studentNumber:String(studentNumber||''),
    tappedAt:studentNowMs_(),
    startIndicatorAt:0,
    studentInitStartedAt:0,
    studentInitFinishedAt:0,
    mainRenderedAt:0,
    inputReadyAt:0,
    loggedMainRender:false,
    loggedInputReady:false,
  };
  studentClientPerfState.activeInitSession=session;
  return session;
}

function markStudentStartIndicatorShown_(session){
  if(!session || session.startIndicatorAt) return;
  afterNextPaint_(()=>{
    if(!session.startIndicatorAt){
      session.startIndicatorAt=studentNowMs_();
      logStudentClientPerf_('student_start_indicator', {
        studentNumber:Number(session.studentNumber||0),
        totalMs:Math.max(0, session.startIndicatorAt-session.tappedAt),
      });
    }
  });
}

function markStudentMainRendered_(session, payload){
  if(!session || session.loggedMainRender) return;
  afterNextPaint_(()=>{
    if(session.loggedMainRender) return;
    session.mainRenderedAt=studentNowMs_();
    session.loggedMainRender=true;
    logStudentClientPerf_('student_main_rendered', {
      studentNumber:Number(session.studentNumber||0),
      totalMs:Math.max(0, session.mainRenderedAt-session.tappedAt),
      studentInitRpcMs:session.studentInitFinishedAt && session.studentInitStartedAt
        ? Math.max(0, session.studentInitFinishedAt-session.studentInitStartedAt)
        : 0,
      lessonId:String(payload && payload.lessonId || ''),
      activeRevision:Number(payload && payload.activeRevision || 0),
    });
  });
}

function markStudentInputReady_(payload){
  const session=studentClientPerfState.activeInitSession;
  if(!session || session.loggedInputReady) return;
  session.inputReadyAt=studentNowMs_();
  session.loggedInputReady=true;
  logStudentClientPerf_('student_input_ready', {
    studentNumber:Number(session.studentNumber||0),
    totalMs:Math.max(0, session.inputReadyAt-session.tappedAt),
    studentInitRpcMs:session.studentInitFinishedAt && session.studentInitStartedAt
      ? Math.max(0, session.studentInitFinishedAt-session.studentInitStartedAt)
      : 0,
    mainRenderMs:session.mainRenderedAt
      ? Math.max(0, session.mainRenderedAt-session.tappedAt)
      : 0,
    lessonId:String(payload && payload.lessonId || myLessonId || ''),
    activeRevision:Number(payload && payload.activeRevision || myActiveRevision || 0),
  });
}

function startTimelinePerfSession_(){
  const session={
    startedAt:studentNowMs_(),
    studentNumber:String(myNum||''),
    lessonId:String(myLessonId||'').trim(),
    activeRevision:Number(myActiveRevision||0),
    loggedRender:false,
  };
  studentClientPerfState.activeTimelineSession=session;
  return session;
}

function isCurrentStudentContext_(expectedStudentNumber, expectedLessonId, expectedActiveRevision){
  return String(myNum||'')===String(expectedStudentNumber||'')
    && String(myLessonId||'').trim()===String(expectedLessonId||'').trim()
    && Number(myActiveRevision||0)===Number(expectedActiveRevision||0);
}

function isTimelineResponseCurrent_(requestId, context, payload){
  if(requestId!==currentTimelineRequestId) return false;
  if(!context || !isCurrentStudentContext_(context.studentNumber, context.lessonId, context.activeRevision)) return false;
  if(String(payload?.lessonId||'').trim()!==String(context.lessonId||'').trim()) return false;
  if(Number(payload?.activeRevision||0)!==Number(context.activeRevision||0)) return false;
  return true;
}

function setTimelineRetryVisible_(visible, message){
  const retryBtn=document.getElementById('timelineRetryBtn');
  const errorNote=document.getElementById('timelineErrorNote');
  if(retryBtn) retryBtn.hidden=!visible;
  if(errorNote){
    errorNote.hidden=!visible;
    errorNote.textContent=message||'読み込みに失敗しました';
  }
}

function retryTimelineFetch_(){
  setTimelineRetryVisible_(false,'');
  refreshTimeline({ force:true });
}

function getStudentCacheKey_(kind, suffix){
  return `furikaeri:${kind}:${String(suffix||'')}`;
}

function getLessonSessionKey_(lessonId, activeRevision){
  const normalizedLessonId=String(lessonId||'').trim();
  const normalizedRevision=Number(activeRevision||0);
  return normalizedLessonId ? `${normalizedLessonId}@${normalizedRevision}` : '';
}

function getPayloadLessonSessionKey_(payload){
  if(!payload || typeof payload!=='object') return '';
  return getLessonSessionKey_(payload.lessonId, payload.activeRevision);
}

function readStudentCache_(kind, suffix){
  try{
    const raw=localStorage.getItem(getStudentCacheKey_(kind,suffix));
    if(!raw) return null;
    const parsed=JSON.parse(raw);
    if(!parsed || !parsed.savedAt || Date.now()-Number(parsed.savedAt)>STUDENT_CACHE_TTL_MS) return null;
    return parsed.payload||null;
  }catch(e){
    return null;
  }
}

function writeStudentCache_(kind, suffix, payload){
  try{
    localStorage.setItem(getStudentCacheKey_(kind,suffix), JSON.stringify({
      savedAt: Date.now(),
      payload: payload||null
    }));
  }catch(e){}
}

function getNormalizedCustomValues_(values){
  const incoming=Array.isArray(values)?values:[];
  const fieldCount=Array.isArray(myFields)?myFields.length:incoming.length;
  const normalized=incoming.slice(0,fieldCount).map(value=>String(value==null?'':value));
  while(normalized.length<fieldCount) normalized.push('');
  return normalized;
}

function getStudentDraftSignature_(values){
  return JSON.stringify(getNormalizedCustomValues_(values));
}

function buildCurrentStudentDraftCache_(){
  if(!myUnitId || !myPeriod || !myNum || !Array.isArray(myFields) || !myFields.length) return null;
  const identity=normalizeStudentIdentity_({});
  const customs=getNormalizedCustomValues_(getCustomValues());
  return {
    lessonId:myLessonId,
    activeRevision:myActiveRevision,
    num:identity.num,
    name:identity.name,
    unitId:myUnitId,
    period:myPeriod,
    unit:currentStudentUnitInfo ? {
      id:currentStudentUnitInfo.id||myUnitId,
      subject:currentStudentUnitInfo.subject||'',
      name:currentStudentUnitInfo.name||''
    } : null,
    fields:myFields,
    customs,
    submitted:Boolean(submitted),
    comment:lastAiCommentText||'',
    rank:'',
    medal:'',
    medalColor:'',
    aiStatus:lastKnownAiStatus||'',
    teacherTimelineFieldKey:teacherTimelineFieldKey||'',
    studentAiEnabled:studentAiEnabled,
    studentAiAutoSubmitEnabled:studentAiAutoSubmitEnabled,
    lastServerSavedSignature:lastServerSavedSignature||getStudentDraftSignature_(customs),
    draftDirty:studentDraftDirty===true,
  };
}

function persistStudentDraftLocally_(){
  const payload=buildCurrentStudentDraftCache_();
  if(!payload) return;
  writeStudentCache_('state',[myLessonId||myUnitId,myPeriod,myNum].join('_'),payload);
}

function scheduleLocalDraftSave_(){
  if(studentDraftSaveTimer) clearTimeout(studentDraftSaveTimer);
  studentDraftSaveTimer=setTimeout(()=>{
    studentDraftSaveTimer=null;
    persistStudentDraftLocally_();
  }, LOCAL_DRAFT_SAVE_MS);
}

function markStudentSaveSynced_(values){
  lastServerSavedSignature=getStudentDraftSignature_(values);
  studentDraftDirty=false;
}

function getNextAutoSaveDelay_(){
  return AUTO_SAVE_BASE_MS + Math.floor(Math.random()*AUTO_SAVE_JITTER_MS);
}

function readStudentCacheByLesson_(kind, suffix, lessonId){
  const cached=readStudentCache_(kind, suffix);
  if(!cached) return null;
  const expected=getLessonSessionKey_(lessonId, myActiveRevision);
  const actual=getPayloadLessonSessionKey_(cached);
  if(expected && actual && expected===actual) return cached;
  return null;
}

function findRecentStudentStateCache_(num){
  const target=String(num||'').trim();
  if(!target || typeof localStorage==='undefined') return null;
  let latest=null;
  try{
    for(let i=0;i<localStorage.length;i++){
      const key=String(localStorage.key(i)||'');
      if(!key.startsWith('furikaeri:state:')) continue;
      const raw=localStorage.getItem(key);
      if(!raw) continue;
      const parsed=JSON.parse(raw);
      const savedAt=Number(parsed&&parsed.savedAt||0);
      if(!savedAt || Date.now()-savedAt>STUDENT_CACHE_TTL_MS) continue;
      const payload=parsed&&parsed.payload||null;
      if(String(payload&&payload.num||'').trim()!==target) continue;
      if(!latest || savedAt>latest.savedAt) latest={ savedAt, payload };
    }
  }catch(_err){
    return null;
  }
  return latest&&latest.payload ? latest.payload : null;
}

function getInitialStudentFocusField_(fields){
  const list=Array.isArray(fields)?fields:[];
  if(!list.length) return 'review';
  const firstEnabled=list.find(field=>field&&field.enabled!==false);
  return String(firstEnabled&&firstEnabled.key||list[0]&&list[0].key||'review');
}

function showCachedStudentLanding_(cached){
  if(!cached || !cached.unit || !cached.period || !cached.lessonId) return false;
  loadMain(Object.assign({}, cached, { fromCache:true, cacheOnly:true }));
  return true;
}

function readRememberedStudentNumber_(){
  try{
    const raw=localStorage.getItem('furikaeri:rememberedStudentNumber');
    if(!raw) return '';
    const parsed=JSON.parse(raw);
    if(!parsed || !parsed.savedAt || Date.now()-Number(parsed.savedAt)>STUDENT_NUMBER_CACHE_TTL_MS) return '';
    return String(parsed.number||'').trim();
  }catch(e){
    return '';
  }
}

function rememberStudentNumber_(num){
  try{
    localStorage.setItem('furikaeri:rememberedStudentNumber', JSON.stringify({
      savedAt: Date.now(),
      number: String(num||'').trim()
    }));
  }catch(e){}
}

function formatStudentIdentity_(num, name){
  const normalizedNum=String(num==null?'':num).trim();
  const normalizedName=String(name||'').trim();
  if(normalizedNum && normalizedName) return `${normalizedNum}ばん ${normalizedName} さん`;
  if(normalizedNum) return `${normalizedNum}ばん`;
  if(normalizedName) return normalizedName;
  return '';
}

function findRosterNameForNumber_(num){
  const target=String(num||'').trim();
  if(!target || !Array.isArray(bootstrapStudentOptions.students)) return '';
  const match=bootstrapStudentOptions.students.find(student=>String(student&&student.number||'').trim()===target);
  return match ? String(match.name||'').trim() : '';
}

function normalizeStudentIdentity_(state){
  const d=state&&typeof state==='object'?state:{};
  const num=String(d.num==null?'':d.num).trim() || String(myNum||'').trim();
  const name=String(d.name==null?'':d.name).trim()
    || currentStudentName
    || findRosterNameForNumber_(num);
  if(num) myNum=num;

function hasMeaningfulCustoms_(values){

function normalizeStudentCustoms_(values){
  const incoming=Array.isArray(values)?values:[];
  const fieldCount=Array.isArray(myFields)?myFields.length:0;
  const normalized=incoming.slice(0,fieldCount);
  while(normalized.length<fieldCount) normalized.push('');

  const stateKey=getCurrentStudentStateKey_();
  const sameState=stateKey && stateKey===currentStudentStateKey;
  const screenValues=sameState ? getCustomValues() : [];
  const fallback=hasMeaningfulCustoms_(screenValues) ? screenValues : currentStudentCustoms;
  const result=(!hasMeaningfulCustoms_(normalized) && sameState && hasMeaningfulCustoms_(fallback))
    ? fallback.slice(0,fieldCount)
    : normalized;
  while(result.length<fieldCount) result.push('');
  currentStudentStateKey=stateKey;
  currentStudentCustoms=result.slice();
  return result;
}

function readStudentEntryOptionsCache_(){
  try{
    const raw=localStorage.getItem(STUDENT_ENTRY_CACHE_KEY);
    if(!raw) return null;
    const parsed=JSON.parse(raw);
    if(!parsed || !parsed.savedAt || Date.now()-Number(parsed.savedAt)>STUDENT_ENTRY_CACHE_TTL_MS) return null;
    const payload=parsed.payload;
    if(!payload || typeof payload!=='object') return null;
    const students=normalizeStudentEntryStudents_(payload);
    if(!students.length) return null;
    return {
      students,
      numberList:Array.isArray(payload.numberList)?payload.numberList:students.map(student=>student.number),
      maxNumber:Number(payload.maxNumber||students[students.length-1]?.number||0),
      shell:payload.shell||{},
    };
  }catch(_err){
    return null;
  }
}

function writeStudentEntryOptionsCache_(payload){
  try{
    const students=normalizeStudentEntryStudents_(payload);
    const numberList=Array.isArray(payload&&payload.numberList)
      ? payload.numberList.map(value=>Number(value)||0).filter(value=>value>0)
      : students.map(student=>Number(student.number)||0).filter(value=>value>0);
    if(!students.length && !numberList.length) return;
    localStorage.setItem(STUDENT_ENTRY_CACHE_KEY, JSON.stringify({
      savedAt:Date.now(),
      payload:{
        students,
        numberList,
        maxNumber:Number(payload&&payload.maxNumber||numberList[numberList.length-1]||students[students.length-1]?.number||0),
        shell:payload.shell||{},
      },
    }));
  }catch(_err){}
}

function buildStudentPlaceholderEntries_(numberList, maxNumber){
  const normalized=Array.from(new Set((Array.isArray(numberList)?numberList:[])
    .map(value=>Number(value)||0)
    .filter(value=>value>0)))
    .sort((a,b)=>a-b);
  if(normalized.length){
    return normalized.map(number=>({ number, name:'', active:true, fallback:true }));
  }
  return [];
}

function normalizeStudentEntryStudents_(payload){
  if(payload && Array.isArray(payload.students) && payload.students.length){
    return payload.students;
  }
  if(payload && (Array.isArray(payload.numberList) || Number(payload.maxNumber)>0)){
    return buildStudentPlaceholderEntries_(payload.numberList, payload.maxNumber);
  }
  return [];
}

function readStudentClassSnapshotCache_(){
  try{
    const raw=localStorage.getItem(STUDENT_CLASS_SNAPSHOT_CACHE_KEY);
    if(!raw) return null;
    const parsed=JSON.parse(raw);
    if(!parsed || !parsed.savedAt || Date.now()-Number(parsed.savedAt)>STUDENT_CLASS_SNAPSHOT_CACHE_TTL_MS){
      localStorage.removeItem(STUDENT_CLASS_SNAPSHOT_CACHE_KEY);
      return null;
    }
    const snapshot=parsed.payload;
    return snapshot && typeof snapshot==='object' ? snapshot : null;
  }catch(_err){
    return null;
  }
}

function writeStudentClassSnapshotCache_(snapshot){
  try{
    if(!snapshot || typeof snapshot!=='object' || !snapshot.statesByNumber) return;
    localStorage.setItem(STUDENT_CLASS_SNAPSHOT_CACHE_KEY, JSON.stringify({
      savedAt:Date.now(),
      payload:snapshot,
    }));
  }catch(_err){}
}

function renderStudentApiDebug_(label, timing, isError){
  const parts=[];
  const apiLabel=String(label||'API').trim();
  if(timing && typeof timing==='object'){
    if(timing.api) parts.push(String(timing.api));
    else parts.push(apiLabel);
    if(timing.totalMs!==undefined) parts.push(`${Number(timing.totalMs||0)}ms`);
    if(timing.payloadBytes!==undefined) parts.push(`${Number(timing.payloadBytes||0)}B`);
    if(timing.cacheHit!==undefined) parts.push(`cache ${timing.cacheHit?'hit':'miss'}`);
  }else{
    parts.push(apiLabel);
  }
  if(isError) parts.push('通信失敗');
  studentDebugFooterState.apiText=`API ${parts.join(' / ')}`;
  studentDebugFooterState.isError=Boolean(isError);
  updateStudentDebugFooter_();
}

function getInitialStudentOptions_(){
  const current=normalizeStudentEntryStudents_(bootstrapStudentOptions);
  if(current.length){
    bootstrapStudentOptions.students=current;
    return current;
  }
  const cached=readStudentEntryOptionsCache_();
  if(cached){
    Object.assign(bootstrapStudentOptions, cached);
    studentEntryOptionsLoaded=true;
    return cached.students;
  }
  const fallback=buildStudentPlaceholderEntries_(bootstrapStudentOptions.numberList, bootstrapStudentOptions.maxNumber);
  bootstrapStudentOptions.students=fallback;
  return fallback;
}

function applyStudentBootstrapData_(data, options){
  const opts=options||{};
  logStudentApiTiming_(opts.initial?'bootstrap':'entryOptions', data);
  const normalizedStudents=normalizeStudentEntryStudents_(data);
  const hasStudents=Boolean(normalizedStudents.length);
  const hasClassSnapshot=Boolean(data && data.classSnapshot && typeof data.classSnapshot==='object');
  if(data && typeof data==='object'){
    const existingStudents=Array.isArray(bootstrapStudentOptions.students) ? bootstrapStudentOptions.students : [];
    const incoming=Object.assign({}, data);
    if(hasStudents) incoming.students=normalizedStudents;
    if(!hasStudents && existingStudents.length){
      delete incoming.students;
    }
    Object.assign(bootstrapStudentOptions, incoming);
    if(hasStudents || existingStudents.length){
      studentEntryOptionsLoaded=true;
      studentEntryOptionsLoading=false;
    }else if(opts.initial===true){
      studentEntryOptionsLoading=true;
    }else{
      studentEntryOptionsLoaded=false;
      studentEntryOptionsLoading=true;
    }
    if(hasStudents || opts.initial !== true){
      writeStudentEntryOptionsCache_(bootstrapStudentOptions);
    }
    if(hasClassSnapshot){
      writeStudentClassSnapshotCache_(incoming.classSnapshot);
    }
  }
  applyStudentShellState_(bootstrapStudentOptions.shell||{});
  const students=getInitialStudentOptions_();
  const selectScreen=document.getElementById('screen-select');
  if(selectScreen && selectScreen.classList.contains('active') && !initBusy){
    renderNumberButtons(students);
  }
  if(opts.skipResume!==true && !initBusy){
    setupRememberedStudentResume_(students);
  }
  if(opts.skipClassSnapshotPreload!==true && !hasClassSnapshot && students.length){}
}

function startStudentApp_(){
  if(studentAppBootStarted) return;
  studentAppBootStarted=true;
  applyStudentBootstrapData_(bootstrapStudentOptions,{ initial:true, skipResume:true });
}

function selectNumber(num, options){
  if(initBusy) return;
  const opts=options||{};
  const perfSession=startStudentInitPerfSession_(num);
  const startedAt=studentNowMs_();
  perfSession.studentInitStartedAt=startedAt;
  const requestId=++currentStudentInitRequestId;
  if(!isStudentNumberInRoster_(num)){
    showToast('この番号は名簿にありません。先生に伝えてね。');
    return;
  }
  studentClientPerfState.initCalls += 1;
  initBusy=true;
  myNum=num;
  setNumberSelectionBusy_(num,true);
  markStudentStartIndicatorShown_(perfSession);
  if(opts.remember!==false) rememberStudentNumber_(num);
  showCachedStudentLanding_(findRecentStudentStateCache_(num));
  google.script.run
    .withSuccessHandler(d=>{
      if(requestId!==currentStudentInitRequestId) return;
      perfSession.studentInitFinishedAt=studentNowMs_();
      initBusy=false;
      setNumberSelectionBusy_(num,false);
      logStudentApiTiming_('studentInit', d);
      logStudentClientPerf_('studentInit_response', {
        callCount:studentClientPerfState.initCalls,
        totalMs:Math.max(0, studentNowMs_()-startedAt),
        sincePageLoadMs:Math.max(0, studentNowMs_()-studentClientPerfState.pageStartedAt),
        studentNumber:Number(num||0),
        needPeriodSelect:Boolean(d && d.needPeriodSelect),
        deploymentVersion:Number(d && d.deploymentVersion || 0),
        timing:d && d.timing || null,
      });
      onInit(d);
    })
    .withFailureHandler(e=>{
      if(requestId!==currentStudentInitRequestId) return;
      perfSession.studentInitFinishedAt=studentNowMs_();
      initBusy=false;
      setNumberSelectionBusy_(num,false);
      logStudentApiFailure_('studentInit', e);
      logStudentClientPerf_('studentInit_error', {
        callCount:studentClientPerfState.initCalls,
        totalMs:Math.max(0, studentNowMs_()-startedAt),
        studentNumber:Number(num||0),
        error:(e && e.message) ? e.message : String(e||'unknown'),
      });
      showToast(opts.auto ? '前の番号で入れなかったので、えらびなおしてね。' : 'エラー:'+e);
    })
    .studentInit(num,0);
}

  const currentSessionKey=getLessonSessionKey_(myLessonId, myActiveRevision);
  if(currentSessionKey && latestSessionKey && currentSessionKey!==latestSessionKey){

    currentStudentStateKey='';

    totalMs:Math.max(0, studentNowMs_()-startedAt),
    sincePageLoadMs:Math.max(0, studentNowMs_()-studentClientPerfState.pageStartedAt),
    studentNumber:Number(identity.num||0),
    unitId:String(myUnitId||''),
    period:Number(myPeriod||0),
    fieldCount:Array.isArray(myFields)?myFields.length:0,
    submitted:Boolean(submitted),
    cacheOnly:Boolean(d && d.cacheOnly),
    bootstrapSource:String(d && d.bootstrapSource || ''),
  });
}

function loadStudentState(options){
  const opts=options||{};
  const cacheKey=[myLessonId||myUnitId,myPeriod,myNum].join('_');
  const expectedRequestId=currentStudentInitRequestId;
  const expectedStudentNumber=String(myNum||'');
  const expectedLessonId=String(myLessonId||'').trim();
  const expectedActiveRevision=Number(myActiveRevision||0);
  const expectedSessionKey=getLessonSessionKey_(myLessonId, myActiveRevision);
  if(!opts.skipCachedState){
    const cached=readStudentCacheByLesson_('state',cacheKey,myLessonId);
    if(cached) applyStudentState(cached);
  }
  google.script.run
    .withSuccessHandler(payload=>{
      if(expectedRequestId!==currentStudentInitRequestId
        || !isCurrentStudentContext_(expectedStudentNumber, expectedLessonId, expectedActiveRevision)) return;
      logStudentApiTiming_('studentLoadState', payload);
      const identity=normalizeStudentIdentity_(payload);
      const normalizedPayload=Object.assign({}, payload||{}, { num: identity.num, name: identity.name });
      if(expectedSessionKey
        && getPayloadLessonSessionKey_(normalizedPayload)
        && expectedSessionKey!==getPayloadLessonSessionKey_(normalizedPayload)){
        onInit(normalizedPayload);
        return;
      }
      writeStudentCache_('state',cacheKey,normalizedPayload);
      applyStudentState(normalizedPayload);
      if(opts.skipTimelineRefresh!==true) refreshTimeline();
    })
    .withFailureHandler(err=>{
      if(expectedRequestId!==currentStudentInitRequestId
        || !isCurrentStudentContext_(expectedStudentNumber, expectedLessonId, expectedActiveRevision)) return;
      logStudentApiFailure_('studentLoadState', err);
      studentStateReady=true;
      if(submitted){
        lockSubmitted();
        document.getElementById('submitNote').textContent='提出結果を確認中です。少し待ってね。';
      }else{
        setFieldInteractivity(true);
        document.getElementById('submitNote').textContent='';
      }
    })
    .studentLoadState(myUnitId,myPeriod,myNum);
}

function loadStudentSupplemental(options){
  const opts=options||{};
  if(!opts.skipPreviousReview) loadPreviousReview();
  const timelineCacheKey=[myLessonId||myUnitId,myPeriod,myNum].join('_');
  if(!opts.skipCachedTimeline){
    const cachedTimeline=readStudentCacheByLesson_('timeline',timelineCacheKey,myLessonId);
    if(cachedTimeline) applyTimelinePayload(cachedTimeline);
  }
  refreshTimeline();
}

function loadPreviousReview(){
  if(!myUnitId||!myPeriod||!myNum||Number(myPeriod)<=1){
    document.getElementById('prevCard').style.display='none';
    document.getElementById('prevGoalCard').style.display='none';
    return;
  }
  const cacheKey=[myLessonId||myUnitId,myPeriod,myNum].join('_');
  const expectedRequestId=currentStudentInitRequestId;
  const expectedStudentNumber=String(myNum||'');
  const expectedLessonId=String(myLessonId||'').trim();
  const expectedActiveRevision=Number(myActiveRevision||0);
  const expectedSessionKey=getLessonSessionKey_(myLessonId, myActiveRevision);
  const cached=readStudentCacheByLesson_('prevReview',cacheKey,myLessonId);
  if(cached){
    const cachedText=String(cached.prevReview||'').trim();
    const cachedGoal=String(cached.previousNextGoal||'').trim();
    if(cachedText){
      document.getElementById('prevCard').style.display='block';
      document.getElementById('prevReviewBox').textContent=cachedText;
    }
    renderPreviousNextGoal_(cachedGoal);
  }
  google.script.run
    .withSuccessHandler(res=>{
      if(expectedRequestId!==currentStudentInitRequestId
        || !isCurrentStudentContext_(expectedStudentNumber, expectedLessonId, expectedActiveRevision)) return;
      logStudentApiTiming_('getStudentPreviousReview', res);
      const text=String(res?.prevReview||'').trim();
      const previousNextGoal=String(res?.previousNextGoal||'').trim();
      writeStudentCache_('prevReview',cacheKey,Object.assign({}, res||{prevReview:'',previousNextGoal:''}, {
        lessonId:myLessonId,
        activeRevision:myActiveRevision,
      }));
      if(expectedSessionKey && expectedSessionKey!==getLessonSessionKey_(myLessonId, myActiveRevision)) return;
      if(text){
        document.getElementById('prevCard').style.display='block';
        document.getElementById('prevReviewBox').textContent=text;
      }else{
        document.getElementById('prevCard').style.display='none';
      }
      renderPreviousNextGoal_(previousNextGoal);
    })
    .withFailureHandler(err=>{
      if(expectedRequestId!==currentStudentInitRequestId
        || !isCurrentStudentContext_(expectedStudentNumber, expectedLessonId, expectedActiveRevision)) return;
      logStudentApiFailure_('getStudentPreviousReview', err);
    })
    .getStudentPreviousReview(myUnitId,myPeriod,myNum);
}

function renderPreviousNextGoal_(text){
  const box=document.getElementById('prevGoalCard');
  const body=document.getElementById('prevGoalBox');
  if(!box||!body) return;
  const value=String(text||'').trim();
  if(value){
    box.style.display='block';
    body.textContent=value;
  }else{
    box.style.display='none';
    body.textContent='';
  }
}

function applyStudentState(d){
  if(!d) return;
  if(String(d.lessonId||'').trim()) myLessonId=String(d.lessonId||'').trim();
  if(Object.prototype.hasOwnProperty.call(d,'activeRevision')) myActiveRevision=Number(d.activeRevision||0);
  myFields=d.fields||myFields;
  if(typeof d.studentAiEnabled!=='undefined') studentAiEnabled=Boolean(d.studentAiEnabled);
  if(typeof d.studentAiAutoSubmitEnabled!=='undefined') studentAiAutoSubmitEnabled=Boolean(d.studentAiAutoSubmitEnabled);
  const identity=normalizeStudentIdentity_(d);
  const identityLabel=formatStudentIdentity_(identity.num, identity.name);
  document.getElementById('hdrMeta').textContent=identityLabel;
  document.getElementById('myNameLabel').textContent=identityLabel;
  const customs=normalizeStudentCustoms_(d.customs);
  const incomingServerSignature=String(d.lastServerSavedSignature||getStudentDraftSignature_(customs));
  const incomingDraftDirty=Boolean(d.draftDirty) && incomingServerSignature!==getStudentDraftSignature_(customs);
  buildFields(myFields, customs);
  writeStudentCache_('state',[myLessonId||myUnitId,myPeriod,myNum].join('_'),{
    lessonId:myLessonId,
    activeRevision:myActiveRevision,
    num:identity.num,
    name:identity.name,
    unitId:myUnitId,
    period:myPeriod,
    unit:currentStudentUnitInfo ? {
      id:currentStudentUnitInfo.id||myUnitId,
      subject:currentStudentUnitInfo.subject||'',
      name:currentStudentUnitInfo.name||''
    } : null,
    fields:myFields,
    customs:customs,
    submitted:Boolean(d.submitted),
    comment:d.comment||'',
    rank:d.rank||'',
    medal:d.medal||'',
    medalColor:d.medalColor||'',
    aiStatus:d.aiStatus||'',
    teacherTimelineFieldKey:teacherTimelineFieldKey||'',
    studentAiEnabled:studentAiEnabled,
    studentAiAutoSubmitEnabled:studentAiAutoSubmitEnabled,
    prevReview:d.prevReview||'',
    previousNextGoal:d.previousNextGoal||'',
    lastServerSavedSignature:incomingServerSignature,
    draftDirty:incomingDraftDirty
  });
  lastServerSavedSignature=incomingServerSignature;
  studentDraftDirty=incomingDraftDirty;
  submitted=Boolean(d.submitted);
  const aiStatus=String(d.aiStatus||'');
  const returnedComment=String(d.comment||'').trim();
  lastKnownAiStatus=aiStatus;
  const aiDone=aiStatus==='done';
  const aiError=aiStatus==='error';
  const hasAiComment=studentAiEnabled&&aiDone;
  lastAiCommentText=returnedComment;
  aiCommentAutoScrolled=Boolean(lastAiCommentText);
  if(!returnedComment && !aiDone){
    lastAiArrivalMetricKey='';
    lastAiArrivalNoteText='';
    lastAiArrivalBannerKey='';
    hideAiArrivalBanner_();
  }
  studentStateReady=true;
  setFieldInteractivity(true);
  markStudentInputReady_(d);
  document.getElementById('submitNote').textContent='';
  if(d.submitted){
    lockSubmitted();
    scheduleStudentHistoryPreload_();
  }
  syncStudentTabState_();
  const aiWaiting=studentAiEnabled&&['pending','processing'].includes(String(d.aiStatus||''));
  if(returnedComment) {
    setStudentCommentTitle_(hasAiComment);
    showAIBox(returnedComment,d.rank,d.medal,d.medalColor);
    if(hasAiComment) updateAiArrivalNote_(d);
  } else if(studentAiEnabled&&aiError) {
    setStudentCommentTitle_(true);
    showAIBox(d.comment||'AIのコメント作成に失敗しました。先生に伝えてね。','','','');
  } else if(aiWaiting) {
    setStudentCommentTitle_(true);
    showAIBox('AIコメントをつくっています。少しまってね。','','','');
  } else {
    document.getElementById('aiBox').style.display='none';
  }
  if(d.prevReview){
    document.getElementById('prevCard').style.display='block';
    document.getElementById('prevReviewBox').textContent=d.prevReview;
  }
  renderPreviousNextGoal_(d.previousNextGoal||'');
}

function buildFields(fields, values){
  const container=document.getElementById('fieldContainer');
  container.innerHTML='';
  let reviewChipInserted=false;
  const displayFields=fields.map((f,i)=>({field:f,idx:i}));
  displayFields.forEach(({field:f,idx:i})=>{
    const wrap=document.createElement('div');
    wrap.className='field-wrap';
    if(isUnderstandingFieldDef(f)) wrap.classList.add('understanding-wrap');
    wrap.dataset.idx=i;
    wrap.dataset.key=f.key;
    const requiredBadge='';
    const lbl=`<span class="field-label">${esc(f.emoji||'📌')} ${esc(f.label)}${requiredBadge}</span>`;

    if(f.type==='text'){
      wrap.innerHTML=`${lbl}
        <textarea class="f field-inp" data-idx="${i}" rows="2"
          placeholder="${esc(f.placeholder||'')}"
          onfocus="setFocus('${f.key}')">${esc(values[i]||'')}</textarea>`;

    } else if(f.type==='review'){
      // ヒントタグ＋大きめテキストエリア
      const hints=(f.hints||'').split(',').filter(Boolean);
      const hintHtml=hints.map(h=>
        `<span class="hint-tag" onclick="insertHint(this,'${esc(h)}')">${esc(h)}</span>`
      ).join('');
      const reviewChipBox=!reviewChipInserted ? '<div id="studentReviewChips" class="entry-chip-row" style="display:none;"></div>' : '';
      reviewChipInserted=true;
      wrap.innerHTML=`${lbl}
        <div class="hints-wrap" id="hintsWrap_${i}">${hintHtml}</div>
        ${reviewChipBox}
        <textarea class="f field-inp" data-idx="${i}" rows="5"
          placeholder="${esc(f.placeholder||'くわしくかいてみよう！')}"
          onfocus="setFocus('${f.key}')">${esc(values[i]||'')}</textarea>`;

    } else if(f.type==='select' && isUnderstandingFieldDef(f)){
      const opts=(f.options||'').split(',').map(o=>o.trim()).filter(Boolean);
      const cur=values[i]||'';
      const labels={
        'よくわかった':'😀 よくわかった',
        'だいたいわかった':'🙂 だいたいわかった',
        'あまりわからなかった':'😐 あまりわからなかった',
        'わからなかった':'😢 わからなかった',
      };
      const buttonHtml=opts.map(o=>
        `<button type="button" class="understanding-btn ${cur===o?'selected':''}" data-val="${esc(o)}"
          onclick="selectUnderstanding(this,${i},'${esc(o)}')">${esc(labels[o]||o)}</button>`
      ).join('');
      wrap.innerHTML=`${lbl}
        <div class="understanding-group">${buttonHtml}</div>
        <input type="hidden" class="field-inp" data-idx="${i}" value="${esc(cur)}">`;

    } else if(f.type==='student_select'){
      const rosterChoices=getStudentRosterChoiceOptions_();
      const cur=values[i]||'';
      const optHtml=rosterChoices.map(choice=>
        `<option value="${esc(choice.value)}" ${cur===choice.value?'selected':''}>${esc(choice.label)}</option>`
      ).join('');
      wrap.innerHTML=`${lbl}
        <select class="f field-inp" data-idx="${i}" onfocus="setFocus('${f.key}')">
          <option value="">えらんでね</option>${optHtml}
        </select>`;

    } else if(f.type==='student_multi'){
      const rosterChoices=getStudentRosterChoiceOptions_();
      const selected=new Set(splitStudentRosterMultiValue_(values[i]||''));
      const choiceHtml=rosterChoices.map(choice=>
        `<div class="choice-btn ${selected.has(choice.value)?'selected':''}" data-val="${esc(choice.value)}"
          onclick="toggleStudentRosterMultiChoice(this,${i})">${esc(choice.label)}</div>`
      ).join('');
      wrap.innerHTML=`${lbl}
        <div class="choice-group" data-idx="${i}">${choiceHtml || '<div style="grid-column:1/-1;color:#78909C;font-size:13px;">名簿を読み込み中です…</div>'}</div>
        <input type="hidden" class="field-inp" data-idx="${i}" value="${esc(Array.from(selected).join('、'))}">`;

    } else if(f.type==='select'){
      const opts=(f.options||'').split(',').map(o=>o.trim()).filter(Boolean);
      const optHtml=opts.map(o=>
        `<option value="${esc(o)}" ${values[i]===o?'selected':''}>${esc(o)}</option>`
      ).join('');
      wrap.innerHTML=`${lbl}
        <select class="f field-inp" data-idx="${i}" onfocus="setFocus('${f.key}')">
          <option value="">えらんでね</option>${optHtml}
        </select>`;

    } else if(f.type==='radio'){
      const opts=(f.options||'').split(',').map(o=>o.trim()).filter(Boolean);
      const cur=values[i]||'';
      const radioHtml=opts.map(o=>
        `<div class="radio-btn ${cur===o?'selected':''}" data-val="${esc(o)}"
          onclick="selectRadio(this,${i},'${esc(o)}')">${esc(o)}</div>`
      ).join('');
      wrap.innerHTML=`${lbl}
        <div class="radio-group" data-idx="${i}">${radioHtml}</div>
        <input type="hidden" class="field-inp" data-idx="${i}" value="${esc(cur)}">`;
    }

    container.appendChild(wrap);
  });
  bindFieldInputEvents_();
  renderStudentEntryChips();
}

function bindFieldInputEvents_(){
  document.querySelectorAll('.field-inp').forEach(el=>{
    const handler=()=>handleFieldValueChanged_();
    el.oninput=handler;
    el.onchange=handler;
  });
}

function handleFieldValueChanged_(){
  const values=getCustomValues();
  studentDraftDirty=getStudentDraftSignature_(values)!==lastServerSavedSignature;
  scheduleLocalDraftSave_();
  renderStudentEntryChips();
  if(window._lastTl) renderTl(window._lastTl);
}

function setFieldInteractivity(enabled){
  document.querySelectorAll('.field-inp').forEach(el=>{ el.disabled=!enabled; });
  document.querySelectorAll('.understanding-btn,.radio-btn,.choice-btn,.hint-tag').forEach(el=>{
    el.style.pointerEvents=enabled?'':'none';
    el.style.opacity=enabled?'1':'0.55';
  });
  const submitBtn=document.getElementById('submitBtn');
  if(submitBtn) submitBtn.disabled=!enabled;
}

function isUnderstandingFieldDef(field){
  const text=`${field?.key||''} ${field?.label||''} ${field?.type||''}`.toLowerCase();
  return /理解|りかい|わか|自己評価|じこひょうか|達成|たっせい|self|score|check|eval/.test(text);
}

function selectUnderstanding(el, idx, val){
  const wrap=el.closest('.understanding-wrap');
  wrap.querySelectorAll('.understanding-btn').forEach(btn=>{
    btn.classList.remove('selected');
    btn.classList.remove('missing');
  });
  el.classList.add('selected');
  const hidden=wrap.querySelector(`.field-inp[data-idx="${idx}"][type="hidden"]`);
  if(hidden) hidden.value=val;
  setFocus(wrap.dataset.key);
  handleFieldValueChanged_();
}

function selectRadio(el, idx, val){
  el.closest('.radio-group').querySelectorAll('.radio-btn')
    .forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  document.querySelector(`.field-inp[data-idx="${idx}"][type="hidden"]`).value=val;
  setFocus(el.closest('.field-wrap').dataset.key);
  handleFieldValueChanged_();
}

function getStudentRosterChoiceOptions_(){
  const students=getInitialStudentOptions_();
  return (Array.isArray(students)?students:[])
    .filter(student=>student && student.fallback!==true)
    .map(student=>{
      const number=String(student.number||'').trim();
      const name=String(student.name||'').trim();
      const label=name ? `${number}ばん ${name}` : `${number}ばん`;
      return { value:label, label };
    })
    .filter(choice=>choice.value.trim());
}

function splitStudentRosterMultiValue_(value){
  return String(value||'')
    .split(/[、,]/)
    .map(item=>item.trim())
    .filter(Boolean);
}

function toggleStudentRosterMultiChoice(el, idx){
  const wrap=el.closest('.field-wrap');
  const hidden=wrap ? wrap.querySelector(`.field-inp[data-idx="${idx}"][type="hidden"]`) : null;
  if(!hidden) return;
  el.classList.toggle('selected');
  const values=Array.from(wrap.querySelectorAll('.choice-btn.selected'))
    .map(btn=>String(btn.dataset.val||'').trim())
    .filter(Boolean);
  hidden.value=values.join('、');
  setFocus(wrap.dataset.key);
  handleFieldValueChanged_();
}

function insertHint(el, hint){
  const wrap=el.closest('.field-wrap');
  const idx=parseInt(wrap.dataset.idx);
  const ta=wrap.querySelector('textarea.field-inp');
  if(!ta) return;
  const cur=ta.value;
  const start=typeof ta.selectionStart==='number' ? ta.selectionStart : cur.length;
  const end=typeof ta.selectionEnd==='number' ? ta.selectionEnd : cur.length;
  const before=cur.slice(0,start);
  const after=cur.slice(end);
  const needsSpacerBefore=before && !/[\s\n]$/.test(before);
  const needsSpacerAfter=after && !/^[\s\n]/.test(after);
  const insertText=`${needsSpacerBefore?' ':''}${hint}${needsSpacerAfter?' ':''}`;
  ta.value=before+insertText+after;
  const caret=before.length+insertText.length;
  if(typeof ta.setSelectionRange==='function') ta.setSelectionRange(caret,caret);
  ta.focus();
  el.classList.add('used');
  handleFieldValueChanged_();
}

function getCustomValues(){
  const vals=[];
  myFields.forEach((f,i)=>{
    const el=document.querySelector(`.field-inp[data-idx="${i}"]`);
    vals.push(el?el.value:'');
  });
  return vals;
}

function setFocus(key){
  focusField=key;
  if(window._lastTl) renderTl(window._lastTl);
}

function getChipFieldLabel_(field){
  return String(field?.label||field?.key||'').trim();
}

function getReviewFieldDef_(){
  return myFields.find(field=>field&&field.type==='review') || null;
}

function getReviewHintLabels_(field){
  return String(field?.hints||'')
    .split(',')
    .map(text=>String(text||'').trim())
    .filter(Boolean);
}

function escapeRegex_(text){
  return String(text||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function renderInlineChipText_(text, labels){
  const source=String(text||'');
  const normalizedLabels=(labels||[]).map(label=>String(label||'').trim()).filter(Boolean);
  if(!normalizedLabels.length) return esc(source).replace(/\n/g,'<br>');
  const uniqueLabels=[...new Set(normalizedLabels)].sort((a,b)=>b.length-a.length);
  const labelMap={};
  uniqueLabels.forEach(label=>{ labelMap[label]=true; });
  const pattern=new RegExp(`(${uniqueLabels.map(escapeRegex_).join('|')})`,'g');
  return source
    .split(pattern)
    .map(part=>labelMap[part] ? `<span class="inline-chip">${esc(part)}</span>` : esc(part).replace(/\n/g,'<br>'))
    .join('');
}

function extractReviewChipLabelsFromText_(text, field){
  const source=String(text||'');
  return getReviewHintLabels_(field).filter(label=>label && source.indexOf(label)>=0).slice(0,6);
}

function stripReviewHintLines_(text, field){
  const labels=getReviewHintLabels_(field);
  if(!labels.length) return String(text||'').trim();
  let stripped=String(text||'');
  labels.forEach(label=>{
    if(!label) return;
    stripped=stripped.split(label).join('');
  });
  return stripped.replace(/\n{3,}/g,'\n\n').trim();
}

function renderStudentEntryChips(){
  const box=document.getElementById('studentReviewChips');
  if(!box) return;
  const values=getCustomValues();
  const count=getReviewTextLength_(values);
  const countHtml=count>0?`<span class="entry-chip count-chip">${count}もじ</span>`:'';
  if(!countHtml){
    box.style.display='none';
    box.innerHTML='';
    return;
  }
  box.style.display='flex';
  box.innerHTML=countHtml;
}

function getReviewText_(values){
  const reviewIdx=myFields.findIndex(field=>field&&field.type==='review');
  if(reviewIdx<0) return '';
  return String(values && values[reviewIdx] || '');
}

function getReviewTextLength_(values){
  const reviewField=getReviewFieldDef_();
  return stripReviewHintLines_(getReviewText_(values), reviewField).length;
}

function buildChipMarkup_(labels, count, cls){
  const chipClass=cls||'history-chip';
  const parts=[];
  (labels||[]).forEach(label=>{
    parts.push(`<span class="${chipClass}">${esc(label)}</span>`);
  });
  if(Number(count||0)>0){
    parts.push(`<span class="${chipClass} count-chip">${Number(count)}もじ</span>`);
  }
  return parts.join('');
}

// =====================================
//  自動保存
// =====================================
function resetAutoSave(){
  clearTimeout(autoTimer);
  if(!submitted){
    autoTimer=setTimeout(()=>{
      autoTimer=null;
      doSave(true);
      resetAutoSave();
    }, getNextAutoSaveDelay_());
  }
}

function doSave(silent){
  if(submitted||submitInFlight||autoSaveInFlight) return;
  const values=getCustomValues();
  const saveSignature=getStudentDraftSignature_(values);
  if(saveSignature===lastServerSavedSignature){
    studentDraftDirty=false;
    return;
  }
  autoSaveInFlight=true;
  google.script.run
    .withSuccessHandler(res=>{
      autoSaveInFlight=false;
      if(res && res.ok && res.reason!=='busy'){
        if(getStudentDraftSignature_(getCustomValues())===saveSignature){
          markStudentSaveSynced_(values);
        }
        persistStudentDraftLocally_();
        if(!silent) showToast('✅ ほぞんしたよ！');
      }
    })
    .withFailureHandler(()=>{
      autoSaveInFlight=false;
    })
    .autoSave(myUnitId,myPeriod,myNum,values);
}

// =====================================
//  提出
// =====================================
function doSubmit(){
  if(studentMaintenanceMode){
    showToast('いまはメンテナンス中だよ。少したってからもう一どひらいてね。');
    return;
  }
  if(submitInFlight) return;
  submitInFlight=true;
  clearInterval(autoTimer);
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='✅ ていしゅつずみ';
  const values=getCustomValues();
  const submitOptions={ saveAnswers:getStudentDraftSignature_(values)!==lastServerSavedSignature };
  submitted=true;
  lockSubmitted();
  document.getElementById('submitNote').textContent='⏳ ていしゅつ中…そのまままっててね';

  runStudentSubmit_(submitOptions.saveAnswers ? values : null, submitOptions, 0);
}

function runStudentSubmit_(values, submitOptions, attempt){
  google.script.run
    .withSuccessHandler(res=>{
      if(!res.ok){
        unlockAfterSubmitError_();
        showToast('⚠️ '+res.error);
        return;
      }
      submitInFlight=false;
      markStudentSaveSynced_(values || getCustomValues());
      persistStudentDraftLocally_();
      lastKnownAiStatus=res.queuedAi?'pending':'';
      if(res.queuedAi){
        showToast('🎉 ていしゅつできたよ！AIのコメントをまっててね✨');
      } else {
        showToast('🎉 ていしゅつできたよ！');
        if(res.studentAiEnabled){
          document.getElementById('submitNote').textContent='✅ ていしゅつずみ！AIコメントは先生のタイミングで返ってくるよ。';
        }
      }
      syncStudentTabState_();
      scheduleStudentHistoryPreload_();
      refreshTimeline({ force:true });
    })
    .withFailureHandler(e=>{
      if(attempt<1 && isRetriableSubmitError_(e)){
        setTimeout(()=>runStudentSubmit_(values, submitOptions, attempt+1), 700);
        return;
      }
      handleSubmitUnknownFailure_(e);
    })
    .submitReview(myUnitId,myPeriod,myNum,values,submitOptions||{});
}

function isRetriableSubmitError_(error){
  const message=String(error&&error.message||error||'');
  return /Failed to fetch|network|timeout|Request timed out|HTTP 5\d\d/i.test(message);
}

function handleSubmitUnknownFailure_(error){
  submitInFlight=false;
  document.getElementById('submitNote').textContent='提出結果を確認しています…';

  lockSubmitted();
  loadStudentState({ skipCachedState:true, skipTimelineRefresh:true });

}

function refreshTimeline(options){
  const opts=options||{};
  if(!myLessonId||!myActiveRevision) return;
  if(pollBusy){
    if(opts.force) timelineRefreshPending=true;
    return;
  }
  const requestId=++currentTimelineRequestId;
  const requestContext={
    studentNumber:String(myNum||''),
    lessonId:String(myLessonId||'').trim(),
    activeRevision:Number(myActiveRevision||0),
  };
  const perfSession=startTimelinePerfSession_();
  const startedAt=studentNowMs_();
  pollBusy=true;
  setTimelineRetryVisible_(false,'');
  const cacheKey=[myLessonId||myUnitId,myPeriod,myNum].join('_');
  google.script.run
    .withSuccessHandler(payload=>{
      if(!isTimelineResponseCurrent_(requestId, requestContext, payload)) return;
      logStudentApiTiming_('getTimelineSnapshot', payload);
      logStudentClientPerf_('timeline_response', {
        totalMs:Math.max(0, studentNowMs_()-startedAt),
        sincePageLoadMs:Math.max(0, studentNowMs_()-studentClientPerfState.pageStartedAt),
        studentNumber:Number(myNum||0),
        rowCount:Array.isArray(payload&&payload.rows)?payload.rows.length:0,
        lessonId:String(payload&&payload.lessonId||''),
        activeRevision:Number(payload&&payload.activeRevision||0),
        timing:payload&&payload.timing||null,
      });
      writeStudentCache_('timeline',cacheKey,Object.assign({}, payload||{}, {
        lessonId:requestContext.lessonId,
        activeRevision:requestContext.activeRevision,
      }));
      const me=applyTimelinePayload(payload);
      afterNextPaint_(()=>{
        if(perfSession.loggedRender || !isCurrentStudentContext_(requestContext.studentNumber, requestContext.lessonId, requestContext.activeRevision)) return;
        perfSession.loggedRender=true;
        logStudentClientPerf_('timeline_rendered', {
          totalMs:Math.max(0, studentNowMs_()-perfSession.startedAt),
          studentNumber:Number(requestContext.studentNumber||0),
          lessonId:requestContext.lessonId,
          activeRevision:requestContext.activeRevision,
          rowCount:Array.isArray(payload&&payload.rows)?payload.rows.length:0,
        });
      });
      pollBusy=false;
      if(timelineRefreshPending){
        timelineRefreshPending=false;
        setTimeout(()=>refreshTimeline({ force:true }), 120);
      }
      scheduleNextPoll(resolvePollDelay(me));
    })
    .withFailureHandler(err=>{
      if(requestId!==currentTimelineRequestId || !isCurrentStudentContext_(requestContext.studentNumber, requestContext.lessonId, requestContext.activeRevision)) return;
      logStudentApiFailure_('getTimelineSnapshot', err);
      logStudentClientPerf_('timeline_error', {
        totalMs:Math.max(0, studentNowMs_()-startedAt),
        studentNumber:Number(myNum||0),
        lessonId:requestContext.lessonId,
        activeRevision:requestContext.activeRevision,
        error:(err && err.message) ? err.message : String(err||'unknown'),
      });
      pollBusy=false;
      setTimelineRetryVisible_(true,'タイムラインの読み込みに失敗しました');
      if(timelineRefreshPending){
        timelineRefreshPending=false;
        setTimeout(()=>refreshTimeline({ force:true }), 800);
      }
      scheduleNextPoll(POLL_IDLE_MS);
    })
    .getTimelineSnapshot(myLessonId,myActiveRevision,myNum);
}

function applyTimelinePayload(payload){
  if(handleStudentActiveLessonChange_(payload)) return null;
  const rows=Array.isArray(payload)?payload:(payload?.rows||[]);
  const myState=payload && typeof payload==='object' ? (payload.myState || null) : null;
  lastTimelineServerNow=String(payload?.serverNow||'');
  teacherTimelineFieldKey = payload?.teacherTimelineFieldKey || teacherTimelineFieldKey || '';
  if(typeof payload?.studentAiEnabled!=='undefined') studentAiEnabled=Boolean(payload.studentAiEnabled);
  if(typeof payload?.studentAiAutoSubmitEnabled!=='undefined') studentAiAutoSubmitEnabled=Boolean(payload.studentAiAutoSubmitEnabled);
  applyStudentShellState_(payload?.shell||{});
  window._lastTl=rows;
  renderTl(rows);
  const me=myState && typeof myState==='object'
    ? Object.assign({}, myState)
    : (rows.find(r=>String(r.num)===String(myNum)) || null);
  lastKnownAiStatus=String(me?.aiStatus||lastKnownAiStatus||'');
  const meAiDone=String(me?.aiStatus||'')==='done';
  const meAiError=String(me?.aiStatus||'')==='error';
  const meAiWaiting=studentAiEnabled&&['pending','processing'].includes(String(me?.aiStatus||''));
  const returnedComment=String(me?.comment||'').trim();
  const hasAiComment=studentAiEnabled&&meAiDone;
  if(me&&returnedComment){
    const nextComment=String(me.comment||'').trim();
    const hadComment=Boolean(lastAiCommentText);
    setStudentCommentTitle_(hasAiComment);
    showAIBox(me.comment,me.rank,me.medal,me.medalColor);
    if(hasAiComment) updateAiArrivalNote_(me);
    if(hasAiComment && submitted && nextComment && !hadComment && !aiCommentAutoScrolled){
      aiCommentAutoScrolled=true;
      showAiArrivalBanner_(me);
      highlightAiBox_();
      scrollToAiCommentBox_();
    }
    lastAiCommentText=nextComment;
  } else if(studentAiEnabled&&me&&meAiError){
    setStudentCommentTitle_(true);
    showAIBox(me.comment||'AIのコメント作成に失敗しました。先生に伝えてね。','','','');
    lastAiCommentText='';
  } else if(me&&meAiWaiting){
    setStudentCommentTitle_(true);
    showAIBox('AIコメントをつくっています。少しまってね。','','','');
    lastAiCommentText='';
  } else {
    document.getElementById('aiBox').style.display='none';
  }
  syncStudentTabState_();
  return me;
}

function handleStudentActiveLessonChange_(payload){
  const active=payload && payload.active;
  if(!active || !myNum || studentActiveReloading) return false;
  const nextUnitId=String(active.unitId||'').trim();
  const nextPeriod=Number(active.period||0);
  const nextLessonId=String(active.lessonId||'').trim();
  const nextActiveRevision=Number(active.activeRevision||0);
  if(!nextUnitId || nextPeriod<=0){
    studentActiveReloading=true;
    stopPolling();
    const note=document.getElementById('submitNote');
    if(note) note.textContent='先生が授業を終了しました。画面を更新しています…';
    google.script.run
      .withSuccessHandler(d=>{
        studentActiveReloading=false;
        logStudentApiTiming_('studentInitActiveChanged', d);
        onInit(d);
      })
      .withFailureHandler(err=>{
        logStudentApiFailure_('studentInitActiveChanged', err);
        studentActiveReloading=false;
        scheduleNextPoll(POLL_IDLE_MS);
      })
      .studentInit(myNum,0);
    return true;
  }
  if(getLessonSessionKey_(myLessonId, myActiveRevision) && getLessonSessionKey_(myLessonId, myActiveRevision)===getLessonSessionKey_(nextLessonId, nextActiveRevision)) return false;
  if(!nextLessonId && String(myUnitId||'')===nextUnitId && Number(myPeriod||0)===nextPeriod) return false;
  studentActiveReloading=true;
  stopPolling();
  const note=document.getElementById('submitNote');
  if(note) note.textContent='先生が新しい授業を開始しました。画面を更新しています…';
  google.script.run
    .withSuccessHandler(d=>{
      studentActiveReloading=false;
      logStudentApiTiming_('studentInitActiveChanged', d);
      loadMain(d);
    })
    .withFailureHandler(err=>{
      logStudentApiFailure_('studentInitActiveChanged', err);
      studentActiveReloading=false;
      scheduleNextPoll(POLL_IDLE_MS);
    })
    .studentInit(myNum,0);
  return true;
}

function scheduleStudentHistoryPreload_(){
  if(!submitted||!myNum||studentHistoryLoaded||studentHistoryLoading||studentHistoryPreloadTimer) return;
  const run=()=>{
    studentHistoryPreloadTimer=null;
    if(!submitted||!myNum||studentHistoryLoaded||studentHistoryLoading) return;
    loadStudentPastRecords_({ background:true });
  };
  studentHistoryPreloadTimer=setTimeout(()=>{
    if(typeof requestIdleCallback==='function'){
      requestIdleCallback(run,{timeout:1200});
    }else{
      run();
    }
  },1200);
}

function loadStudentPastRecords_(options){
  const opts=options||{};
  if(!submitted||!myNum) return;
  if(studentHistoryLoading) return;
  studentHistoryLoading=true;
  const list=document.getElementById('studentHistoryList');
  if(list && !opts.background) list.innerHTML='<div class="history-empty"><span class="spinner"></span> よみこみ中…</div>';
  const cacheKey=[myNum,myUnitId].join('_');
  const cached=readStudentCache_('history',cacheKey);
  if(cached && (!opts.background || activeStudentTab==='history')) renderStudentPastRecords_(cached);
  google.script.run
    .withSuccessHandler(res=>{
      studentHistoryLoading=false;
      studentHistoryLoaded=!opts.background || activeStudentTab==='history';
      writeStudentCache_('history',cacheKey,res||{groups:[]});
      if(!opts.background || activeStudentTab==='history'){
        renderStudentPastRecords_(res||{groups:[]});
      }
    })
    .withFailureHandler(()=>{
      studentHistoryLoading=false;
      studentHistoryLoaded=!opts.background || activeStudentTab==='history';
      if(!opts.background || activeStudentTab==='history'){
        renderStudentPastRecords_({groups:[]});
      }
    })
    .getStudentPastRecords(myNum,myUnitId,6);

function formatDurationLabel_(ms){
  const totalSec=Math.max(0, Math.round(Number(ms||0)/1000));
  if(totalSec<60) return `${totalSec}秒`;
  const min=Math.floor(totalSec/60);
  const sec=totalSec%60;
  return `${min}分${sec}秒`;
}

function resolvePollDelay(me){
  if(!studentAiEnabled) return POLL_IDLE_MS;
  if(!me) return POLL_IDLE_MS;
  const aiStatus=String(me.aiStatus||'');
  const aiDone=aiStatus==='done';
  const aiError=aiStatus==='error';
  if(me.submitted && (aiStatus==='pending' || aiStatus==='processing')) return POLL_WAITING_AI_MS;
  if(me.submitted && aiDone && me.comment) return POLL_DONE_MS;
  if(me.submitted && aiError) return POLL_DONE_MS;
  return POLL_IDLE_MS;
}
