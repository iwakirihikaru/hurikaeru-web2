function sortUnitsByLatestActivity(units) {
    return (Array.isArray(units) ? units.slice() : []).sort(compareSuggestedStartUnit_);

function compareSuggestedStartUnit_(a, b) {
    var recentCmp = getUnitRecentSortValue_(b) - getUnitRecentSortValue_(a);
    if (recentCmp !== 0)
        return recentCmp;
    var progressA = unitProgressByUnitId[String(a && a.id || '')] || {};
    var progressB = unitProgressByUnitId[String(b && b.id || '')] || {};
    var countCmp = Number(progressB.lessonCount || 0) - Number(progressA.lessonCount || 0);
    if (countCmp !== 0)
        return countCmp;
    var idCmp = Number(b && b.id || 0) - Number(a && a.id || 0);
    if (idCmp !== 0)
        return idCmp;
    return String(b && b.createdAt || '').localeCompare(String(a && a.createdAt || ''));
}
function getSuggestedPeriodForUnit(unit) {
    if (!unit)
        return '';
    var max = (unit.maxPeriod === 0 || unit.maxPeriod > 20) ? 20 : Number(unit.maxPeriod || 10);
    var progress = unitProgressByUnitId[String(unit.id || '')] || {};
    var lastActivityPeriod = Math.max(0, Number(progress.lastActivityPeriod || 0));
    var next = Math.max(1, lastActivityPeriod > 0 ? lastActivityPeriod + 1 : 1);
    return String(Math.min(next, max));
}
