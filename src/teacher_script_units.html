<script>
let latestStatusRows=[];
let latestStatusMeta={};
let teacherStatusRequestSeq=0;
let teacherFeedbackResultTimer=null;
let unitSaveState={ busy:false, requestToken:'' };
let lessonFieldEditState={ mode:'unit', unitId:'', period:0 };
let teacherDraftLocalState={};
let unitListPage=1;
let lastUnitListSignature='';
const UNIT_LIST_PAGE_SIZE=10;
const TEACHER_FEEDBACK_PREFS_KEY='teacher_feedback_prefs_v1';
let teacherFeedbackPrefsLoaded=false;

function formatStatusTimingLine_(label,timing,keys){
  if(!timing || typeof timing!=='object' || !Array.isArray(keys) || !keys.length) return '';
  const parts=keys
    .map(key=>{
      const value=Number(timing[key]||0);
      if(!Number.isFinite(value) || value<=0) return '';
      const name=String(key||'').replace(/Ms$/,'');
      return `${name} ${value}ms`;
    })
    .filter(Boolean);
  if(!parts.length) return '';
  return `${label}: ${parts.join(' / ')}`;
}

function formatResponseReadMetaLine_(meta){
  if(!meta || typeof meta!=='object') return '';
  const mode=String(meta.mode||'').trim();
  if(!mode) return '';
  const parts=[`response ${mode}`];
  if(Number.isFinite(Number(meta.masterCount))) parts.push(`master ${Number(meta.masterCount||0)}`);
  if(Number.isFinite(Number(meta.mergedCount))) parts.push(`merged ${Number(meta.mergedCount||0)}`);
  return parts.join(' / ');
}

function formatUnitsReadMetaLine_(meta){
  if(!meta || typeof meta!=='object') return '';
  const mode=String(meta.mode||'').trim();
  if(!mode) return '';
  const parts=[`units ${mode}`];
  const masterReadPath=String(meta.masterReadPath||'').trim();
  if(masterReadPath) parts.push(masterReadPath);
  if(Number.isFinite(Number(meta.masterCount))) parts.push(`master ${Number(meta.masterCount||0)}`);
  if(Number.isFinite(Number(meta.mergedCount))) parts.push(`merged ${Number(meta.mergedCount||0)}`);
  if(meta.cached===true) parts.push('cached');
  return parts.join(' / ');
}

function renderStatusPerfDebug_(){
  const el=document.getElementById('statusPerfDebug');
  if(!el) return;
  const lessonTiming=latestStatusMeta && latestStatusMeta.timing || null;
  const requestTiming=latestStatusMeta && latestStatusMeta.serverRequestTiming || null;
  const responseReadMeta=latestStatusMeta && latestStatusMeta.responseReadMeta || null;
  const unitsReadMeta=(latestStatusMeta && latestStatusMeta.unitsReadMeta)
    || window.__teacherUnitsReadMeta
    || null;
  const lines=[
    formatStatusTimingLine_('表示データ',lessonTiming,['totalMs','snapshotMs','responsesMs','draftsMs','rosterMs','studentBuildMs']),
    formatStatusTimingLine_('初回読込',requestTiming,['totalMs','unitsMs','activeMs','unitProgressMs','lessonStatusMs']),
    formatUnitsReadMetaLine_(unitsReadMeta),
    formatResponseReadMetaLine_(responseReadMeta),
  ].filter(Boolean);
  if(!lines.length){
    el.style.display='none';
    el.textContent='';
    return;
  }
  el.style.display='block';
  el.textContent=lines.join(' | ');
}

function loadTeacherFeedbackPrefs_(){
  try{
    const raw=localStorage.getItem(TEACHER_FEEDBACK_PREFS_KEY);
    const parsed=raw?JSON.parse(raw):{};
    return parsed && typeof parsed==='object' ? parsed : {};
  }catch(_err){
    return {};
  }
}

function saveTeacherFeedbackPrefs_(){
  try{
    localStorage.setItem(TEACHER_FEEDBACK_PREFS_KEY, JSON.stringify({
      rankMode:(document.getElementById('teacherFeedbackRankMode')||{}).value||'with_rank',
      autoReturn:Boolean((document.getElementById('teacherFeedbackAutoReturn')||{}).checked),
      medalMode:(document.getElementById('teacherFeedbackMedalMode')||{}).value||'auto_award',
    }));
  }catch(_err){}
}

function applyTeacherFeedbackPrefs_(){
  if(teacherFeedbackPrefsLoaded) return;
  teacherFeedbackPrefsLoaded=true;
  const prefs=loadTeacherFeedbackPrefs_();
  const rankMode=document.getElementById('teacherFeedbackRankMode');
  const autoReturn=document.getElementById('teacherFeedbackAutoReturn');
  const medalMode=document.getElementById('teacherFeedbackMedalMode');
  if(rankMode) rankMode.value=String(prefs.rankMode||'with_rank');
  if(autoReturn) autoReturn.checked=Boolean(prefs.autoReturn);
  if(medalMode) medalMode.value=String(prefs.medalMode||'auto_award');
}

function bindTeacherFeedbackPrefs_(){
  applyTeacherFeedbackPrefs_();
  ['teacherFeedbackRankMode','teacherFeedbackAutoReturn','teacherFeedbackMedalMode'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el || el.dataset.prefBound==='1') return;
    el.dataset.prefBound='1';
    el.addEventListener('change', saveTeacherFeedbackPrefs_);
  });
}

function loadStatus(){
  bindTeacherFeedbackPrefs_();
  if(!activeUnitId||!activePeriod) return;
  if(preloadCache.statusLoading) return;
  preloadCache.statusLoading=true;
  const requestSeq=++teacherStatusRequestSeq;
  const requestUnitId=String(activeUnitId||'');
  const requestPeriod=Number(activePeriod||0);
  google.script.run
    .withSuccessHandler(d=>{
      preloadCache.statusLoading=false;
      if(requestSeq!==teacherStatusRequestSeq) return;
      if(String(activeUnitId||'')!==requestUnitId || Number(activePeriod||0)!==requestPeriod) return;
      const meta=d && d.meta || {};
      const responseUnitId=String(meta.unitId||requestUnitId);
      const responsePeriod=Number(meta.period||requestPeriod);
      if(responseUnitId!==requestUnitId || responsePeriod!==requestPeriod) return;
      renderStatus(d);
    })
    .withFailureHandler(()=>{
      preloadCache.statusLoading=false;
    })
    .getLessonStatus(requestUnitId,requestPeriod);
}

function applyActiveFromStatusMeta_(meta){
  const unitId=String(meta && meta.unitId || '').trim();
  const period=Number(meta && meta.period || 0);
  if(!unitId || period<=0 || teacherEndingLesson) return false;
  if(String(activeUnitId||'')===unitId && Number(activePeriod||0)===period) return false;
  activeUnitId=unitId;
  activePeriod=period;
  teacherActiveDebug=`status-meta resolved=${activeUnitId}/${activePeriod}`;
  renderActiveBanner({
    unitId,
    period,
    unitName:String(meta && meta.unitName || '').trim(),
    subject:String(meta && meta.subject || '').trim(),
  });
  renderTimelineFieldSelect({ unitId, period });
  populateUnitSelects();
  return true;
}

function renderStatus(d){
  latestStatusRows=Array.isArray(d && d.students)?d.students:[];
  latestStatusMeta=d && d.meta || {};
  applyActiveFromStatusMeta_(latestStatusMeta);
  if(!latestStatusRows.length && !(latestStatusMeta && (latestStatusMeta.unitId || latestStatusMeta.lessonId))){
    clearRenderedStatus_();
    return;
  }
  writeTeacherStatusPreloadCache_({
    meta:latestStatusMeta,
    students:latestStatusRows,
  });
  renderStatusPerfDebug_();
  const st=latestStatusRows;
  const aiReturnedCount=st.filter(s=>String(s.comment||'').trim()).length;
  const draftCount=st.filter(s=>hasTeacherDraft(s)).length;
  document.getElementById('statTotal').textContent    =st.length;
  document.getElementById('statWritten').textContent  =st.filter(s=>(s.writtenCount||0)>0).length;
  document.getElementById('statSubmitted').textContent=st.filter(s=>s.submitted).length;
  document.getElementById('statAI').textContent       =aiReturnedCount;
  syncTeacherFeedbackControls(st,draftCount);
  if(!st.length){
    document.getElementById('statusBody').innerHTML='<tr><td colspan="2" style="text-align:center;padding:18px;color:#78909C;">授業を開始すると、ここに児童の記録とフィードバックが表示されます。</td></tr>';
    return;
  }
  document.getElementById('statusBody').innerHTML=st.map(s=>`
    <tr>
      <td data-label="児童 / 提出内容" class="status-student-cell">${renderStatusStudentCell(s)}</td>
      <td data-label="フィードバック" class="status-comment-cell">${renderStatusComment(s)}</td>
    </tr>`).join('');
}

function renderStatusStudentCell(student){
  return `
    <div class="status-student-stack">
      <div class="status-student-head">
        <span class="status-name-text">${esc(formatStatusStudentName(student))}</span>
      </div>
      <div class="status-student-meta">
        <span>${renderUnderstandingChip(student.understanding)}</span>
        <span class="status-inline-block">${renderMedal(student.medal,student.medalColor)}</span>
      </div>
      ${renderStatusEntries(student)}
    </div>`;
}

function formatStatusStudentName(student){
  const num=String(student && student.num || '').trim();
  const name=safeStudentName(student);
  return num ? `${num}. ${name}` : name;
}

function safeStudentName(student){
  return String(student && student.name || '').trim() || `${student && student.num || ''}ばん`;
}

function renderStatusEntries(student){
  const entries=Array.isArray(student.entries)?student.entries:[];
  if(!entries.length){
    return '<span class="status-comment-empty">まだ入力がありません</span>';
  }
  return `<div class="status-field-list">${entries.map(entry=>`
    <div class="status-field-item">
      <span class="status-field-label">${esc(((entry.emoji||'') ? `${entry.emoji} ` : '') + (entry.label||entry.key||'項目'))}</span>
      <span class="status-field-value">${renderStatusEntryValue(entry)}</span>
    </div>
  `).join('')}</div>`;
}

function renderStatusEntryValue(entry){
  const value=String(entry&&entry.value||'');
  if(String(entry&&entry.type||'')==='review'){
    return renderTeacherReviewText_(value, [entry]);
  }
  return esc(value).replace(/\n/g,'<br>');
}

function renderStatusComment(student){
  const comment=String(student.comment||'').trim();
  const rank=String(student.rank||'').trim();
  const draftComment=String(student.draftComment||'').trim();
  const draftRank=String(student.draftRank||'').trim();
  const showStateInActions=Boolean(canTeacherFeedbackGenerateForStudent(student) && latestStatusMeta.teacherAiEnabled);
  const stateHtml=`<span class="status-ai-state-chip">${renderStudentAiState(student)}</span>`;
  const parts=[];
  if(comment || rank){
    parts.push(`
      <div class="status-meta-stack">
        <div class="status-comment-head">
          ${rank?`<span class="rank-chip r-${rank.replace('+','p')}">${rank}</span>`:'<span class="status-comment-empty">ランクなし</span>'}
          ${showStateInActions?'':stateHtml}
        </div>
        <div class="status-comment-text">${esc(comment||'コメントなし')}</div>
      </div>`);
  }else{
    parts.push(showStateInActions ? '' : `<div class="status-comment-head">${stateHtml}</div>`);
  }
  if(canTeacherFeedbackGenerateForStudent(student)){
    parts.push(renderTeacherDraftEditor(student,draftComment,draftRank));
  }
  return parts.join('');
}

function clearRenderedStatus_(){
  latestStatusRows=[];
  latestStatusMeta={};
  const totalEl=document.getElementById('statTotal');
  const writtenEl=document.getElementById('statWritten');
  const submittedEl=document.getElementById('statSubmitted');
  const aiEl=document.getElementById('statAI');
  if(totalEl) totalEl.textContent='0';
  if(writtenEl) writtenEl.textContent='0';
  if(submittedEl) submittedEl.textContent='0';
  if(aiEl) aiEl.textContent='0';
  syncTeacherFeedbackControls([],0);
  renderStatusPerfDebug_();
  const body=document.getElementById('statusBody');
  if(body){
    body.innerHTML='<tr><td colspan="2" style="text-align:center;padding:18px;color:#78909C;">授業を開始すると、ここに児童の記録とフィードバックが表示されます。</td></tr>';
  }
}

function renderTeacherDraftEditor(student,draftComment,draftRank){
  const responseId=String(student.responseId||'').trim();
  if(!responseId){
    return '<div class="status-draft-note">自動保存で記入が入ると下書きを作れます。</div>';
  }
  const draftViewState=syncTeacherDraftLocalState_(responseId,draftComment,draftRank);
  draftComment=draftViewState.comment;
  draftRank=draftViewState.rank;
  const hasDraft=draftComment || draftRank;
  const staleDraft=isTeacherDraftStaleForStudent(student);
  const canGenerateAi=Boolean(
    latestStatusMeta.teacherAiEnabled &&
    canTeacherFeedbackGenerateForStudent(student) &&
    (staleDraft || (!hasDraft && !String(student.comment||'').trim()))
  );
  return `
    <div class="status-draft-box">
      <div class="status-draft-head">
        <span>${staleDraft?'再提出あり / 再生成候補':(hasDraft?'AI下書き確認中':'教師下書き欄')}</span>
        <span class="status-draft-status${draftViewState.dirty?' is-dirty':''}">${draftViewState.dirty?'未保存':(student.draftUpdatedAt?esc(formatStatusTimestamp(student.draftUpdatedAt)):'未生成')}</span>
      </div>
      <textarea class="status-draft-textarea${draftViewState.commentDirty?' is-dirty':''}" data-response-id="${escAttr(responseId)}" placeholder="AI下書きや手入力コメントをここで確認・修正" oninput="updateTeacherFeedbackDraftFromRow(this)">${esc(draftComment)}</textarea>
      <select class="status-draft-rank${draftViewState.rankDirty?' is-dirty':''}" data-response-id="${escAttr(responseId)}" onchange="updateTeacherFeedbackDraftRankFromRow(this)">
        ${buildTeacherDraftRankOptions(draftRank)}
      </select>
      <div class="status-draft-medal-row">
        <span class="status-draft-medal-label">手動メダル</span>
        <select class="status-draft-medal" data-response-id="${escAttr(responseId)}" onchange="saveTeacherFeedbackMedalFromRow(this)">
          ${buildTeacherDraftMedalOptions(student.medal)}
        </select>
      </div>
      <div class="status-draft-actions">
        ${canGenerateAi?`<button class="btn-ai" type="button" onclick="generateTeacherFeedbackDraftForRow('${escAttr(responseId)}')">この児童をAI下書き</button>`:''}
        <button class="btn-subtle" type="button" onclick="saveTeacherFeedbackDraftForRow('${escAttr(responseId)}')">💾 下書きを保存</button>
        <button class="btn-update" type="button" onclick="returnTeacherFeedbackDraftForRow('${escAttr(responseId)}')">この児童を返却</button>
        <button class="btn-cancel" type="button" onclick="clearTeacherFeedbackDraftForRow('${escAttr(responseId)}')">下書きを消す</button>
        <span class="status-ai-state-chip">${renderStudentAiState(student)}</span>
      </div>
    </div>`;
}

function buildTeacherDraftRankOptions(selected){
  const current=String(selected||'').trim().toUpperCase();
  const ranks=['','C','C+','B','B+','A','A+','S','S+'];
  return ranks.map(rank=>`<option value="${escAttr(rank)}"${rank===current?' selected':''}>${rank||'ランクなし'}</option>`).join('');
}

function buildTeacherDraftMedalOptions(selected){
  const current=String(selected||'').trim();
  const medals=['','🥇','🥈','🥉','4th','5th'];
  const labels={
    '':'メダルなし',
    '🥇':'🥇 1位',
    '🥈':'🥈 2位',
    '🥉':'🥉 3位',
    '4th':'4位',
    '5th':'5位',
  };
  return medals.map(medal=>`<option value="${escAttr(medal)}"${medal===current?' selected':''}>${labels[medal]||medal}</option>`).join('');
}

function hasTeacherDraft(student){
  return String(student && student.draftStatus || '')==='draft' && Boolean(String(student && student.draftComment || '').trim() || String(student && student.draftRank || '').trim());
}

function canTeacherFeedbackGenerateForStudent(student){
  return Boolean(
    student &&
    String(student.responseId||'').trim() &&
    (String(student.review||'').trim() || Number(student.writtenCount||0)>0)
  );
}

function isTeacherDraftStaleForStudent(student){
  const responseAt=Date.parse(String(student && student.responseUpdatedAt || student && student.submittedAt || ''));
  const draftAt=Date.parse(String(student && student.draftUpdatedAt || student && student.draftReturnedAt || ''));
  if(!Number.isFinite(responseAt) || !Number.isFinite(draftAt)) return false;
  return responseAt > draftAt;
}

function getTeacherFeedbackMedalMode(){
  return (document.getElementById('teacherFeedbackMedalMode')||{}).value||'none';
}

function formatElapsedSeconds_(startedAt){
  const ms=Math.max(0, Date.now()-Number(startedAt||0));
  const sec=(ms/1000);
  return sec>=10 ? `${sec.toFixed(0)}秒` : `${sec.toFixed(1)}秒`;
}

function setTeacherFeedbackResult(message){
  const el=document.getElementById('teacherFeedbackResult');
  if(!el) return;
  el.textContent=String(message||'').trim();
  el.classList.toggle('show', Boolean(el.textContent));
  if(teacherFeedbackResultTimer){
    clearTimeout(teacherFeedbackResultTimer);
    teacherFeedbackResultTimer=null;
  }
  if(el.textContent){
    teacherFeedbackResultTimer=setTimeout(()=>{
      el.classList.remove('show');
      el.textContent='';
    }, 10000);
  }
}

function setActionButtonBusy_(buttonId, busyLabel){
  const btn=document.getElementById(buttonId);
  if(!btn) return null;
  if(!btn.dataset.defaultLabel) btn.dataset.defaultLabel=btn.textContent;
  btn.disabled=true;
  btn.textContent=busyLabel;
  return btn;
}

function setActionButtonDone_(btn, doneLabel){
  if(!btn) return;
  const defaultLabel=btn.dataset.defaultLabel||btn.textContent;
  btn.disabled=false;
  btn.textContent=doneLabel;
  setTimeout(()=>{
    btn.textContent=defaultLabel;
    syncTeacherFeedbackControls(latestStatusRows, latestStatusRows.filter(row=>hasTeacherDraft(row)).length);
  }, 2200);
}

function resetActionButton_(btn){
  if(!btn) return;
  btn.disabled=false;
  btn.textContent=btn.dataset.defaultLabel||btn.textContent;
}

function findTeacherDraftRow_(responseId){
  const normalized=String(responseId||'').trim();
  if(!normalized) return null;
  const field=document.querySelector(`.status-draft-textarea[data-response-id="${escAttr(normalized)}"]`)
    || document.querySelector(`.status-draft-rank[data-response-id="${escAttr(normalized)}"]`);
  return field ? field.closest('.status-draft-box') : null;
}

function getTeacherDraftState_(responseId){
  const normalized=String(responseId||'').trim();
  if(!normalized) return null;
  if(!teacherDraftLocalState[normalized]){
    teacherDraftLocalState[normalized]={
      comment:'',
      rank:'',
      commentDirty:false,
      rankDirty:false,
    };
  }
  return teacherDraftLocalState[normalized];
}

function syncTeacherDraftLocalState_(responseId, serverComment, serverRank){
  const entry=getTeacherDraftState_(responseId);
  const nextServerComment=String(serverComment||'');
  const nextServerRank=String(serverRank||'');
  if(!entry.commentDirty) entry.comment=nextServerComment;
  if(!entry.rankDirty) entry.rank=nextServerRank;
  return {
    comment:entry.comment,
    rank:entry.rank,
    commentDirty:Boolean(entry.commentDirty),
    rankDirty:Boolean(entry.rankDirty),
    dirty:Boolean(entry.commentDirty||entry.rankDirty),
  };
}

function syncTeacherDraftDirtyUi_(responseId){
  const row=findTeacherDraftRow_(responseId);
  const entry=getTeacherDraftState_(responseId);
  if(!row || !entry) return;
  const textarea=row.querySelector('.status-draft-textarea');
  const rank=row.querySelector('.status-draft-rank');
  const status=row.querySelector('.status-draft-status');
  if(textarea) textarea.classList.toggle('is-dirty', Boolean(entry.commentDirty));
  if(rank) rank.classList.toggle('is-dirty', Boolean(entry.rankDirty));
  if(status){
    const isDirty=Boolean(entry.commentDirty||entry.rankDirty);
    status.classList.toggle('is-dirty', isDirty);
    if(isDirty) status.textContent='未保存';
  }
}

function getTeacherDraftPendingCount_(){
  const ids=new Set();
  latestStatusRows.forEach(student=>{
    if(hasTeacherDraft(student) && String(student.responseId||'').trim()){
      ids.add(String(student.responseId||'').trim());
    }
  });
  Object.keys(teacherDraftLocalState).forEach(responseId=>{
    const entry=teacherDraftLocalState[responseId];
    if(entry && (entry.commentDirty||entry.rankDirty)) ids.add(responseId);
  });
  return ids.size;
}

function collectTeacherDraftValues_(responseId,row){
  const entry=getTeacherDraftState_(responseId);
  const targetRow=row||findTeacherDraftRow_(responseId);
  const textarea=targetRow ? targetRow.querySelector('.status-draft-textarea') : null;
  const rankSelect=targetRow ? targetRow.querySelector('.status-draft-rank') : null;
  const comment=textarea ? textarea.value||'' : (entry ? entry.comment||'' : '');
  const rank=rankSelect ? rankSelect.value||'' : (entry ? entry.rank||'' : '');
  if(entry){
    entry.comment=comment;
    entry.rank=rank;
  }
  return { comment, rank };
}

function collectTeacherFeedbackReturnDraftItems_(responseIds){
  return (Array.isArray(responseIds)?responseIds:[])
    .map(value=>String(value||'').trim())
    .filter(Boolean)
    .filter((value,index,array)=>array.indexOf(value)===index)
    .map(responseId=>{
      const row=findTeacherDraftRow_(responseId);
      const values=collectTeacherDraftValues_(responseId,row);
      return {
        responseId,
        draftComment:values.comment||'',
        draftRank:values.rank||'',
      };
    })
    .filter(item=>String(item.draftComment||'').trim());
}

function applyTeacherFeedbackReturnedOptimistic_(responseIds, draftItems){
  const returnedAt=new Date().toISOString();
  const ids=(Array.isArray(responseIds)?responseIds:[])
    .map(value=>String(value||'').trim())
    .filter(Boolean);
  if(!ids.length) return;
  const idSet=new Set(ids);
  const draftMap={};
  (Array.isArray(draftItems)?draftItems:[]).forEach(item=>{
    const responseId=String(item && item.responseId || '').trim();
    if(responseId) draftMap[responseId]=item;
  });
  latestStatusRows=(Array.isArray(latestStatusRows)?latestStatusRows:[]).map(student=>{
    const responseId=String(student && student.responseId || '').trim();
    if(!idSet.has(responseId)) return student;
    const values=collectTeacherDraftValues_(responseId,findTeacherDraftRow_(responseId));
    const draft=draftMap[responseId]||{};
    const nextComment=String(draft.draftComment||draft.comment||values.comment||student.comment||'');
    const nextRank=String(draft.draftRank||draft.rank||values.rank||student.rank||'');
    const next=Object.assign({}, student, {
      comment:nextComment,
      rank:nextRank,
      draftComment:nextComment,
      draftRank:nextRank,
      draftStatus:'returned',
      draftUpdatedAt:returnedAt,
      draftReturnedAt:returnedAt,
      aiStatus:'done',
    });
    const entry=getTeacherDraftState_(responseId);
    if(entry){
      entry.comment=next.draftComment;
      entry.rank=next.draftRank;
      entry.commentDirty=false;
      entry.rankDirty=false;
    }
    return next;
  });
  renderStatus({ students:latestStatusRows, meta:latestStatusMeta });
}

function scheduleTeacherStatusRefreshAfterReturn_(){
  setTimeout(()=>loadStatus(), 900);
}

function updateTeacherFeedbackDraftFromRow(textarea){
  const responseId=String(textarea && textarea.dataset && textarea.dataset.responseId || '').trim();
  if(!responseId) return;
  const entry=getTeacherDraftState_(responseId);
  if(!entry) return;
  entry.comment=textarea.value||'';
  entry.commentDirty=true;
  syncTeacherDraftDirtyUi_(responseId);
}

function updateTeacherFeedbackDraftRankFromRow(select){
  const responseId=String(select && select.dataset && select.dataset.responseId || '').trim();
  if(!responseId) return;
  const entry=getTeacherDraftState_(responseId);
  if(!entry) return;
  entry.rank=select.value||'';
  entry.rankDirty=true;
  syncTeacherDraftDirtyUi_(responseId);
}

function setTeacherDraftRowBusy_(responseId,isBusy,busyLabel){
  const row=findTeacherDraftRow_(responseId);
  if(!row) return;
  row.dataset.busy=isBusy ? '1' : '';
  const controls=row.querySelectorAll('textarea,select,button');
  controls.forEach(control=>{ control.disabled=Boolean(isBusy); });
  const chip=row.querySelector('.status-ai-state-chip');
  if(chip && isBusy && busyLabel){
    if(!chip.dataset.defaultLabel) chip.dataset.defaultLabel=chip.textContent||'';
    chip.textContent=busyLabel;
  }else if(chip && !isBusy && chip.dataset.defaultLabel){
    chip.textContent=chip.dataset.defaultLabel;
  }
}

function isTeacherDraftRowBusy_(row){
  return String(row && row.dataset && row.dataset.busy || '')==='1';
}

function syncTeacherFeedbackControls(st,draftCount){

function generateTeacherFeedbackDraftsFromStatus(onlyMissing){
  if(!activeUnitId||!activePeriod){ showToast('単元と時間目を選択してください'); return; }

  const medalMode=getTeacherFeedbackMedalMode();

  }
  const startedAt=Date.now();
  const btn=setActionButtonBusy_(missingOnly?'teacherFeedbackGenerateBtn':'teacherFeedbackGenerateAllBtn', autoReturn?'⏳ 生成して返却中…':'⏳ 生成中…');

    : (missingOnly?'未生成分のAI下書きを生成しています…':'AI下書きを一括生成しています…'));

    .withSuccessHandler(res=>{

        ? `AI下書き ${res.updatedCount||0}人分を生成し、${res.returnedCount||0}人へ返却しました${medalText}${skipped?` / 対象外 ${skipped}人`:''} / ${elapsedText}`
        : `AI下書きを ${res.updatedCount||0}人分生成しました${skipped?` / 対象外 ${skipped}人`:''} / ${elapsedText}`;

      resetActionButton_(btn);
      showToast(err && err.message || 'AI下書き生成に失敗しました');
    })
    .generateTeacherFeedbackDrafts(activeUnitId,activePeriod,includeRank,autoReturn,[],missingOnly,medalMode);
}

function generateAndReturnTeacherFeedbackChunks_(missingOnly, includeRank){
  const targetIds=(Array.isArray(latestStatusRows)?latestStatusRows:[])
    .filter(row=>canTeacherFeedbackGenerateForStudent(row))
    .filter(row=>missingOnly ? !String(row.comment||'').trim() : true)
    .map(row=>String(row.responseId||'').trim())
    .filter(Boolean)
    .filter((value,index,array)=>array.indexOf(value)===index);
  if(!targetIds.length){ showToast('AIコメントを作れる記録がありません'); return; }
  const chunkSize=6;
  const chunks=[];
  for(let i=0;i<targetIds.length;i+=chunkSize){
    chunks.push(targetIds.slice(i,i+chunkSize));
  }
  const btn=setActionButtonBusy_(missingOnly?'teacherFeedbackGenerateBtn':'teacherFeedbackGenerateAllBtn', '⏳ 生成して返却中…');
  const startedAt=Date.now();
  let completed=0;
  let updatedCount=0;
  let returnedCount=0;
  let skippedExistingCount=0;
  const runChunk=index=>{
    if(index>=chunks.length){
      const msg=`AIコメントを ${updatedCount}人分生成し、${returnedCount}人へ返却しました${skippedExistingCount?` / 対象外 ${skippedExistingCount}人`:''} / ${formatElapsedSeconds_(startedAt)}`;
      showToast(msg);
      setTeacherFeedbackResult(`完了: ${msg}`);
      setActionButtonDone_(btn, '✅ 完了');
      scheduleTeacherStatusRefreshAfterReturn_();
      return;
    }
    const chunk=chunks[index];
    setTeacherFeedbackResult(`生成して返却中: ${completed}/${targetIds.length}人完了`);
    google.script.run
      .withSuccessHandler(res=>{
        if(!(res && res.ok)){
          resetActionButton_(btn);
          showToast(res && res.error || 'AI生成と返却に失敗しました');
          scheduleTeacherStatusRefreshAfterReturn_();
          return;
        }
        updatedCount+=Number(res.updatedCount||0);
        returnedCount+=Number(res.returnedCount||0);
        skippedExistingCount+=Number(res.skippedExistingCount||0);
        completed+=chunk.length;
        if(Array.isArray(res.returnedIds) && res.returnedIds.length){
          applyTeacherFeedbackReturnedOptimistic_(res.returnedIds, res.drafts);
        }
        runChunk(index+1);
      })
      .withFailureHandler(err=>{
        resetActionButton_(btn);
        showToast(err && err.message || 'AI生成と返却に失敗しました');
        scheduleTeacherStatusRefreshAfterReturn_();
      })
      .generateTeacherFeedbackDrafts(activeUnitId,activePeriod,includeRank,true,chunk,missingOnly,'none');
  };
  showToast(`AIコメントを${chunks.length}回に分けて、できた順に返却します…`);
  runChunk(0);
}

function persistTeacherFeedbackDraftForRow_(responseId, options){
  const normalized=String(responseId||'').trim();
  if(!normalized) return;
  const opts=options||{};
  const row=findTeacherDraftRow_(normalized);
  if(isTeacherDraftRowBusy_(row) && opts.allowBusy!==true){
    if(typeof opts.onFailure==='function') opts.onFailure({ message:'他の処理が完了するまで待ってください。' });
    return;
  }
  const entry=getTeacherDraftState_(normalized);
  const values=collectTeacherDraftValues_(normalized,row);
  const hasDirty=Boolean(entry && (entry.commentDirty||entry.rankDirty));
  if(!hasDirty && opts.force!==true){
    if(typeof opts.onSuccess==='function') opts.onSuccess({ ok:true, skipped:true });
    return;
  }
  setTeacherDraftRowBusy_(normalized,true,opts.busyLabel||'下書き保存中');
  google.script.run
    .withSuccessHandler(res=>{
      setTeacherDraftRowBusy_(normalized,false);
      if(!(res && res.ok)){
        if(typeof opts.onFailure==='function') opts.onFailure({ message:res && res.error || '下書き保存に失敗しました' });
        return;
      }
      if(entry){
        entry.comment=String(res.draft && res.draft.draftComment != null ? res.draft.draftComment : values.comment || '');
        entry.rank=String(res.draft && res.draft.draftRank != null ? res.draft.draftRank : values.rank || '');
        entry.commentDirty=false;
        entry.rankDirty=false;
      }
      const textarea=row ? row.querySelector('.status-draft-textarea') : null;
      const rankSelect=row ? row.querySelector('.status-draft-rank') : null;
      if(textarea) textarea.value=entry ? entry.comment : values.comment;
      if(rankSelect) rankSelect.value=entry ? entry.rank : values.rank;
      syncTeacherDraftDirtyUi_(normalized);
      const status=row ? row.querySelector('.status-draft-status') : null;
      if(status) status.textContent='保存済み';
      if(typeof opts.onSuccess==='function') opts.onSuccess(res);
    })
    .withFailureHandler(err=>{
      setTeacherDraftRowBusy_(normalized,false);
      if(typeof opts.onFailure==='function') opts.onFailure(err);
    })
    .saveTeacherFeedbackDraft(normalized, values.comment||'', values.rank||'');
}

function flushTeacherFeedbackDrafts_(responseIds, onSuccess, onFailure){
  const queue=(Array.isArray(responseIds)?responseIds:[])
    .map(value=>String(value||'').trim())
    .filter(Boolean)
    .filter((value,index,array)=>array.indexOf(value)===index)
    .filter(value=>{
      const entry=getTeacherDraftState_(value);
      return Boolean(entry && (entry.commentDirty||entry.rankDirty));
    });
  if(!queue.length){
    if(typeof onSuccess==='function') onSuccess();
    return;
  }
  const payload=queue.map(responseId=>{
    const row=findTeacherDraftRow_(responseId);
    const values=collectTeacherDraftValues_(responseId,row);
    setTeacherDraftRowBusy_(responseId,true,'返却前に保存中');
    return {
      responseId,
      draftComment:values.comment||'',
      draftRank:values.rank||'',
    };
  });
  google.script.run
    .withSuccessHandler(res=>{
      queue.forEach(responseId=>setTeacherDraftRowBusy_(responseId,false));
      if(!(res && res.ok)){
        if(typeof onFailure==='function') onFailure({ message:res && res.error || '返却前の保存に失敗しました' });
        return;
      }
      const savedMap={};
      (Array.isArray(res.drafts)?res.drafts:[]).forEach(draft=>{
        const responseId=String(draft && draft.responseId || '').trim();
        if(responseId) savedMap[responseId]=draft;
      });
      queue.forEach(responseId=>{
        const entry=getTeacherDraftState_(responseId);
        const row=findTeacherDraftRow_(responseId);
        const values=collectTeacherDraftValues_(responseId,row);
        const saved=savedMap[responseId]||{};
        if(entry){
          entry.comment=String(saved.draftComment != null ? saved.draftComment : values.comment || '');
          entry.rank=String(saved.draftRank != null ? saved.draftRank : values.rank || '');
          entry.commentDirty=false;
          entry.rankDirty=false;
        }
        const status=row ? row.querySelector('.status-draft-status') : null;
        if(status) status.textContent='保存済み';
        syncTeacherDraftDirtyUi_(responseId);
      });
      if(typeof onSuccess==='function') onSuccess(res);
    })
    .withFailureHandler(err=>{
      queue.forEach(responseId=>setTeacherDraftRowBusy_(responseId,false));
      if(typeof onFailure==='function') onFailure(err);
    })
    .saveTeacherFeedbackDraftsBulk(payload);
}

function formatStatusTimestamp(value){
  const text=String(value||'').trim();
  if(!text) return '';
  const d=new Date(text);
  if(Number.isNaN(d.getTime())) return text;
  const hh=String(d.getHours()).padStart(2,'0');
  const mi=String(d.getMinutes()).padStart(2,'0');
  const ss=String(d.getSeconds()).padStart(2,'0');
  return `${hh}:${mi}:${ss}`;
}

function renderUnderstandingChip(value){
  const text=String(value||'').trim();
  if(!text) return '<span style="color:#90A4AE;font-size:12px;">未入力</span>';
  const color=text.includes('よく') ? '#2E7D32'
    : text.includes('だいたい') ? '#1976D2'
    : text.includes('あまり') ? '#FB8C00'
    : '#C62828';
  return `<span style="display:inline-block;padding:4px 10px;border-radius:999px;background:${color};color:#fff;font-size:11px;font-weight:bold;white-space:nowrap;">${esc(text)}</span>`;
}

function renderUnitList(){
  const el=document.getElementById('unitList');
  const summaryEl=document.getElementById('unitListSummary');
  const pagerEl=document.getElementById('unitListPager');
  if(!allUnits.length){
    if(summaryEl) summaryEl.textContent='単元はまだありません。右の「新しい単元を追加」から作成できます。';
    if(pagerEl){ pagerEl.style.display='none'; pagerEl.innerHTML=''; }
    el.innerHTML='<p style="color:#999">単元がありません</p>';
    return;
  }
  const subject=(document.getElementById('unitListSubjectFilter')||{}).value||'';
  const keyword=((document.getElementById('unitListSearch')||{}).value||'').trim().toLowerCase();
  const sortKey=(document.getElementById('unitListSort')||{}).value||'subject_group';
  const signature=[subject,keyword,sortKey,allUnits.length].join('|');
  if(signature!==lastUnitListSignature){
    unitListPage=1;
    lastUnitListSignature=signature;
  }
  saveUiState({
    unitListSubjectFilter:subject,
    unitListSearch:(document.getElementById('unitListSearch')||{}).value||'',
    unitListSort:sortKey,
  });
  const visibleUnits=allUnits.filter(unit=>{
    const subjectOk=!subject||String(unit.subject||'')===String(subject);
    const keywordOk=!keyword||String(unit.name||'').toLowerCase().includes(keyword);
    return subjectOk&&keywordOk;
  }).sort((a,b)=>compareUnitRows(a,b,sortKey));
  if(!visibleUnits.length){
    if(summaryEl) summaryEl.textContent=`全 ${allUnits.length} 件中、条件に合う単元はありません。条件を変えると表示されます。`;
    if(pagerEl){ pagerEl.style.display='none'; pagerEl.innerHTML=''; }
    el.innerHTML='<p style="color:#999">条件に合う単元がありません</p>';
    return;
  }
  const pageCount=Math.max(1,Math.ceil(visibleUnits.length/UNIT_LIST_PAGE_SIZE));
  unitListPage=Math.min(pageCount,Math.max(1,unitListPage));
  const pageStart=(unitListPage-1)*UNIT_LIST_PAGE_SIZE;
  const pagedUnits=visibleUnits.slice(pageStart,pageStart+UNIT_LIST_PAGE_SIZE);
  if(summaryEl){
    const subjectText=subject ? `${subject}のみ` : '全教科';
    const keywordText=keyword ? ` / 「${keyword}」で検索中` : '';
    const pageText=pageCount>1 ? ` / ${unitListPage} / ${pageCount} ページ` : '';
    summaryEl.textContent=`現在 ${visibleUnits.length} 件中 ${pageStart+1}〜${pageStart+pagedUnits.length} 件を表示（全 ${allUnits.length} 件、${subjectText}${keywordText}${pageText}）`;
  }
  if(pagerEl){
    if(pageCount<=1){
      pagerEl.style.display='none';
      pagerEl.innerHTML='';
    }else{
      pagerEl.style.display='flex';
      pagerEl.innerHTML=`
        <button class="btn-sm" type="button" onclick="changeUnitListPage(-1)" ${unitListPage<=1?'disabled':''}>← 前へ</button>
        <span style="font-size:12px;color:var(--muted);">${unitListPage} / ${pageCount} ページ</span>
        <button class="btn-sm" type="button" onclick="changeUnitListPage(1)" ${unitListPage>=pageCount?'disabled':''}>次へ →</button>`;
    }
  }
  if(sortKey==='subject_group'){
    const grouped=pagedUnits.reduce((acc,unit)=>{
      const key=String(unit.subject||'未設定');
      if(!acc[key]) acc[key]=[];
      acc[key].push(unit);
      return acc;
    },{});
    const subjects=Object.keys(grouped).sort((a,b)=>a.localeCompare(b,'ja'));
    el.innerHTML=subjects.map(groupSubject=>{
      const collapsed=isUnitGroupCollapsed(groupSubject);
      const rows=grouped[groupSubject].sort((a,b)=>compareUnitRows(a,b,'name'));
      const encodedSubject=encodeURIComponent(groupSubject);
      return `<div class="unit-group">
        <button class="unit-group-toggle" type="button" onclick="toggleUnitGroupByEncoded('${encodedSubject}')">
          <span>${esc(groupSubject)}</span>
          <span class="meta">${rows.length}件 ${collapsed?'▼':'▲'}</span>
        </button>
        <div class="unit-group-body" style="display:${collapsed?'none':'block'};">
          ${rows.map(renderUnitRow).join('')}
        </div>
      </div>`;
    }).join('');
    return;
  }
  el.innerHTML=pagedUnits.map(renderUnitRow).join('');
}

function changeUnitListPage(delta){
  unitListPage=Math.max(1,unitListPage+(Number(delta)||0));
  renderUnitList();
}

function compareUnitRows(a,b,sortKey){
  if(String(a.id)===String(activeUnitId) && String(b.id)!==String(activeUnitId)) return -1;
  if(String(b.id)===String(activeUnitId) && String(a.id)!==String(activeUnitId)) return 1;
  if(sortKey==='recent_activity'){
    return compareSuggestedStartUnit_(a,b) || String(a.name||'').localeCompare(String(b.name||''),'ja');
  }
  if(sortKey==='name'){
    return String(a.name||'').localeCompare(String(b.name||''),'ja');
  }
  if(sortKey==='created_desc'){
    return toUnitCreatedAtValue(b)-toUnitCreatedAtValue(a) || String(a.name||'').localeCompare(String(b.name||''),'ja');
  }
  if(sortKey==='created_asc'){
    return toUnitCreatedAtValue(a)-toUnitCreatedAtValue(b) || String(a.name||'').localeCompare(String(b.name||''),'ja');
  }
  const subjectCmp=String(a.subject||'').localeCompare(String(b.subject||''),'ja');
  if(subjectCmp!==0) return subjectCmp;
  return String(a.name||'').localeCompare(String(b.name||''),'ja');
}

function renderUnitRow(u){
  return `<div class="unit-row ${u.id==activeUnitId?'active-unit':''}">
    <span class="unit-badge">${esc(u.subject)}</span>

function rememberRecentCustomPreset(field){
  if(!field || !field.key) return;
  const normalized={...field, enabled:true};
  recentCustomPresets=[normalized].concat(recentCustomPresets.filter(p=>String(p.key)!==String(normalized.key)));
  if(preloadCache.editor){
    preloadCache.editor.recentCustomPresets=recentCustomPresets.slice();
    persistTeacherPreloadCache_();
  }
  renderPresetBtns();
  google.script.run
    .withSuccessHandler(res=>{
      if(res && res.preset){
        recentCustomPresets=[res.preset].concat(recentCustomPresets.filter(p=>String(p.key)!==String(res.preset.key)));
        if(preloadCache.editor){
          preloadCache.editor.recentCustomPresets=recentCustomPresets.slice();
          persistTeacherPreloadCache_();
        }
        renderPresetBtns();
      }
    })
    .withFailureHandler(err=>{
      console.warn('recent custom preset save failed', err);
    })
    .saveRecentCustomFieldPreset(normalized);
}

function removeRecentCustomPreset(key){
  recentCustomPresets=recentCustomPresets.filter(p=>String(p.key)!==String(key));
  if(preloadCache.editor){
    preloadCache.editor.recentCustomPresets=recentCustomPresets.slice();
    persistTeacherPreloadCache_();
  }
  renderPresetBtns();
  google.script.run
    .withSuccessHandler(()=>{})
    .withFailureHandler(err=>{
      console.warn('recent custom preset delete failed', err);
    })
    .deleteRecentCustomFieldPreset(key);
}

function renderPresetBtns(){
  const container=document.getElementById('presetBtns');
  const presetHtml=allPresets.map(p=>{
    const active=editingFields.some(f=>f.key===p.key&&f.enabled!==false);
    return `<button class="preset-btn ${active?'active-preset':''}" type="button"
      onclick="togglePreset('${escAttr(p.key)}')" data-key="${escAttr(p.key)}">
      ${p.emoji} ${esc(p.label)}</button>`;
  }).join('');
  const recentHtml=recentCustomPresets.map(p=>{
    const active=editingFields.some(f=>f.key===p.key&&f.enabled!==false);
    return `<button class="preset-btn recent-preset ${active?'active-preset':''}" type="button"
      onclick="toggleRecentCustomPreset('${escAttr(p.key)}')" data-key="${escAttr(p.key)}">
      <span class="preset-chip-inner">${p.emoji||'🆕'} ${esc(p.label)}
      <span class="preset-remove" onclick="event.stopPropagation();removeRecentCustomPreset('${escAttr(p.key)}')" title="このプリセットを外す">✕</span></span></button>`;
  }).join('');
  container.innerHTML=
    `<div class="preset-group">
      <div class="preset-group-label">よく使う項目</div>
      <div class="preset-btns">${presetHtml||'<span class="field-help">プリセットはありません。</span>'}</div>
    </div>`+
    `<div class="preset-group">
      <div class="preset-group-label">最近つくったカスタム項目</div>
      <div class="preset-btns">${recentHtml||'<span class="field-help">まだありません。追加した項目がここに出ます。</span>'}</div>
    </div>`;
}

function togglePreset(key){
  const preset=allPresets.find(p=>p.key===key);
  if(!preset) return;
  const idx=editingFields.findIndex(f=>f.key===key);
  if(idx>=0){
    // 既にある → enabled切替
    editingFields[idx].enabled=!editingFields[idx].enabled;
  } else {
    // 追加
    editingFields.push({...preset, enabled:true});
  }
  renderFieldList();
  renderPresetBtns();
}

function toggleRecentCustomPreset(key){
  const preset=recentCustomPresets.find(p=>p.key===key);
  if(!preset) return;
  const idx=editingFields.findIndex(f=>f.key===key);
  if(idx>=0){
    editingFields[idx].enabled=!editingFields[idx].enabled;
  } else {
    editingFields.push({...preset, enabled:true});
  }
  renderFieldList();
  renderPresetBtns();
}

function moveField(index, delta){

  if(index<0||index>=editingFields.length) return;
  if(nextIndex<0||nextIndex>=editingFields.length) return;
  const moved=editingFields.splice(index,1)[0];
  editingFields.splice(nextIndex,0,moved);

  renderPresetBtns();

function addCustomField(){
  const field=createCustomFieldFromInputs('cf', editingFields);
  if(!field) return;
  editingFields.push(field);

  renderFieldList();renderPresetBtns();
}

function saveCustomField(){
  const editIndex=parseInt(document.getElementById('cfEditIndex').value,10);
  if(Number.isInteger(editIndex) && editIndex>=0 && editIndex<editingFields.length){
    const existing=editingFields[editIndex];
    const updated=createCustomFieldFromInputs('cf', editingFields, { preserveKey:existing.key, preserveEnabled:existing.enabled!==false });
    if(!updated) return;
    editingFields[editIndex]={...existing,...updated};
    if(!allPresets.some(p=>p.key===existing.key)){
      rememberRecentCustomPreset(editingFields[editIndex]);
    }
    resetCustomFieldEditor();
    renderFieldList();
    renderPresetBtns();
    return;
  }
  addCustomField();
}

function createCustomFieldFromInputs(prefix, existingFields, options){
  const label=document.getElementById(prefix+'Label').value.trim();
  const type=document.getElementById(prefix+'Type').value;
  const emoji=document.getElementById(prefix+'Emoji').value.trim()||'🆕';
  const isRosterChoice=type==='student_select'||type==='student_multi';
  const fieldOptions=isRosterChoice ? '' : parseFieldOptionsInput(document.getElementById(prefix+'Options').value);
  const placeholder=document.getElementById(prefix+'Placeholder').value.trim();
  const categories=getCheckedCategories(prefix);
  if(!label){alert('項目名を入力してください');return null;}
  const preserveKey=String(options && options.preserveKey || '').trim();
  let key=preserveKey;
  if(!key){
    const baseKey=label.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\u3040-\u30ff\u4e00-\u9faf]/g,'');
    const keySeed=baseKey||`field_${existingFields.length+1}`;
    key=keySeed;
    let suffix=2;
    while(existingFields.some(f=>f.key===key)||allPresets.some(p=>p.key===key)||recentCustomPresets.some(p=>p.key===key)){
      key=`${keySeed}_${suffix++}`;
    }
  }
  return {
    key,
    label,
    emoji,
    type,
    placeholder:placeholder || (isRosterChoice ? '名簿からえらんでね' : ''),
    options:fieldOptions,
    hints:type==='review'?'がんばったこと,やり方,わかったこと,次にしたいこと':'',
    categories,
    enabled:!(options && options.preserveEnabled===false),
    isReview:type==='review',
  };
}

function parseFieldOptionsInput(value){
  const tokens=String(value||'')
    .split(/\r?\n|,/)
    .map(token=>token.trim())
    .filter(Boolean);
  return tokens.join(',');
}

function setCheckedCategories(prefix, categories){
  const selected=new Set(Array.isArray(categories)?categories:[]);
  document.querySelectorAll(`#${prefix}CategoryChecks input[type="checkbox"]`).forEach(input=>{

function formatFieldCategorySuffix(field){
  const labels=((field && field.categories) || []).map(category=>FIELD_CATEGORY_LABELS[category]).filter(Boolean);
  return labels.length?` / ${labels.join('・')}`:'';
}

function guessFieldCategories(field){
  const key=String(field && field.key || '').toLowerCase();
  const label=String(field && field.label || '').toLowerCase();
  const type=String(field && field.type || '').toLowerCase();
  const text=`${key} ${label} ${type}`;
  const categories=[];
  const includes=(words)=>words.some(word=>text.includes(word));
  if(includes(['理解','できた','わかった','まとめ','用語','知識','技能','eval','summary'])){
    categories.push('knowledge');
  }
  if(includes(['ふりかえり','review','やり方','方法','工夫','理由','考え','説明','method'])){
    categories.push('thinking');
  }
  if(includes(['めあて','goal','ふりかえり','review','次','がんば','取り組','method','やり方'])){
    categories.push('attitude');
  }
  return categories.filter((category,index,arr)=>arr.indexOf(category)===index);
}

function autoTagFieldCollection(fields){
  let updated=0;
  const next=(fields||[]).map(field=>{
    if((((field && field.categories) || []).length)) return field;
    const guessed=guessFieldCategories(field);
    if(!guessed.length) return field;
    updated++;
    return {...field,categories:guessed};
  });
  return {fields:next,updated};
}

function autoTagUnitFields(){
  const result=autoTagFieldCollection(editingFields);
  editingFields=result.fields;
  renderFieldList();
  renderPresetBtns();
  alert(result.updated?`観点タグを ${result.updated} 項目に設定しました。`:'追加で設定できる観点タグはありませんでした。');

function readUnitMaxPeriod_(){
  const raw=String(document.getElementById('fMax').value||'').trim();
  if(raw==='') return { ok:false, message:'最大時間数を入力してください。0 は無制限です。' };
  if(!/^\d+$/.test(raw)) return { ok:false, message:'最大時間数は 0〜99 の整数で入力してください。' };
  const value=parseInt(raw,10);
  if(value<0||value>99) return { ok:false, message:'最大時間数は 0〜99 の整数で入力してください。' };
  return { ok:true, value };
}

  const meta=document.getElementById('unitSaveMeta');

  meta.textContent=String(message||'');
  meta.classList.remove('is-busy','is-error','is-success');
  if(state) meta.classList.add(`is-${state}`);
}

  const saveBtn=document.getElementById('unitSaveBtn');
  const cancelBtn=document.getElementById('unitCancelBtn');
  const jumpBtn=document.querySelector('.btn-jump-add');
  const controls=document.querySelectorAll('#unitFormCard input,#unitFormCard select,#unitFormCard textarea,#unitFormCard button');
  controls.forEach(control=>{ control.disabled=Boolean(isBusy); });
  if(jumpBtn) jumpBtn.disabled=Boolean(isBusy);
  if(saveBtn){
    if(!saveBtn.dataset.defaultLabel) saveBtn.dataset.defaultLabel=saveBtn.textContent||'保存する';
    saveBtn.textContent=isBusy ? (buttonLabel||'保存中…') : (saveBtn.dataset.defaultLabel||'保存する');
  }
  if(cancelBtn && !isBusy && cancelBtn.style.display!=='none') cancelBtn.disabled=false;
}

function buildUnitSavePayload_(){

  if(!name){alert('単元名を入力してください');return null;}
  if(!maxResult.ok){alert(maxResult.message);setUnitSaveMeta(maxResult.message,'error');return null;}
  return {
    id,
    name,
    subject,
    maxPeriod:maxResult.value,
    fields:editingFields.map(field=>({...field})),
  };
}

function applySavedUnitLocally_(savedUnit){
  if(!savedUnit || !savedUnit.id) return;
  const idx=allUnits.findIndex(unit=>String(unit.id)===String(savedUnit.id));
  if(idx>=0) allUnits[idx]=savedUnit;
  else allUnits.unshift(savedUnit);
  if(preloadCache.aggregate) preloadCache.aggregate=null;
  if(preloadCache.status) clearTeacherStatusPreloadCache_(true);
  persistTeacherPreloadCache_();
  refreshUnitUiAfterMutation_();
}

function invalidateUnitRelatedClientState_(unitId){
  const normalized=String(unitId||'').trim();
  if(normalized && unitProgressByUnitId && typeof unitProgressByUnitId==='object'){
    delete unitProgressByUnitId[normalized];
  }
  if(preloadCache.aggregate) preloadCache.aggregate=null;
  if(preloadCache.portfolio) preloadCache.portfolio=null;
  if(String(activeUnitId||'')===normalized){
    activeUnitId=null;
    activePeriod=0;
    latestStatusRows=[];
    latestStatusMeta={};
    teacherDraftLocalState={};
    clearTeacherStatusPreloadCache_(true);
  }else if(preloadCache.status){
    clearTeacherStatusPreloadCache_(true);
  }
  if(Array.isArray(allAggData) && normalized){
    allAggData=allAggData.filter(row=>String(row.unitId||'')!==normalized);
  }
  if(typeof allAggMeta==='object' && allAggMeta){
    allAggMeta={ scope:'unknown', fetchedAt:0, unitId:'', subject:'' };
  }
  persistTeacherPreloadCache_();
}

function removeUnitLocally_(unitId){
  const normalized=String(unitId||'').trim();
  if(!normalized) return false;
  const nextUnits=(allUnits||[]).filter(unit=>String(unit.id)!==normalized);
  const removed=nextUnits.length!==allUnits.length;
  if(!removed) return false;
  allUnits=nextUnits;
  invalidateUnitRelatedClientState_(normalized);
  if(String(document.getElementById('editUnitId').value||'')===normalized){
    cancelEdit();
  }
  refreshUnitUiAfterMutation_();
  return true;
}

function refreshUnitUiAfterMutation_(){
  renderUnitList();
  populateUnitSelects();
  if(typeof populateGradingSelects==='function') populateGradingSelects();
  const startUnit=document.getElementById('startUnit');
  if(startUnit){
    const currentValue=String(startUnit.value||'').trim();
    const exists=allUnits.some(unit=>String(unit.id)===currentValue);
    if(currentValue && !exists){
      startUnit.value='';
    }
  }
  updatePeriodSelect();
}

function buildUnitMutationMessage_(prefix){
  const summaryEl=document.getElementById('unitListSummary');
  const summaryText=summaryEl ? String(summaryEl.textContent||'').trim() : '';
  return summaryText ? `${prefix} ${summaryText}` : prefix;
}

}

function startSavedUnitLesson_(savedUnit){
  if(!(savedUnit && savedUnit.id)) return;
  saveUiState({ curriculumSubtab:'units' });
  const tabBtn=document.querySelector(".tab[onclick*='status']");
  switchTab('status', tabBtn||null);
  setControlValue('startSubjectFilter', savedUnit.subject||'');
  setControlValue('startUnitSearch', '');
  saveUiState({
    startSubjectFilter:savedUnit.subject||'',
    startUnitSearch:'',
  });
  populateUnitSelects();
  const unitSel=document.getElementById('startUnit');
  if(unitSel) unitSel.value=String(savedUnit.id);
  updatePeriodSelect();
  startLesson();
}

function saveUnit(startAfterSave){
  if(unitSaveState.busy) return;
  const isLessonOnly=lessonFieldEditState.mode==='lesson';
  const payload=isLessonOnly
    ? {
        unitId:lessonFieldEditState.unitId,
        period:lessonFieldEditState.period,
        fields:editingFields.map(field=>({...field})),
      }
    : buildUnitSavePayload_();
  if(!payload) return;
  if(isLessonOnly){
    setUnitSaveBusy_(true,'保存中…');
    setUnitSaveMeta('この時間の項目を保存しています…','busy');
    google.script.run
      .withSuccessHandler(res=>{
        setUnitSaveBusy_(false);
        if(!(res && res.ok)){
          const msg=res && res.error || 'この時間の項目保存に失敗しました。';
          setUnitSaveMeta(msg,'error');
          showToast(msg);
          return;
        }
        cancelEdit();
        setUnitSaveMeta('この時間の項目を保存しました。','success');
        showToast('この時間だけ項目を更新しました');
        loadInit();
        loadStatusInit({ startPolling:true });
      })
      .withFailureHandler(err=>{
        setUnitSaveBusy_(false);
        const msg=err && err.message || 'この時間の項目保存に失敗しました。';
        setUnitSaveMeta(msg,'error');
        showToast(msg);
      })
      .saveLessonFieldConfig(payload.unitId,payload.period,payload.fields);
    return;
  }
  unitSaveState.requestToken=`unit_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
  payload.requestToken=unitSaveState.requestToken;
  payload.startAfterSave=Boolean(startAfterSave);
  const isEdit=Boolean(String(payload.id||'').trim());
  const nextAction=Boolean(startAfterSave)
    ? (isEdit ? '更新して開始中…' : '保存して開始中…')
    : (isEdit ? '更新中…' : '保存中…');
  setUnitSaveBusy_(true,nextAction);
  setUnitSaveMeta(isEdit?'単元を更新しています…':'単元を保存しています…','busy');
  google.script.run
    .withSuccessHandler(res=>{
      setUnitSaveBusy_(false);
      if(!(res && res.ok && res.unit)){
        const msg=res && res.error || '単元の保存に失敗しました。';
        setUnitSaveMeta(msg,'error');
        showToast(msg);
        return;
      }
      finishUnitSave_(res.unit,isEdit?'単元を更新しました':'単元を保存しました');
      if(payload.startAfterSave){
        startSavedUnitLesson_(res.unit);
      }
    })
    .withFailureHandler(err=>{
      setUnitSaveBusy_(false);
      const msg=err && err.message || '単元の保存に失敗しました。';
      setUnitSaveMeta(msg,'error');
      showToast(msg);
    })
    .saveUnit(payload);
}

function askDelete(id,name){
  delTargetId=id;
  setDeleteModalBusy_(false);
  document.getElementById('delMsg').textContent=`「${name}」を削除します。授業データは残ります。`;
  document.getElementById('delModal').classList.add('show');
}
function setDeleteModalBusy_(busy){
  const confirmBtn=document.getElementById('delConfirmBtn');
  const cancelBtn=document.getElementById('delCancelBtn');
  if(confirmBtn){
    if(!confirmBtn.dataset.defaultLabel) confirmBtn.dataset.defaultLabel=confirmBtn.textContent||'削除する';
    confirmBtn.disabled=Boolean(busy);
    confirmBtn.textContent=busy?'削除中…':confirmBtn.dataset.defaultLabel;
  }
  if(cancelBtn) cancelBtn.disabled=Boolean(busy);
}
function confirmDelete(){
  const targetId=String(delTargetId||'').trim();
  if(!targetId) return;
  setDeleteModalBusy_(true);
  setUnitSaveMeta('単元を削除しています…','busy');
  google.script.run
    .withSuccessHandler(res=>{
      if(!(res && res.ok)){
        const msg='単元の削除に失敗しました。';
        setDeleteModalBusy_(false);
        setUnitSaveMeta(msg,'error');
        showToast(msg);
        return;
      }
      closeModal();
      removeUnitLocally_(targetId);
      const message=buildUnitMutationMessage_('単元を削除しました。');
      setUnitSaveMeta(message,'success');
      showToast(message,{ duration:3600 });
      loadInit();
    })
    .withFailureHandler(err=>{
      const msg=err && err.message || '単元の削除に失敗しました。';
      setDeleteModalBusy_(false);
      setUnitSaveMeta(msg,'error');
      showToast(msg);
    })
    .deleteUnit(targetId);
}
function closeModal(){
  setDeleteModalBusy_(false);
  document.getElementById('delModal').classList.remove('show');
}
</script>
