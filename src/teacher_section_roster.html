  <div class="section" id="sec-roster">
    <div class="card">
      <h2>👥 名簿編集</h2>

        在籍チェックがONの児童だけ児童ページに表示されます。
      </p>
      <div style="overflow-x:auto;">
        <table class="tbl roster-table">
          <thead><tr><th>#</th><th>出席番号</th><th>名前</th><th>在籍</th><th></th></tr></thead>
