<!-- 削除確認モーダル -->
<div class="modal-bg" id="delModal">
  <div class="modal">
    <h3>🗑️ 削除しますか？</h3>
    <p id="delMsg" style="font-size:13px;color:#555;"></p>
    <div class="modal-btns">
      <button class="btn-cancel" id="delCancelBtn" onclick="closeModal()">キャンセル</button>
      <button class="btn-del-confirm" id="delConfirmBtn" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>
