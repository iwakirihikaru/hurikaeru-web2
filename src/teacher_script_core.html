let rosterEntries  = [];

let teacherActiveDebug = '';

const TEACHER_CLIENT_BUILD = 'client-20260704-1035';

const teacherClientPerfState = {

  attitude:'主体的態度',
};
const TEACHER_ASSESS_LEVELS = ['','A','B','C'];
const nativeAlert = window.alert.bind(window);

function uniqueValues(list){
  const out=[];
  const seen=Object.create(null);
  (list||[]).forEach(value=>{
    const key=typeof value+':'+String(value);
    if(seen[key]) return;
    seen[key]=true;
    out.push(value);
  });
  return out;
}

function getTeacherReviewField_(fields){
  return (fields||[]).find(field=>field&&field.type==='review') || null;
}

function getTeacherReviewHintLabels_(field){
  return String(field&&field.hints||'')
    .split(',')
    .map(function(text){ return String(text||'').trim(); })
    .filter(Boolean);
}

function teacherEscapeRegex_(text){
  return String(text||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function renderTeacherInlineChipText_(text, labels){
  const source=String(text||'');
  const normalized=(labels||[]).map(function(label){ return String(label||'').trim(); }).filter(Boolean);
  if(!normalized.length) return esc(source).replace(/\n/g,'<br>');
  const unique=uniqueValues(normalized).sort(function(a,b){ return b.length-a.length; });
  const labelMap=Object.create(null);
  unique.forEach(function(label){ labelMap[label]=true; });
  const pattern=new RegExp('(' + unique.map(teacherEscapeRegex_).join('|') + ')','g');
  return source
    .split(pattern)
    .map(function(part){
      return labelMap[part] ? '<span class="inline-chip">'+esc(part)+'</span>' : esc(part).replace(/\n/g,'<br>');
    })
    .join('');
}

function extractTeacherReviewChipLabels_(text, field){
  const source=String(text||'');
  return getTeacherReviewHintLabels_(field).filter(function(label){
    return label && source.indexOf(label)>=0;
  }).slice(0,6);
}

function renderTeacherReviewText_(text, fields){
  const reviewField=getTeacherReviewField_(fields);
  return renderTeacherInlineChipText_(text, extractTeacherReviewChipLabels_(text, reviewField));
}

function showFatalTeacherError(message){
  if(window.showFatalTeacherError && window.showFatalTeacherError !== showFatalTeacherError){
    window.showFatalTeacherError(message);
    return;
  }
  const text=String(message||'').trim();
  if(!text) return;
  const box=document.getElementById('teacherFatalError');
  if(box){
    box.style.display='block';
    box.textContent=`画面エラー: ${text}`;
  }
}

function teacherNowMs_(){
  return (typeof performance!=='undefined' && performance && typeof performance.now==='function')
    ? performance.now()
    : Date.now();
}

function logTeacherClientPerf_(name, payload){
  try{
    const apiInfo=(window.__portableGas && typeof window.__portableGas.getResolvedApiInfo==='function')
      ? window.__portableGas.getResolvedApiInfo()
      : null;
    console.log('[teacher_client_perf] '+JSON.stringify({
      name:String(name||''),
      apiUrl:apiInfo && apiInfo.apiUrl || '',
      apiSource:apiInfo && apiInfo.source || '',
      ...(payload && typeof payload==='object' ? payload : {}),
    }));
  }catch(_err){}
}

window.addEventListener('error', function(event){
  const msg=(event && event.message) || 'unknown error';
  showFatalTeacherError(msg);
});

window.addEventListener('unhandledrejection', function(event){
  const reason=event && event.reason;
  const msg=(reason && reason.message) || String(reason||'promise rejection');
  showFatalTeacherError(msg);
});

function inferToastTone(message){
  const text=String(message||'');
  if(/失敗|エラー|重複|選択してください|入力してください|ありません/.test(text)) return 'error';
  if(/しました|完了|保存|コピー|発表/.test(text)) return 'success';
  return 'info';
}

function showToast(message, options){
  const text=String(message==null?'':message).trim();
  if(!text) return;
  const stack=document.getElementById('toastStack');
  if(!stack){
    nativeAlert(text);
    return;
  }
  const toast=document.createElement('div');
  toast.className=`toast ${options && options.tone ? options.tone : inferToastTone(text)}`;
  toast.textContent=text;
  stack.appendChild(toast);
  requestAnimationFrame(()=>toast.classList.add('show'));
  const close=()=>{
    toast.classList.remove('show');
    setTimeout(()=>toast.remove(),180);
  };
  window.setTimeout(close, Number(options && options.duration || 2600));
}

function formatTeacherRpcError_(err, fallback, actionLabel){
  const raw=String(err && err.message ? err.message : (err || '')).trim();
  const label=String(actionLabel||'通信').trim();
  if(!raw) return fallback || `${label}に失敗しました`;
  if(/Failed to fetch|NetworkError|Load failed|Request timed out|timeout/i.test(raw)){
    return `${label}に失敗しました。GASに接続できていません。接続先URL・Pages反映・ネットワークを確認してください。`;
  }
  if(/missing_api_url|GAS_API_URL/i.test(raw)){
    return `${label}に失敗しました。接続先GAS URLが未設定です。接続補助ページで保存し直してください。`;
  }
  return `${fallback || `${label}に失敗しました`}: ${raw}`;
}

window.alert=function(message){
  showToast(message);
};

document.addEventListener('click', event=>{
  const button=event.target && event.target.closest ? event.target.closest('button') : null;
  if(!button || button.disabled) return;
  button.classList.add('is-pressed');
  window.setTimeout(()=>button.classList.remove('is-pressed'),140);
});

// 編集中の項目リスト（単元フォーム用）
let editingFields  = [];
let subjectEditingFields = [];
let currentSubject = '算数';
let recentCustomPresets = [];
const preloadCache = {
  roster:null,
  editor:null,
  prompts:null,
  portfolio:null,
  status:null,
  aggregate:null,
  rosterLoading:false,
  editorLoading:false,
  promptsLoading:false,
  statusLoading:false,
  started:false,
};

hydrateTeacherPreloadCache_();

// =====================================
//  タブ切替
// =====================================
function switchTab(name, el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  if(el) el.classList.add('active');
  clearInterval(statusTimer);
  if(name==='status')    {loadStatusInit({ startPolling:true });}
  if(name==='curriculum'){loadCurriculumTab();}
  if(name==='roster')    {loadRosterEditor();}
  if(name==='records')   {loadRecordsTab();}
  if(name==='prompts')   {loadPromptsTab();}
  if(name==='help')      {loadHelpTab();}
  if(name==='logs')      {loadAiLogs();}
}

// =====================================
//  初期ロード
// =====================================
function loadInit(){
  const startedAt=teacherNowMs_();
  teacherClientPerfState.teacherInitCalls += 1;
  const requestEpoch=teacherDataEpoch;
  applyEmbeddedTeacherBootstrap_();
  let statusLoaded=false;
  // まず現在授業のポインタだけ軽く取り、その後に shell bootstrap を続ける。
  const loadTeacherInit=()=>{
    google.script.run
      .withSuccessHandler(d=>{
        if(requestEpoch!==teacherDataEpoch) return;
        applyTeacherInitData(d, { includeRoster:true, renderUnitList:true, schedulePreload:true, source:'teacherInit' });
        scheduleTeacherUnitProgressRefresh_(d);
        logTeacherClientPerf_('teacherInit', {
          callCount:teacherClientPerfState.teacherInitCalls,
          totalMs:Math.max(0, teacherNowMs_()-startedAt),
          sincePageLoadMs:Math.max(0, teacherNowMs_()-teacherClientPerfState.pageStartedAt),
          unitCount:Array.isArray(d && d.units)?d.units.length:0,
          rosterCount:Array.isArray(d && d.roster)?d.roster.length:0,
          deploymentVersion:Number(d && d.deploymentVersion || 0),
          timing:d && d.timing || null,
        });
      })
      .withFailureHandler(err=>{
        if(requestEpoch!==teacherDataEpoch) return;
        logTeacherClientPerf_('teacherInit_error', {
          callCount:teacherClientPerfState.teacherInitCalls,
          totalMs:Math.max(0, teacherNowMs_()-startedAt),
          error:(err && err.message) ? err.message : String(err||'unknown'),
        });
        handleTeacherInitFailure_(err, 'teacherInit');
      })
      .teacherInit();
  };
  const loadTeacherStatusFirst=()=>{
    if(statusLoaded) return;
    statusLoaded=true;
    google.script.run
      .withSuccessHandler(d=>{
        if(requestEpoch!==teacherDataEpoch) return;
        applyTeacherInitData(d, { includeRoster:false, renderUnitList:false, schedulePreload:false, source:'teacherStatusSnapshot' });
        if(d && d.status && Array.isArray(d.status.students) && d.status.students.length){
          renderStatus(d.status);
        }
        loadTeacherInit();
      })
      .withFailureHandler(err=>{
        if(requestEpoch!==teacherDataEpoch) return;
        handleTeacherInitFailure_(err, 'teacherStatusSnapshot');
        loadTeacherInit();
      })
      .teacherStatusSnapshot();
  };
  loadTeacherStatusFirst();
}

function loadCurriculumTab(){
  loadInit();
  loadSubjectEditor();
  switchCurriculumSubtab(readUiState().curriculumSubtab||'units');
}

function loadRecordsTab(){
  switchRecordSubtab(readUiState().recordSubtab||'aggregate');
}

function loadPromptsTab(){
  loadPrompts();
  switchPromptSubtab(readUiState().promptSubtab||'ai');
}

function loadStatusInit(options){
  const startedAt=teacherNowMs_();
  teacherClientPerfState.teacherStatusInitCalls += 1;
  const opts=options||{};
  const requestEpoch=teacherDataEpoch;
  applyEmbeddedTeacherBootstrap_();
  const cachedStatus=readTeacherStatusPreloadCache_();
  let statusRefreshStarted=false;
  if(cachedStatus){
    renderStatus(cachedStatus);
  }
  const runner=google.script.run
      .withSuccessHandler(d=>{
        if(requestEpoch!==teacherDataEpoch) return;
        applyTeacherInitData(d, { includeRoster:false, renderUnitList:false, schedulePreload:true, source:'teacherStatusSnapshot' });
      if(d && d.status && Array.isArray(d.status.students) && d.status.students.length){
        renderStatus(d.status);
      }else{
        const statusSection=document.getElementById('sec-status');
        if(statusSection && statusSection.classList.contains('active')){
          loadStatus();
          statusRefreshStarted=true;
        }
      }
      if(opts.startPolling){
        startStatusPoll(statusRefreshStarted || Boolean(d && d.status && Array.isArray(d.status.students) && d.status.students.length));
      }
      scheduleTeacherUnitProgressRefresh_(d);
      ensureTeacherShellInitAfterStatus_(requestEpoch);
      logTeacherClientPerf_('teacherStatusInit', {
        callCount:teacherClientPerfState.teacherStatusInitCalls,
        totalMs:Math.max(0, teacherNowMs_()-startedAt),
        deploymentVersion:Number(d && d.deploymentVersion || 0),
        studentCount:d && d.status && Array.isArray(d.status.students) ? d.status.students.length : 0,
      });
    })
    .withFailureHandler(err=>{
      if(requestEpoch!==teacherDataEpoch) return;
      logTeacherClientPerf_('teacherStatusInit_error', {
        callCount:teacherClientPerfState.teacherStatusInitCalls,
        totalMs:Math.max(0, teacherNowMs_()-startedAt),
        error:(err && err.message) ? err.message : String(err||'unknown'),
      });
      console.warn('teacherStatusSnapshot failed', err);
      if(opts.startPolling){
        startStatusPoll(false);
        }
      ensureTeacherShellInitAfterStatus_(requestEpoch);
      })
  runner.teacherStatusSnapshot();
}

function ensureTeacherShellInitAfterStatus_(requestEpoch){
  if(Array.isArray(allUnits) && allUnits.length) return;
  if(teacherShellInitLoading) return;
  teacherShellInitLoading = true;
  google.script.run
    .withSuccessHandler(d=>{
      teacherShellInitLoading = false;
      if(requestEpoch!==teacherDataEpoch) return;
      applyTeacherInitData(d, {
        includeRoster:true,
        renderUnitList:false,
        schedulePreload:true,
        source:'teacherInitAfterStatus',
      });
      scheduleTeacherUnitProgressRefresh_(d);
    })
    .withFailureHandler(err=>{
      teacherShellInitLoading = false;
      console.warn('teacherInitAfterStatus failed', err);
    })
    .teacherInit();
}

function scheduleTeacherUnitProgressRefresh_(data){
  if(!(data && data.progressNeedsRefresh)) return;
  if(scheduleTeacherUnitProgressRefresh_._started) return;
  scheduleTeacherUnitProgressRefresh_._started = true;
  const run=()=>{
    google.script.run
      .withSuccessHandler(res=>{
        const map=res && res.unitProgress;
        if(!map || typeof map!=='object') return;
        unitProgressByUnitId = map;
        populateUnitSelects();
        applySuggestedStartPeriodAfterProgressRefresh_();
        const unitListSection=document.getElementById('unitListWrap');
        if(unitListSection && unitListSection.offsetParent!==null){
          renderUnitList();
        }
      })
      .withFailureHandler(()=>{})
      .teacherUnitProgressRefresh();
  };
  if(typeof requestIdleCallback==='function'){
    requestIdleCallback(run,{ timeout:1200 });
  }else{
    setTimeout(run, 500);
  }
}

function invalidateTeacherDataRequests_(){
  teacherDataEpoch += 1;
}

function buildResolvedActiveState_(incomingActive){
  const active=incomingActive||{};
  const unitId=active && active.unitId || null;
  const period=Number(active && active.period || 0);
  const currentUnit=(activeUnitId!=null && activePeriod>0)
    ? (allUnits.find(u=>String(u.id)===String(activeUnitId))||null)
    : null;
  const resolvedUnit=active && active.unit
    ? active.unit
    : (unitId!=null ? (allUnits.find(u=>String(u.id)===String(unitId))||null) : null);
  const resolvedFields=Array.isArray(active && active.fields) && active.fields.length
    ? active.fields
    : (resolvedUnit && Array.isArray(resolvedUnit.fields) ? resolvedUnit.fields : []);
  const canPreserveCurrent = activeUnitId!=null
    && activePeriod>0
    && (Date.now() - lastTeacherStartAtMs) < 30000;
  if(unitId!=null && period>0){
    return {
      unitId: unitId,
      period: period,
      unit: resolvedUnit,
      fields: resolvedFields,
      timelineFieldKey: active && active.timelineFieldKey || '',
    };
  }
  if(activeUnitId!=null && activePeriod>0 && !teacherEndingLesson && currentUnit){
    return {
      unitId: activeUnitId,
      period: activePeriod,
      unit: currentUnit,
      fields: Array.isArray(currentUnit.fields) ? currentUnit.fields : [],
      timelineFieldKey: '',
    };
  }
  if(canPreserveCurrent && currentUnit){
    return {
      unitId: activeUnitId,
      period: activePeriod,
      unit: currentUnit,
      fields: Array.isArray(currentUnit.fields) ? currentUnit.fields : [],
      timelineFieldKey: '',
    };
  }
  return active;
}

function applyTeacherInitData(d, options){
  d=d||{};
  const opts=options||{};
  const previousUnitId=activeUnitId;
  const previousPeriod=activePeriod;
  if(Array.isArray(d.units)) allUnits = d.units;
  if(d.unitsReadMeta && typeof d.unitsReadMeta==='object'){
    teacherUnitsReadMeta = d.unitsReadMeta;
    window.__teacherUnitsReadMeta = d.unitsReadMeta;
  }
  if(d.active !== undefined){
    const rawActive=d.active||{};
    d.active = buildResolvedActiveState_(d.active);
    activeUnitId = d.active && d.active.unitId || null;
    activePeriod = d.active && d.active.period || 0;
    teacherActiveDebug=`${opts.source||'unknown'} raw=${rawActive && rawActive.unitId || ''}/${rawActive && rawActive.period || 0} resolved=${activeUnitId || ''}/${activePeriod || 0}`;
    if(previousUnitId!=null && previousPeriod>0 && !(rawActive && rawActive.unitId) && !teacherEndingLesson){
      teacherActiveDebug += ' preserve-current';
    }
    if(teacherEndingLesson && (!activeUnitId || !activePeriod)){
      teacherEndingLesson = false;
    }
  }
  if(d.unitProgress && typeof d.unitProgress === 'object') unitProgressByUnitId = d.unitProgress;
  if(d.build) teacherBuild = d.build;
  if(d.deploymentVersion !== undefined) teacherDeploymentVersion = Number(d.deploymentVersion || 0);
  if(d.deploymentCreatedAt !== undefined) teacherDeploymentCreatedAt = String(d.deploymentCreatedAt || '').trim();
  if(opts.includeRoster){
    if(Array.isArray(d.roster) && d.roster.length){
      rosterEntries = d.roster.filter(row=>row.active!==false);
      preloadCache.roster = { roster:d.roster };
      persistTeacherPreloadCache_();
    }
  }
  if(!activeUnitId || !activePeriod){
    clearTeacherStatusPreloadCache_();
    if(typeof clearRenderedStatus_ === 'function'){
      clearRenderedStatus_();
    }
  }
  persistPortableTeacherBootstrap_();
  applySavedUiState();
  renderBuildBar();
  renderActiveBanner(d.active);
  populateUnitSelects();
  renderTimelineFieldSelect(d.active);
  if(opts.renderUnitList) renderUnitList();
  if(opts.schedulePreload) scheduleTeacherPreload();
  if(Array.isArray(d.errors) && d.errors.length){
    showTeacherLoadWarning_(d.errors.join(' / '));
  }
}

function applyEmbeddedTeacherBootstrap_(){
  if(teacherBootstrapApplied) return false;
  const data=window.__TEACHER_BOOTSTRAP__;
  if(!data || typeof data!=='object') return false;
  teacherBootstrapApplied = true;
  applyTeacherInitData(data, { includeRoster:true, renderUnitList:true, schedulePreload:false, source:'bootstrap' });
  return true;
}

function showTeacherLoadWarning_(message){
  const text=String(message||'').trim();
  if(!text) return;
  const box=document.getElementById('teacherFatalError');
  if(box){
    box.style.display='block';
    box.textContent='一部の読み込みに失敗しました: '+text;
  }
  showToast('一部の読み込みに失敗しました。画面上部のメッセージを確認してください。',{tone:'warn'});
}

function handleTeacherInitFailure_(err, source){
  const message=(err&&err.message)?err.message:String(err||'unknown error');
  teacherBuild='error';
  renderBuildBar();
  showTeacherLoadWarning_(`${source}: ${message}`);
}

function buildPortableTeacherBootstrapPayload_(){
  const rosterSource=Array.isArray(rosterEntries) && rosterEntries.length
    ? rosterEntries
    : (preloadCache.roster && Array.isArray(preloadCache.roster.roster) ? preloadCache.roster.roster : []);
  const activePayload=(activeUnitId!=null && activePeriod>0)
    ? buildResolvedActiveState_({ unitId:activeUnitId, period:activePeriod })
    : null;
  return {
    units:Array.isArray(allUnits) ? allUnits : [],
    active:activePayload && activePayload.unitId ? activePayload : null,
    roster:Array.isArray(rosterSource) ? rosterSource : [],
    unitProgress:unitProgressByUnitId && typeof unitProgressByUnitId==='object' ? unitProgressByUnitId : {},
    build:teacherBuild || '',
    deploymentVersion:Number(teacherDeploymentVersion||0),
    deploymentCreatedAt:String(teacherDeploymentCreatedAt||''),
  };
}

function persistPortableTeacherBootstrap_(){
  if(!(window.__portableGas && typeof window.__portableGas.cacheTeacherBootstrap==='function')) return;
  const payload=buildPortableTeacherBootstrapPayload_();
  window.__TEACHER_BOOTSTRAP__ = payload;
  window.__portableGas.cacheTeacherBootstrap(payload);
}

function scheduleTeacherStatusPreload_(){
  if(!activeUnitId || !activePeriod) return;
  if(readTeacherStatusPreloadCache_()) return;
  if(preloadCache.statusLoading) return;
  const run=()=>{
    if(!activeUnitId || !activePeriod || readTeacherStatusPreloadCache_()) return;
    if(typeof loadStatus==='function'){
      loadStatus();
    }
  };
  if(typeof requestIdleCallback==='function'){
    requestIdleCallback(run,{ timeout:2500 });
  }else{
    setTimeout(run,1200);
  }
}

function scheduleTeacherPreload(){
  if(preloadCache.started) return;
  preloadCache.started = true;
  const runner = ()=> {
    // 名簿は最優先、その他は初期描画後の遅延取得へ回す。
    ensureRosterPreload();
    scheduleTeacherStatusPreload_();
    if(typeof scheduleTeacherCurrentLessonAggregatePreload==='function'){
      scheduleTeacherCurrentLessonAggregatePreload('teacher-preload');
    }
    setTimeout(()=>{
      ensureEditorPreload();
      ensurePromptPreload();
      preloadTeacherHelpInfo();
      if(typeof scheduleTeacherRecordsDataPreload==='function'){
        scheduleTeacherRecordsDataPreload('teacher-preload');
      }
      if(typeof scheduleTeacherCurrentLessonAggregatePreload!=='function' && typeof scheduleAggregateBackgroundPreload==='function'){
        scheduleAggregateBackgroundPreload('teacher-preload');
      }
    }, 180);
  };
  if(typeof requestAnimationFrame === 'function'){
    requestAnimationFrame(()=>setTimeout(runner,80));
  } else {
    setTimeout(runner,80);
  }
}

function normalizeRosterPreload_(payload){
  if(!payload || typeof payload!=='object') return null;
  const roster=Array.isArray(payload.roster) ? payload.roster : [];
  return roster.length ? { roster } : null;
}

function clearRosterPreload_(skipPersist){
  preloadCache.roster=null;
  if(skipPersist) return;
  persistTeacherPreloadCache_();
}

function hydrateTeacherPreloadCache_(){
  try{
    const raw=localStorage.getItem(TEACHER_PRELOAD_CACHE_KEY);
    if(!raw) return;
    const parsed=JSON.parse(raw);
    if(!parsed || (Date.now()-Number(parsed.savedAt||0))>TEACHER_PRELOAD_TTL_MS){
      localStorage.removeItem(TEACHER_PRELOAD_CACHE_KEY);
      return;
    }
    if(parsed.roster){
      const rosterPayload=normalizeRosterPreload_(parsed.roster);
      if(rosterPayload) preloadCache.roster=rosterPayload;
    }
    if(parsed.editor) preloadCache.editor=parsed.editor;
    if(parsed.prompts) preloadCache.prompts=parsed.prompts;
    if(parsed.portfolio) preloadCache.portfolio=parsed.portfolio;
    if(parsed.status) preloadCache.status=parsed.status;
    if(parsed.aggregate) preloadCache.aggregate=parsed.aggregate;
  }catch(_err){}
}

function persistTeacherPreloadCache_(){
  try{
    localStorage.setItem(TEACHER_PRELOAD_CACHE_KEY, JSON.stringify({
      savedAt:Date.now(),
      roster:preloadCache.roster||null,
      editor:preloadCache.editor||null,
      prompts:preloadCache.prompts||null,
      portfolio:preloadCache.portfolio||null,
      status:preloadCache.status||null,
      aggregate:preloadCache.aggregate||null,
    }));

function clearTeacherStatusPreloadCache_(skipPersist){
  preloadCache.status=null;
  if(skipPersist) return;
  persistTeacherPreloadCache_();
}

function readTeacherStatusPreloadCache_(){
  const cached=preloadCache.status;
  if(!cached || typeof cached!=='object') return null;
  if((Date.now()-Number(cached.savedAt||0))>TEACHER_PRELOAD_TTL_MS){
    clearTeacherStatusPreloadCache_();
    return null;
  }
  if(String(cached.unitId||'')!==String(activeUnitId||'')) return null;
  if(Number(cached.period||0)!==Number(activePeriod||0)) return null;
  const status=cached.status;
  if(!status || typeof status!=='object' || !Array.isArray(status.students)) return null;
  return {
    meta:status.meta||{},
    students:status.students,
  };
}

function writeTeacherStatusPreloadCache_(status){
  if(!activeUnitId || !activePeriod || !status || typeof status!=='object' || !Array.isArray(status.students)){
    clearTeacherStatusPreloadCache_();
    return;
  }
  preloadCache.status={
    savedAt:Date.now(),
    unitId:String(activeUnitId||''),
    period:Number(activePeriod||0),
    status:{
      meta:status.meta||{},
      students:status.students,
    },
  };
  persistTeacherPreloadCache_();
}

function formatTeacherDeploymentCreatedAt_(value){
  const text=String(value||'').trim();
  if(!text) return '';
  const date=new Date(text);
  if(Number.isNaN(date.getTime())){
    return text.replace('T',' ').replace(/\.\d+Z?$/,'').replace(/Z$/,'').trim();
  }
  try{
    return date.toLocaleString('ja-JP', {
      year:'numeric',
      month:'2-digit',
      day:'2-digit',
      hour:'2-digit',
      minute:'2-digit',
      hour12:false,
    }).replace(/\//g,'-');
  }catch(_err){
    return text;
  }
}

  }
  el.style.display='block';

function resolveRegistrationHelpUrl_(links){
  const direct=String(links && links.registrationUrl || '').trim();
  const guide=String(links && links.guideUrl || '').trim();
  if (guide) {
    try {
      const parsed = new URL(guide);
      parsed.searchParams.set('mode', 'form');
      return parsed.toString();
    } catch (_error) {
      if (/mode=guide/.test(guide)) return guide.replace(/mode=guide/, 'mode=form');
      return guide;
    }
  }
  return direct;
}

  if(versionControlEl){
    if(currentDeploymentVersion>0){
      versionControlEl.textContent=`版管理: 現在 ${currentDeploymentVersion}${previousDeploymentVersion>0 ? ` / 1つ前 ${previousDeploymentVersion}` : ''}${recentVersions.length ? ` / 履歴 ${recentVersions.join(', ')}` : ''}`;
    }else{

  }
    if(lastResultEl){

      if(lastStatus==='updated'){
        lastResultEl.textContent=`${updateLastPrefix} 更新成功${lastBuild ? ` / ${lastBuild}` : ''}${lastAt ? ` / ${lastAt}` : ''}`;

function sortUnitsByLatestActivity(units){
  return (Array.isArray(units)?units.slice():[]).sort(compareSuggestedStartUnit_);
}

function compareSuggestedStartUnit_(a,b){
  const recentCmp=getUnitRecentSortValue_(b)-getUnitRecentSortValue_(a);
  if(recentCmp!==0) return recentCmp;
  const progressA=unitProgressByUnitId[String(a && a.id || '')]||{};
  const progressB=unitProgressByUnitId[String(b && b.id || '')]||{};
  const countCmp=Number(progressB.lessonCount||0)-Number(progressA.lessonCount||0);
  if(countCmp!==0) return countCmp;
  const idCmp=Number(b && b.id || 0)-Number(a && a.id || 0);
  if(idCmp!==0) return idCmp;
  return String(b && b.createdAt || '').localeCompare(String(a && a.createdAt || ''));
}

function getSuggestedPeriodForUnit(unit){
  if(!unit) return '';
  const progress=unitProgressByUnitId[String(unit.id||'')]||{};
  const lastActivityPeriod=Math.max(0, Number(progress.lastActivityPeriod||0));
  const maxProgressPeriod=Math.max(0, Number(progress.maxPeriod||0));
  const basePeriod=lastActivityPeriod>0 ? lastActivityPeriod : maxProgressPeriod;
  const max=getSelectablePeriodMaxForUnit_(unit, basePeriod);
  const next=Math.max(1, basePeriod>0 ? basePeriod+1 : 1);
  return String(Math.min(next, max));
}

function getSelectablePeriodMaxForUnit_(unit, basePeriod){
  const configuredMax=Number(unit && unit.maxPeriod || 0);
  if(configuredMax===0 || configuredMax>20) return 20;
  if(configuredMax<=1) return Math.max(20, Number(basePeriod||0)+1);
  return configuredMax;
}

function updatePeriodSelect(options){
  const opts=options||{};
  const unitId=document.getElementById('startUnit').value;
  const unit=allUnits.find(u=>u.id==unitId);
  const sel=document.getElementById('startPeriod');
  const current=String(sel && sel.value || '');
  const progress=unit?unitProgressByUnitId[String(unit.id||'')]||{}:{};
  const lastActivityPeriod=Math.max(0, Number(progress.lastActivityPeriod||0));
  const maxProgressPeriod=Math.max(0, Number(progress.maxPeriod||0));
  const basePeriod=lastActivityPeriod>0 ? lastActivityPeriod : maxProgressPeriod;
  const max=unit?getSelectablePeriodMaxForUnit_(unit, basePeriod):10;
  const suggested=unit?getSuggestedPeriodForUnit(unit):'';
  const selectedValue=(startPeriodManuallySelected && !opts.forceSuggested && current) ? current : suggested;
  sel.innerHTML='<option value="">時間目を選択…</option>'+
    Array.from({length:max},(_,i)=>i+1)
      .map(i=>`<option value="${i}" ${selectedValue && String(selectedValue)===String(i) ?'selected':''}>${i}じかんめ</option>`).join('');
}

function startLesson(){
  const unitId=document.getElementById('startUnit').value;
  const period=document.getElementById('startPeriod').value;
  if(!unitId||!period){alert('単元と時間目を選択してください');return;}
  const btn=document.getElementById('startLessonBtn');
  const defaultLabel=btn ? (btn.dataset.defaultLabel || btn.textContent || '▶️ 授業開始') : '';
  if(btn){
    btn.dataset.defaultLabel=defaultLabel;
    btn.disabled=true;
    btn.classList.add('is-busy');
    btn.textContent='⏳ 授業開始中…';
  }
  const selectedUnit=allUnits.find(unit=>String(unit && unit.id || '')===String(unitId))||null;
  showToast('授業を開始しています…');
  google.script.run
    .withSuccessHandler(res=>{
      if(btn){
        btn.textContent='✅ 開始しました';
        setTimeout(()=>{
          btn.disabled=false;
          btn.classList.remove('is-busy');
          btn.textContent=btn.dataset.defaultLabel||defaultLabel;
        },1800);
      }
      invalidateTeacherDataRequests_();
      lastTeacherStartAtMs = Date.now();
      teacherEndingLesson = false;
      activeUnitId=String(unitId);
      activePeriod=Number(period);
      clearTeacherStatusPreloadCache_();
      if(selectedUnit){
        renderActiveBanner({
          unitId,
          period:Number(period),
          unit:selectedUnit,
        });
      }
      if(res && res.active){
        applyTeacherInitData({
          active:res.active,
          unitProgress:res.unitProgress||unitProgressByUnitId,
        }, { includeRoster:false, renderUnitList:true, schedulePreload:false, source:'teacherStartLesson' });
      }
      if(res && res.status){
        renderStatus(res.status);
      }
      loadStatusInit({ lightweight:false, startPolling:true });
      showToast('授業を開始しました！',{tone:'success'});
    })
    .withFailureHandler(err=>{
      if(btn){
        btn.disabled=false;
        btn.classList.remove('is-busy');
        btn.textContent=btn.dataset.defaultLabel||defaultLabel;
      }
      showToast(formatTeacherRpcError_(err, '授業開始に失敗しました', '授業開始'), { tone:'error', duration:5200 });
    })
    .teacherStartLesson(unitId,parseInt(period));
}

function awardMedals(){
  if(!activeUnitId||!activePeriod){alert('先に授業を開始してください');return;}
  const btn = document.getElementById('awardMedalsBtn');
  if(btn){
    btn.disabled = true;
    btn.textContent = '集計中...';
  }
  google.script.run
    .withSuccessHandler(()=>{
      if(btn){
        btn.disabled = false;
        btn.textContent = '🏅 メダル発表';
      }
      loadStatus();
      alert('メダルを発表しました！');
    })
    .withFailureHandler(err=>{
      if(btn){
        btn.disabled = false;
        btn.textContent = '🏅 メダル発表';
      }
      alert((err && err.message) ? err.message : 'メダル発表に失敗しました');
    })
    .teacherAwardMedals(activeUnitId,activePeriod);
}

// =====================================
//  授業状況
// =====================================
function startStatusPoll(skipImmediate){
  clearInterval(statusTimer);
  if(!skipImmediate) loadStatus();
  statusTimer=setInterval(loadStatus,8000);
}
</script>
