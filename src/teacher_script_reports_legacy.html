        return String(a.name || '').localeCompare(String(b.name || ''), 'ja');
    });
    var periods = uniqueValues(allAggData
        .filter(function (row) { return (!subject || String(row.subject || '') === String(subject)) && (!unitId || String(row.unitId || '') === String(unitId)); })
        .map(function (row) { return row.period; })).sort(function (a, b) { return a - b; });
    var processedRows = buildAggProcessingRows(filtered, periods, category);
    return [
        ['教科', '単元', '番号', '名前', '評定', 'ランク', '時間別根拠'],
    ].concat(processedRows.map(function (row) { return [
        row.subject || '',
        row.unitName || '',
        row.num || '',
        row.name || '',
        String((row.assessment || {})[category] || ''),
        row.rank || '',
        periods.map(function (currentPeriod) { return buildGradingEvidenceTextFromRow(row.periodMap[currentPeriod], category, currentPeriod); }).filter(Boolean).join('\n\n'),
    ]; }));
}
function buildGradingEvidenceTextFromRow(row, category, currentPeriod) {
    if (!row)
        return '';
    var entries = collectAggCategoryEntries(row, category).map(function (entry) { return "".concat(entry.label, ": ").concat(entry.value); });
    var body = entries.length ? entries.join(' / ') : String(row.review || '').trim();
    if (!body)
        return '';
    return "".concat(currentPeriod, "\u6642\u9593\u76EE: ").concat(body);
}
function toCsvLine(cols) {

    }).join(',');
}
function downloadCsv(csv, filename) {
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename || 'jibun-matome.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
}
function sanitizeClientFileName(value) {
    return String(value || '').trim().replace(/[\\/:*?"<>|]+/g, '-').replace(/\s+/g, '-') || 'data';
}
function getUnitNameById(unitId) {
    var found = allUnits.find(function (unit) { return String(unit.id || '') === String(unitId || ''); });
    return found ? found.name || '' : '';
}

}
function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
