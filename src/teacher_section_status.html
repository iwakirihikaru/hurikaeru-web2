  <!-- ① 授業スタート -->
  <div class="section active" id="sec-status">
    <div id="activeBanner"></div>
    <div class="card status-top-card">
      <div class="status-top-head">
        <h2>▶️ 授業スタート</h2>
        <button class="btn-update" type="button" onclick="openAiLogsTab()">🪵 AI保守・ログへ</button>
      </div>
      <div class="status-top-grid">
        <div class="status-start-block">
          <div class="status-top-label">授業を開始する</div>
          <div class="start-row status-start-row">
            <select id="startUnit" onchange="onStartUnitChange()"><option value="">単元を選択…</option></select>
            <select id="startPeriod" onchange="onStartPeriodManualChange()"><option value="">時間目を選択…</option></select>
            <button id="startLessonBtn" class="btn-start" type="button" onclick="startLesson()">▶️ 授業開始</button>
            <button class="btn-update" type="button" onclick="openUnitSettingsTab()">🧩 単元設定へ</button>
            <button class="btn-medal" id="awardMedalsBtn" type="button" onclick="awardMedals()">🏅 メダル発表</button>
          </div>
        </div>
      </div>
    </div>
    <div class="card status-overview-card">
      <div class="status-overview-head">
        <div>
          <h3>児童の回答一覧</h3>
          <div class="status-overview-note">一覧では見つける、拡大表示では読む、の役割に分けて確認できます。</div>
        </div>
      </div>
      <div class="status-view-tabs" role="tablist" aria-label="授業スタート表示切替">
        <button class="status-view-tab active" id="statusViewTabResponses" type="button" role="tab" aria-selected="true" aria-controls="statusResponsesPane" onclick="switchStatusViewTab('responses')">回答を見る</button>
        <button class="status-view-tab" id="statusViewTabFeedback" type="button" role="tab" aria-selected="false" aria-controls="statusFeedbackPane" onclick="switchStatusViewTab('feedback')">フィードバック</button>
      </div>
      <div class="status-view-pane active" id="statusResponsesPane" role="tabpanel" aria-labelledby="statusViewTabResponses">
        <div id="statusLessonSummary"></div>
        <div id="statusFieldTabs"></div>
        <div class="status-density-card">
          <div class="status-density-head">
            <div>
              <div class="status-density-title">表示列</div>
              <div class="status-density-note"><span>1列は読む用</span><span>5列は見渡す用</span></div>
            </div>
            <div class="status-density-value" id="statusDensityValue">3列: 標準</div>
          </div>
          <div class="status-density-buttons" id="statusDensityButtons" role="group" aria-label="回答一覧の列数"></div>
        </div>
        <div id="statusCardGrid"><div class="status-grid-empty"><span class="spinner"></span></div></div>
      </div>
      <div class="status-view-pane" id="statusFeedbackPane" role="tabpanel" aria-labelledby="statusViewTabFeedback" hidden>
        <div class="status-feedback-block status-feedback-block-pane">
          <div class="status-top-label">児童一括フィードバック</div>
          <div class="status-feedback-actions">
            <select class="inp" id="teacherFeedbackRankMode">
              <option value="with_rank">ランク付けもする</option>
              <option value="without_rank">ランク付けはしない</option>
            </select>
            <label class="agg-toggle">
              <input id="teacherFeedbackAutoReturn" type="checkbox">
              生成後すぐ返却
            </label>
            <select class="inp" id="teacherFeedbackMedalMode">
              <option value="auto_award" selected>返却後メダル自動発表</option>
              <option value="none">返却後は教師確認して手動</option>
            </select>
            <button class="btn-ai" type="button" id="teacherFeedbackGenerateAllBtn" onclick="generateTeacherFeedbackDraftsFromStatus(false)">🤖 一括生成</button>
            <button class="btn-ai" type="button" id="teacherFeedbackGenerateBtn" onclick="generateTeacherFeedbackDraftsFromStatus(true)">🤖 未生成分だけ</button>
            <button class="btn-update" type="button" id="teacherFeedbackReturnBtn" onclick="returnTeacherFeedbackDraftsFromStatus()">📤 下書きを一括返却</button>
            <button class="btn-cancel" type="button" id="teacherFeedbackClearBtn" onclick="clearTeacherFeedbackDraftsFromStatus()">🧹 下書きを消す</button>
          </div>
          <div class="status-feedback-meta" id="teacherFeedbackMeta">教師AIが有効なとき、提出済みの内容から下書きを作れます。</div>
          <div class="status-feedback-meta" id="statusPerfDebug" style="display:none;"></div>
          <div class="status-feedback-result" id="teacherFeedbackResult"></div>
        </div>
        <div class="status-feedback-detail-note">既存の個別フィードバック、個別修正、返却操作はこのまま使えます。</div>
        <div style="overflow-x:auto;">
          <table class="tbl status-table">
            <thead><tr><th>児童 / 提出内容</th><th>フィードバック</th></tr></thead>
            <tbody id="statusBody"><tr><td colspan="2" style="text-align:center;padding:18px;"><span class="spinner"></span></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-bg" id="statusCardModalBg" onclick="handleStatusCardModalBackdrop(event)">
    <div class="modal status-card-modal" role="dialog" aria-modal="true" aria-labelledby="statusCardModalTitle" onclick="event.stopPropagation()">
      <div class="status-card-modal-head">
        <div class="status-card-modal-titlegroup">
          <div class="status-card-modal-studentline">
            <div class="status-card-modal-number" id="statusCardModalNumber"></div>
            <div class="status-card-modal-student" id="statusCardModalTitle"></div>
          </div>
          <div class="status-card-modal-meta" id="statusCardModalMeta"></div>
        </div>
        <div class="status-card-modal-toolbar">
          <button class="btn-subtle status-feedback-jump-btn" id="statusFeedbackJumpBtn" type="button" onclick="openStatusFeedbackFromModal()">個別フィードバックへ</button>
          <button class="btn-cancel status-card-modal-close" type="button" onclick="closeStatusCardModal()">閉じる</button>
        </div>
      </div>
      <div class="status-card-modal-main status-card-modal-readonly">
        <div class="status-card-modal-pane status-card-modal-answer">
          <div class="status-card-modal-body" id="statusCardModalBody"></div>
        </div>
      </div>
      <div class="status-card-modal-actions">
        <button class="btn-subtle status-card-modal-nav" id="statusCardModalPrevBtn" type="button" onclick="moveStatusCardModal(-1)">← 前の児童</button>
        <button class="btn-update status-card-modal-nav" id="statusCardModalNextBtn" type="button" onclick="moveStatusCardModal(1)">次の児童 →</button>
      </div>
    </div>
  </div>
