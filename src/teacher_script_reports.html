<script>
let portfolioInitRequestSeq=0;
let portfolioDataRequestSeq=0;
let aggregateLoadRequestSeq=0;
let aggregateScopeFetchKey='';
let aggregateBackgroundPreloadScheduled=false;
let aggregateBackgroundPreloadInFlight=false;
let portfolioFetchKey='';
let reportTabInitInFlight=false;
let reportTabInitWaiters=[];
const PORTFOLIO_CACHE_LIMIT=16;
const AGGREGATE_PRELOAD_ROW_LIMIT=800;
const AGGREGATE_LIVE_FRESH_MS=60*1000;

function readAggregatePreloadCacheEntry_(){
  const cached=preloadCache.aggregate;
  if(!cached || typeof cached!=='object') return null;
  if((Date.now()-Number(cached.savedAt||0))>TEACHER_PRELOAD_TTL_MS){
    preloadCache.aggregate=null;
    persistTeacherPreloadCache_();
    return null;
  }
  if(!Array.isArray(cached.rows) || !cached.rows.length) return null;
  return {
    rows:cached.rows.slice(),
    savedAt:Number(cached.savedAt||0)||Date.now(),
  };
}

function readAggregatePreloadCache_(){
  const entry=readAggregatePreloadCacheEntry_();
  return entry ? entry.rows : null;
}

function writeAggregatePreloadCache_(rows){
  if(!Array.isArray(rows) || !rows.length){
    preloadCache.aggregate=null;
    persistTeacherPreloadCache_();
    return;
  }
  preloadCache.aggregate={
    savedAt:Date.now(),
    rows:rows.slice(0, AGGREGATE_PRELOAD_ROW_LIMIT),
  };
  persistTeacherPreloadCache_();
}

function shouldRenderAggregatePreloadResult_(){
  return isAggregateRecordPaneActive_() || isGradingRecordPaneActive_();
}

function scheduleAggregateBackgroundPreload(reason){
  if(aggregateBackgroundPreloadScheduled) return;
  aggregateBackgroundPreloadScheduled=true;
  const run=()=>{
    aggregateBackgroundPreloadScheduled=false;
    ensureAggregateBackgroundPreload_(reason||'immediate');
  };
  if(typeof requestAnimationFrame==='function'){
    requestAnimationFrame(()=>setTimeout(run,120));
  }else{
    setTimeout(run,120);
  }
}

function scheduleTeacherCurrentLessonAggregatePreload(reason){
  const scope=buildTeacherCurrentLessonAggregateScope_();
  if(!scope){
    scheduleAggregateBackgroundPreload(reason||'teacher-preload');
    return false;
  }
  if(hasFreshAggregateScopeFor_(scope)){
    scheduleAggregateBackgroundPreload(reason||'teacher-preload-fresh');
    return false;
  }
  const started=requestAggregateScope_(scope,{
    onParseError:()=>{},
    onError:()=>{},
    onFailure:()=>{},
  });
  if(!started){
    scheduleAggregateBackgroundPreload(reason||'teacher-preload-busy');
    return false;
  }
  return true;
}

function ensureAggregateBackgroundPreload_(reason){
  if(readAggregatePreloadCacheEntry_()) return false;
  if(aggregateBackgroundPreloadInFlight) return false;
  if(aggregateScopeFetchKey){
    aggregateBackgroundPreloadScheduled=false;
    setTimeout(()=>scheduleAggregateBackgroundPreload('retry-busy'),600);
    return false;
  }
  aggregateBackgroundPreloadInFlight=true;
  fetchAggregateDataSet_({
    onParseError:()=>{ aggregateBackgroundPreloadInFlight=false; },
    onError:()=>{ aggregateBackgroundPreloadInFlight=false; },
    onFailure:()=>{ aggregateBackgroundPreloadInFlight=false; },
    onSuccess:rows=>{
      aggregateBackgroundPreloadInFlight=false;
      writeAggregatePreloadCache_(rows);
      preloadPortfolioFromAggregate_(reason||'aggregate-background-success');
      if(!Array.isArray(rows) || !rows.length) return;
      if(shouldRenderAggregatePreloadResult_() && !hasFreshAggregateData_()){
        renderAggregateDataSet_(rows,{ scope:'full', fetchedAt:Date.now() });
      }
    },
  });
  return true;
}

function scheduleTeacherRecordsDataPreload(reason){
  ensureReportTabInitData_({
    onSuccess:()=>{},
    onFailure:()=>{},
  });
  scheduleAggregateBackgroundPreload(reason||'records-preload');
  schedulePortfolioBackgroundPreload_(reason||'records-preload');
}

function schedulePortfolioBackgroundPreload_(reason){
  const run=()=>preloadPortfolioFromAggregate_(reason||'idle');
  if(typeof requestAnimationFrame==='function'){
    requestAnimationFrame(()=>setTimeout(run,320));
  }else{
    setTimeout(run,320);
  }
}

function preloadPortfolioFromAggregate_(reason){
  if(!Array.isArray(rosterEntries) || !rosterEntries.length) return false;
  const entry=readAggregatePreloadCacheEntry_();
  const rows=Array.isArray(allAggData) && allAggData.length
    ? allAggData
    : (entry && Array.isArray(entry.rows) ? entry.rows : []);
  if(!rows.length){
    scheduleAggregateBackgroundPreload(reason||'portfolio-waiting-aggregate');
    return false;
  }
  const firstStudent=rosterEntries.find(row=>String(row&&row.number||'').trim());
  if(!firstStudent) return false;
  const studentNumber=String(firstStudent.number||'').trim();
  const currentUnitId=String(activeUnitId||'').trim();
  writePortfolioCache_(studentNumber,'',buildPortfolioRowsFromAggregate_(rows,studentNumber,''));
  if(currentUnitId){
    writePortfolioCache_(studentNumber,currentUnitId,buildPortfolioRowsFromAggregate_(rows,studentNumber,currentUnitId));
  }
  return true;
}

function buildTeacherCurrentLessonAggregateScope_(){
  const unitId=String(activeUnitId||'').trim();
  const period=Number(activePeriod||0);
  if(!unitId || period<=0) return null;
  return { unitId };
}

function isAggregateRecordPaneActive_(){
  const pane=document.getElementById('record-pane-aggregate');
  return Boolean(pane && pane.classList.contains('active'));
}

function isGradingRecordPaneActive_(){
  const pane=document.getElementById('record-pane-grading');
  return Boolean(pane && pane.classList.contains('active'));
}

function renderAggregateDataSet_(rows, meta){
  allAggData=Array.isArray(rows) ? rows : [];
  const scopeMeta=meta && typeof meta==='object' ? meta : {};
  allAggMeta={
    scope:String(scopeMeta.scope||'unknown'),
    fetchedAt:Number(scopeMeta.fetchedAt||Date.now())||0,
    unitId:String(scopeMeta.unitId||''),
    subject:String(scopeMeta.subject||''),
  };
  filterAgg();
  filterGrading();
}

function expandCompactAggregateRows_(payload){
  if(!(payload && Number(payload.compactVersion||0)===1 && Array.isArray(payload.rowsCompact))) return null;
  const fieldSets=payload.fieldSets && typeof payload.fieldSets==='object' ? payload.fieldSets : {};
  const schema=Array.isArray(payload.rowSchema) && payload.rowSchema.length
    ? payload.rowSchema
    : ['unitName','subject','period','num','name','date','review','rank','comment','unitId','answersMap','fieldSetKey','teacherAssessment'];
  const indexByName={};
  schema.forEach((name,index)=>{ indexByName[String(name||'')]=index; });
  const valueOf=(row,name,fallback)=>{
    const index=indexByName[name];
    return Number.isInteger(index) ? row[index] : fallback;
  };
  return payload.rowsCompact.map(row=>({
    unitName:valueOf(row,'unitName','')||'',
    subject:valueOf(row,'subject','')||'',
    period:valueOf(row,'period','')||'',
    num:valueOf(row,'num','')||'',
    name:valueOf(row,'name','')||'',
    date:valueOf(row,'date','')||'',
    review:valueOf(row,'review','')||'',
    rank:valueOf(row,'rank','')||'',
    comment:valueOf(row,'comment','')||'',
    unitId:valueOf(row,'unitId','')||'',
    answersMap:valueOf(row,'answersMap',{})&&typeof valueOf(row,'answersMap',{})==='object' ? valueOf(row,'answersMap',{}) : {},
    fields:Array.isArray(fieldSets[valueOf(row,'fieldSetKey','')]) ? fieldSets[valueOf(row,'fieldSetKey','')] : [],
    teacherAssessment:valueOf(row,'teacherAssessment',null)||null,
  }));
}

function fetchAggregateDataSet_(options){
  const opts=options||{};
  const unitId=opts.unitId||null;
  const subject=String(opts.subject||'').trim();
  const requestSeq=opts.requestSeq||0;
  google.script.run
    .withSuccessHandler(raw=>{
      if(requestSeq && requestSeq!==aggregateLoadRequestSeq) return;
      let res=null;
      try{
        res=raw?JSON.parse(raw):null;
      }catch(e){
        if(typeof opts.onParseError==='function') opts.onParseError(e);
        return;
      }
      if(res && res.ok===false && res.error){
        if(typeof opts.onError==='function') opts.onError(res.error);
        return;
      }
      const rows=expandCompactAggregateRows_(res) || (res && res.rows) || [];
      if(typeof opts.onSuccess==='function') opts.onSuccess(rows, res||{});
    })
    .withFailureHandler(err=>{
      if(requestSeq && requestSeq!==aggregateLoadRequestSeq) return;
      if(typeof opts.onFailure==='function') opts.onFailure(err);
    })
    .getAggregateDataJson(unitId, JSON.stringify({ subject, compact:true }));
}

function getInitialAggregateFetchOptions_(renderedImmediate){
  const currentAggUnitId=(document.getElementById('aggUnit')||{}).value||'';
  if(!renderedImmediate && isAggregateRecordPaneActive_() && !currentAggUnitId && activeUnitId){
    return { unitId:String(activeUnitId) };
  }
  if(isGradingRecordPaneActive_()){
    const mode=(document.getElementById('gradeMode')||{}).value||'unit';
    if(mode==='subject'){
      const subject=(document.getElementById('gradeSubject')||{}).value||'';
      if(subject) return { subject };
      return null;
    }
    const gradeUnitId=(document.getElementById('gradeUnit')||{}).value||'';
    if(gradeUnitId) return { unitId:gradeUnitId };
  }
  return null;
}

  function hasFreshFullAggregateData_(){
    if(!Array.isArray(allAggData)) return false;
    if(!allAggMeta || String(allAggMeta.scope||'')!=='full') return false;
    return (Date.now()-Number(allAggMeta.fetchedAt||0))<=AGGREGATE_LIVE_FRESH_MS;
  }
  
  function hasFreshAggregateData_(){
    if(!Array.isArray(allAggData)) return false;
    const scope=String(allAggMeta && allAggMeta.scope || '');
    if(!scope || scope==='unknown' || scope==='preload') return false;
    return (Date.now()-Number(allAggMeta && allAggMeta.fetchedAt || 0))<=AGGREGATE_LIVE_FRESH_MS;
  }

function normalizeAggregateScopeOptions_(options){
  const opts=options||{};
  return {
    unitId:String(opts.unitId||'').trim(),
    subject:String(opts.subject||'').trim(),
  };
}

function buildAggregateScopeKey_(options){
  const opts=normalizeAggregateScopeOptions_(options);
  if(opts.subject) return `subject:${opts.subject}`;
  if(opts.unitId) return `unit:${opts.unitId}`;
  return 'full';
}

function buildAggregateScopeMeta_(options){
  const opts=normalizeAggregateScopeOptions_(options);
  return {
    scope:opts.subject ? 'subject' : (opts.unitId ? 'unit' : 'full'),
    fetchedAt:Date.now(),
    unitId:opts.unitId,
    subject:opts.subject,
  };
}

function hasFreshAggregateScopeFor_(options){
  const opts=normalizeAggregateScopeOptions_(options);
  if(!hasFreshAggregateData_()) return false;
  const scope=String(allAggMeta && allAggMeta.scope || '');
  if(scope==='full') return true;
  if(opts.subject) return scope==='subject' && String(allAggMeta.subject||'')===opts.subject;
  if(opts.unitId) return scope==='unit' && String(allAggMeta.unitId||'')===opts.unitId;
  return false;
}

function requestAggregateScope_(options, callbacks){
  const opts=normalizeAggregateScopeOptions_(options);
  const key=buildAggregateScopeKey_(opts);
  const cb=callbacks||{};
  if(hasFreshAggregateScopeFor_(opts)){
    if(typeof cb.onReuse==='function') cb.onReuse();
    return false;
  }
  if(aggregateScopeFetchKey===key){
    return false;
  }
  aggregateScopeFetchKey=key;
  const requestSeq=++aggregateLoadRequestSeq;
  fetchAggregateDataSet_({
    unitId:opts.unitId||null,
    subject:opts.subject||'',
    requestSeq,
    onParseError:error=>{
      if(aggregateScopeFetchKey===key) aggregateScopeFetchKey='';
      if(typeof cb.onParseError==='function') cb.onParseError(error);
    },
    onError:error=>{
      if(aggregateScopeFetchKey===key) aggregateScopeFetchKey='';
      if(typeof cb.onError==='function') cb.onError(error);
    },
    onFailure:error=>{
      if(aggregateScopeFetchKey===key) aggregateScopeFetchKey='';
      if(typeof cb.onFailure==='function') cb.onFailure(error);
    },
    onSuccess:rows=>{
      if(aggregateScopeFetchKey===key) aggregateScopeFetchKey='';
      if(!opts.subject && !opts.unitId){
        writeAggregatePreloadCache_(rows);
      }else{
        scheduleAggregateBackgroundPreload('after-scoped-records');
      }
      renderAggregateDataSet_(rows, buildAggregateScopeMeta_(opts));
      if(typeof cb.onSuccess==='function') cb.onSuccess(rows);
    },
  });
  return true;
}

function formatAggregateScopeAge_(fetchedAt){
  const ageMs=Math.max(0, Date.now()-Number(fetchedAt||0));
  if(ageMs<1000) return `${ageMs}ms前`;
  return `${Math.round(ageMs/1000)}s前`;
}

function getAggregateScopeDebugText_(options){
  const opts=normalizeAggregateScopeOptions_(options);
  const scope=String(allAggMeta && allAggMeta.scope || 'unknown');
  const rowCount=Array.isArray(allAggData) ? allAggData.length : 0;
  const freshness=hasFreshAggregateData_() ? 'fresh' : 'stale';
  const age=formatAggregateScopeAge_(allAggMeta && allAggMeta.fetchedAt || 0);
  const currentKey=buildAggregateScopeKey_({
    unitId:allAggMeta && allAggMeta.unitId || '',
    subject:allAggMeta && allAggMeta.subject || '',
  });
  const viewKey=buildAggregateScopeKey_(opts);
  const waitingParts=[];
  if(aggregateScopeFetchKey) waitingParts.push(`fetch中 ${aggregateScopeFetchKey}`);
  if(aggregateBackgroundPreloadInFlight) waitingParts.push('裏取得中 full');
  const waiting=waitingParts.length ? ` / ${waitingParts.join(' / ')}` : '';
  return `scope ${scope} (${currentKey}) / rows ${rowCount} / ${freshness} / ${age} / view ${viewKey}${waiting}`;
}

function updateAggregateDebug_(options, rows){
  const box=document.getElementById('aggDebug');
  if(!box) return;
  const count=Array.isArray(rows) ? rows.length : 0;
  box.textContent=`単元記録 ${count} 件を表示中。${getAggregateScopeDebugText_(options)}`;
}

function normalizeRecordLoadErrorMessage_(error, fallback){
  if(error && error.message) return String(error.message);
  if(typeof error==='string' && error.trim()) return error.trim();
  return String(fallback||'読み込みに失敗しました');
}

function handleAggregateLoadFailure_(error, renderedImmediate){
  const message=normalizeRecordLoadErrorMessage_(error, '単元記録の読み込みに失敗しました');
  showToast(`単元記録の読み込みに失敗しました: ${message}`,{tone:'error',duration:4200});
  const gradeDebug=document.getElementById('gradeDebug');
  if(gradeDebug) gradeDebug.textContent=`評定データの読み込みに失敗しました: ${message}`;
  if(!renderedImmediate) renderAggregateDataSet_([]);
}

function handlePortfolioLoadFailure_(body, cards, debugBox, error, renderedImmediate){
  const message=normalizeRecordLoadErrorMessage_(error, 'ポートフォリオデータの読み込みに失敗しました');
  if(renderedImmediate){
    if(debugBox) debugBox.textContent=`最新取得に失敗したため、先に表示した内容をそのまま使っています: ${message}`;
    return;
  }
  if(debugBox) debugBox.textContent='デバッグ情報の取得に失敗しました。';
  if(body) body.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:14px;color:#C62828;">${esc(message)}</td></tr>`;
  if(cards) cards.innerHTML='<div class="portfolio-empty">ポートフォリオデータの読み込みに失敗しました</div>';
}

function ensurePortfolioPreloadCache_(){
  if(!preloadCache.portfolio || typeof preloadCache.portfolio!=='object'){
    preloadCache.portfolio={ items:{} };
  }
  if(!preloadCache.portfolio.items || typeof preloadCache.portfolio.items!=='object'){
    preloadCache.portfolio.items={};
  }
  return preloadCache.portfolio;
}

function buildPortfolioCacheKey_(studentNumber, unitId){
  return `${String(studentNumber||'').trim()}::${String(unitId||'').trim()||'all'}`;
}

function sortPortfolioRows_(rows){
  return (Array.isArray(rows)?rows.slice():[]).sort((a,b)=>{
    const subjectCmp=String(a.subject||'').localeCompare(String(b.subject||''),'ja');
    if(subjectCmp!==0) return subjectCmp;
    const unitCmp=String(a.unitName||'').localeCompare(String(b.unitName||''),'ja');
    if(unitCmp!==0) return unitCmp;
    const periodCmp=Number(a.period||0)-Number(b.period||0);
    if(periodCmp!==0) return periodCmp;
    return String(a.date||'').localeCompare(String(b.date||''));
  });
}

function buildPortfolioRowsFromAggregate_(rows, studentNumber, unitId){
  const normalizedStudent=String(studentNumber||'').trim();
  const normalizedUnit=String(unitId||'').trim();
  if(!normalizedStudent || !Array.isArray(rows) || !rows.length) return [];
  return sortPortfolioRows_(rows
    .filter(row=>{
      if(String(row && row.num || '').trim()!==normalizedStudent) return false;
      if(normalizedUnit && String(row && row.unitId || '').trim()!==normalizedUnit) return false;
      return true;
    })
    .map(row=>({
      unitName:row && row.unitName || '',
      subject:row && row.subject || '',
      period:row && row.period || '',
      num:row && row.num || '',
      name:row && row.name || '',
      date:row && row.date || '',
      review:row && row.review || '',
      score:row && row.score || 0,
      rank:row && row.rank || '',
      medal:row && row.medal || '',
      comment:row && row.comment || '',
      unitId:row && row.unitId || '',
      answersMap:row && row.answersMap || {},
      fields:Array.isArray(row && row.fields) ? row.fields : [],
    })));
}

function readPortfolioCache_(studentNumber, unitId){
  const normalizedStudent=String(studentNumber||'').trim();
  if(!normalizedStudent) return null;
  if(Array.isArray(allAggData) && allAggData.length){
    const aggregateRows=buildPortfolioRowsFromAggregate_(allAggData, normalizedStudent, unitId);
    if(aggregateRows.length){
      return {
        rows:aggregateRows,
        source:hasFreshFullAggregateData_()?'aggregate-live':'aggregate-cache',
      };
    }
  }
  const cacheStore=ensurePortfolioPreloadCache_().items;
  const cached=cacheStore[buildPortfolioCacheKey_(normalizedStudent, unitId)];
  if(!cached || !Array.isArray(cached.rows) || !cached.rows.length) return null;
  return {
    rows:sortPortfolioRows_(cached.rows),
    source:'portfolio-cache',
  };
}

function writePortfolioCache_(studentNumber, unitId, rows){
  const normalizedStudent=String(studentNumber||'').trim();
  if(!normalizedStudent) return;
  const items=ensurePortfolioPreloadCache_().items;
  const key=buildPortfolioCacheKey_(normalizedStudent, unitId);
  items[key]={
    savedAt:Date.now(),
    rows:sortPortfolioRows_(rows),
  };
  const keys=Object.keys(items).sort((a,b)=>Number(items[b] && items[b].savedAt || 0)-Number(items[a] && items[a].savedAt || 0));
  keys.slice(PORTFOLIO_CACHE_LIMIT).forEach(oldKey=>delete items[oldKey]);
  persistTeacherPreloadCache_();
}

function ensureReportTabInitData_(options){
  const opts=options||{};
  let hasImmediateRoster=Array.isArray(rosterEntries) && rosterEntries.length>0;
  let hasImmediateUnits=Array.isArray(allUnits) && allUnits.length>0;
  if(!hasImmediateRoster && preloadCache.roster && Array.isArray(preloadCache.roster.roster)){
    rosterEntries=preloadCache.roster.roster.filter(row=>row.active!==false);
    hasImmediateRoster=rosterEntries.length>0;
  }
  if(hasImmediateRoster || hasImmediateUnits){
    if(typeof opts.onImmediate==='function'){
      opts.onImmediate({
        hasImmediateRoster,
        hasImmediateUnits,
      });
    }
  }
  if(hasImmediateRoster && hasImmediateUnits) return false;
  if(reportTabInitInFlight){
    reportTabInitWaiters.push(opts);
    return true;
  }
  reportTabInitInFlight=true;
  reportTabInitWaiters=[opts];
  google.script.run
    .withSuccessHandler(d=>{
      if(Array.isArray(d && d.units)){
        allUnits=d.units;
      }
      if(Array.isArray(d && d.roster)){
        rosterEntries=d.roster.filter(row=>row.active!==false);
        preloadCache.roster={ roster:d.roster };
        persistTeacherPreloadCache_();
      }
      teacherBuild=d.build||teacherBuild||'';
      const waiters=reportTabInitWaiters.slice();
      reportTabInitWaiters=[];
      reportTabInitInFlight=false;
      waiters.forEach(waiter=>{
        if(typeof waiter.onSuccess==='function') waiter.onSuccess(d||{});
      });
    })
    .withFailureHandler(err=>{
      const waiters=reportTabInitWaiters.slice();
      reportTabInitWaiters=[];
      reportTabInitInFlight=false;
      waiters.forEach(waiter=>{
        if(typeof waiter.onFailure==='function') waiter.onFailure(err);
      });
    })
    .teacherInit();
  return true;
}
function loadPortfolioTab(){
  const body=document.getElementById('portfolioBody');
  syncTeacherAiUi_();
  ensurePromptPreload();
  const requestSeq=++portfolioInitRequestSeq;
  let hasImmediateRoster=Array.isArray(rosterEntries) && rosterEntries.length>0;
  let hasImmediateUnits=Array.isArray(allUnits) && allUnits.length>0;
  let renderedInit=false;
  function renderPortfolioInit_(){
    renderPortfolioSelectors();
    loadPortfolioData();
    renderedInit=true;
  }
  if(hasImmediateRoster || hasImmediateUnits){
    renderPortfolioInit_();
  }else{
    body.innerHTML='<tr><td colspan="6" style="text-align:center;padding:14px;"><span class="spinner"></span></td></tr>';
  }
  ensureReportTabInitData_({
    onImmediate:state=>{
      if(requestSeq!==portfolioInitRequestSeq) return;
      hasImmediateRoster=Boolean(state && state.hasImmediateRoster);
      hasImmediateUnits=Boolean(state && state.hasImmediateUnits);
      if(!renderedInit && (hasImmediateRoster || hasImmediateUnits)){
        renderPortfolioInit_();
      }
    },
    onSuccess:d=>{
      if(requestSeq!==portfolioInitRequestSeq) return;
      renderPortfolioInit_();
    },
    onFailure:err=>{
      if(requestSeq!==portfolioInitRequestSeq) return;
      const message=(err && err.message)||err||'ポートフォリオの読み込みに失敗しました';
      const debugBox=document.getElementById('portfolioDebug');
      if(hasImmediateRoster || hasImmediateUnits){
        if(debugBox) debugBox.textContent=`ポートフォリオ初期データの更新に失敗しました: ${message}`;
        return;
      }
      body.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:14px;color:#C62828;">${esc(message)}</td></tr>`;
    },
  });
}

function renderPortfolioSelectors(){
  const studentSel=document.getElementById('pfStudent');
  const studentCur=studentSel.value;
  studentSel.innerHTML='<option value="">児童を選択…</option>'+
    rosterEntries.map(row=>`<option value="${row.number}">${row.number} ${esc(row.name||'')}</option>`).join('');
  if(studentCur && Array.from(studentSel.options).some(option=>String(option.value)===String(studentCur))) studentSel.value=studentCur;

  const unitSel=document.getElementById('pfUnit');
  const unitCur=unitSel.value;
  unitSel.innerHTML='<option value="">全単元</option>'+
    sortUnitsByLatestActivity(allUnits).map(u=>`<option value="${u.id}">${esc(u.subject)}：${esc(u.name)}</option>`).join('');
  if(unitCur && Array.from(unitSel.options).some(option=>String(option.value)===String(unitCur))) unitSel.value=unitCur;
}

function loadPortfolioData(){
  const studentNumber=document.getElementById('pfStudent').value;
  const unitId=document.getElementById('pfUnit').value;
  const body=document.getElementById('portfolioBody');
  const cards=document.getElementById('portfolioCards');
  const debugBox=document.getElementById('portfolioDebug');
  const requestKey=buildPortfolioCacheKey_(studentNumber, unitId);
  const immediate=readPortfolioCache_(studentNumber, unitId);
  let renderedImmediate=false;
  if(debugBox && !String(debugBox.dataset.baseText||'').trim()){
    debugBox.dataset.baseText='児童を選ぶと取得件数を表示します。';
  }
  document.getElementById('portfolioReport').style.display='none';
  if(!studentNumber){
    portfolioFetchKey='';
    portfolioRows=[];
    body.innerHTML='<tr><td colspan="6" style="text-align:center;padding:14px;color:#999;">児童を選択してください</td></tr>';
    cards.innerHTML='<div class="portfolio-empty">児童を選択してください</div>';
    debugBox.textContent='児童を選ぶと取得件数を表示します。';
    return;
  }
  if(immediate && immediate.rows.length){
    portfolioRows=immediate.rows.slice();
    renderPortfolioRows();
    renderedImmediate=true;
    debugBox.textContent=(immediate.source==='aggregate-cache' || immediate.source==='aggregate-live')
      ? '集約済みデータを先に表示しています。最新状態を確認中…'
      : '前回表示キャッシュを先に表示しています。最新状態を確認中…';
    if(immediate.source==='aggregate-live'){
      writePortfolioCache_(studentNumber, unitId, portfolioRows);
      debugBox.textContent='集約済みデータを先に表示しています。最新状態を確認中…';
    }
  }else{
    body.innerHTML='<tr><td colspan="6" style="text-align:center;padding:14px;"><span class="spinner"></span></td></tr>';
    cards.innerHTML='<div class="portfolio-empty"><span class="spinner"></span></div>';
    debugBox.textContent='取得状況を確認中…';
  }
  if(portfolioFetchKey===requestKey){
    return;
  }
  const requestSeq=++portfolioDataRequestSeq;
  portfolioFetchKey=requestKey;
  google.script.run
    .withSuccessHandler(raw=>{
      if(portfolioFetchKey===requestKey) portfolioFetchKey='';
      if(requestSeq!==portfolioDataRequestSeq) return;
      let res=null;
      try{
        res=raw?JSON.parse(raw):null;
      }catch(e){
        if(renderedImmediate){
          debugBox.textContent=`最新取得の解析に失敗したため、先に表示した内容をそのまま使っています: ${e.message||e}`;
          return;
        }
        debugBox.textContent=`JSON parse error: ${e.message||e} / raw=${String(raw).slice(0,280)}`;
        portfolioRows=[];
        renderPortfolioRows();
        return;
      }
      if(res && res.ok===false && res.error){
        if(renderedImmediate){
          debugBox.textContent=`最新取得に失敗したため、先に表示した内容をそのまま使っています: ${res.error}`;
          return;
        }
        debugBox.textContent=`portfolio error: ${res.error} / build=${res.build||teacherBuild||'unknown'}`;
        portfolioRows=[];
        renderPortfolioRows();
        return;
      }
      portfolioRows=res && res.rows || [];
      writePortfolioCache_(studentNumber, unitId, portfolioRows);
      if(res && res.debug){
        res.debug.build=res.build||'';
        res.debug.responseReadMeta=res.responseReadMeta||null;
        renderPortfolioDebug(res.debug);
      }else{
        debugBox.textContent=formatPortfolioDebugFallback(res);
      }
      renderPortfolioRows();
    })
    .withFailureHandler(err=>{
      if(portfolioFetchKey===requestKey) portfolioFetchKey='';
      if(requestSeq!==portfolioDataRequestSeq) return;
      handlePortfolioLoadFailure_(body, cards, debugBox, err, renderedImmediate);
    })
    .getStudentPortfolioDataJson(studentNumber, unitId||null);
}
function renderPortfolioDebug(debug){
  const box=document.getElementById('portfolioDebug');
  if(!debug){
    box.innerHTML=`<div class="debug-summary">取得件数を表示できませんでした。</div><details><summary>詳細を見る</summary><code>teacherInit build=${esc(teacherBuild||'unknown')}</code></details>`;
    return;
  }
  const sample=(debug.sampleMatchedRows||[])
    .map((row,idx)=>`${idx+1}. ${row.subject}/${row.unitName}/${row.period}時間目\n   ${row.date}\n   ${row.preview}`)
    .join('\n\n');
  const readMeta=debug.responseReadMeta && typeof debug.responseReadMeta==='object'
    ? ` / source ${String(debug.responseReadMeta.mode||'master_only')} / master ${Number(debug.responseReadMeta.estimatedMasterOnlyCount ?? debug.responseReadMeta.masterCount ?? 0)}`
    : '';
  const summary=`記録 ${debug.responseCount||0}件 / 児童一致 ${debug.matchedStudentCount||0}件 / 単元一致 ${debug.matchedUnitCount||0}件${readMeta}`;
  const buildLine=`teacher=${teacherBuild||'unknown'} / portfolio=${debug.build||'unknown'}`;
  box.innerHTML=
    `<div class="debug-summary">${esc(summary)}</div><details><summary>詳細を見る</summary><code>${esc(buildLine)}${sample?`\n\n${sample}`:''}</code></details>`;
}

function formatPortfolioDebugFallback(res){
  if(!res) return `空の応答です。teacherInit build=${teacherBuild||'unknown'}`;
  const keys=Object.keys(res||{});
  const preview=JSON.stringify(res).slice(0,280);
  return `debug がありません。teacherInit build=${teacherBuild||'unknown'} / response keys=${keys.join(',')||'(none)'} / response=${preview}`;
}

      onFailure:err=>{

function getGradingUnitsForSubject(subject){
  return sortUnitsByLatestActivity(
    allUnits.filter(unit=>subject && String(unit.subject||'')===String(subject))
  );
}

function buildGradingSubjectRows(subject, category){
  const units=getGradingUnitsForSubject(subject);
  const studentMap=new Map();
  rosterEntries.forEach(row=>{
    const num=String(row.number||'').trim();
    if(!num) return;
    studentMap.set(num,{
      num,
      name:row.name||'',
      units:{},
    });
  });
  allAggData.forEach(row=>{
    if(String(row.subject||'')!==String(subject)) return;
    const num=String(row.num||'').trim();
    if(!num) return;
    if(!studentMap.has(num)){
      studentMap.set(num,{num,name:row.name||'',units:{}});
    }else if(!studentMap.get(num).name && row.name){
      studentMap.get(num).name=row.name;
    }
    const student=studentMap.get(num);
    const unitKey=String(row.unitId||'');
    if(!student.units[unitKey]){
      student.units[unitKey]={
        unitId:unitKey,
        unitName:row.unitName||'',
        assessment:row.teacherAssessment||{knowledge:'',thinking:'',attitude:'',memo:''},
        evidence:[],
        evidenceHtml:[],
        ranks:[],
        periods:[],
      };
    }
    const entry=student.units[unitKey];
    if(row.teacherAssessment) entry.assessment=row.teacherAssessment;
    if(row.rank) entry.ranks.push(row.rank);
    if(row.period) entry.periods.push(`${row.period}時間目`);
    const categoryEntries=collectAggCategoryEntries(row, category);
    if(categoryEntries.length){
      entry.evidence.push(...categoryEntries.map(item=>`${item.label}: ${item.value}`).slice(0,2));
      entry.evidenceHtml.push(...categoryEntries.map(item=>renderAggEvidenceEntry(item,row)).slice(0,2));
    }else if(String(row.review||'').trim()){
      entry.evidence.push(String(row.review||'').trim());
      entry.evidenceHtml.push(renderTeacherReviewText_(String(row.review||'').trim(), row.fields||[]));
    }
  });
  return Array.from(studentMap.values())
    .sort((a,b)=>{
      const numDiff=(Number(a.num)||0)-(Number(b.num)||0);
      if(numDiff!==0) return numDiff;
      return String(a.name||'').localeCompare(String(b.name||''),'ja');
    })
    .map(student=>({
      ...student,
      unitEntries:units.map(unit=>{
        const existing=student.units[String(unit.id)]||null;
        return existing||{
          unitId:String(unit.id),
          unitName:unit.name||'',
          assessment:{knowledge:'',thinking:'',attitude:'',memo:''},
          evidence:[],
          evidenceHtml:[],
          ranks:[],
          periods:[],
        };
      }),
    }));
}

function renderGradingFieldChipsForSubject(subject, gradingCategory){
  const box=document.getElementById('gradeFieldChips');
  if(!box) return;
  if(!subject){
    box.className='field-chip-empty';
    box.textContent='教科を選ぶと、その教科の単元を横並びで評定できます。';
    return;
  }
  const labels=collectAggVisibleFields(allAggData.filter(row=>String(row.subject||'')===String(subject)))
    .filter(field=>matchesAggPresetField(field, gradingCategory))
    .map(field=>field.label);
  const unitLabels=getGradingUnitsForSubject(subject).map(unit=>unit.name||'');

  const lines=[];

  const evidence=Array.from(new Set(unitEntry.evidence||[])).filter(Boolean).slice(0,2);

  if(periods.length) lines.push(`時間: ${periods.join(' / ')}`);

function resolveAggPresetFields(rows,preset,showComment){
  const fields=collectAggVisibleFields(rows);
  const reviewField={key:'reviewText',label:'ふりかえり',source:'review'};
  const commentField={key:'comment',label:'AIコメント',source:'comment'};
  const shouldShowComment=showComment && rows.some(row=>String(row.comment||'').trim());
  if(preset==='standard'){
    return { fields:[reviewField] };
  }
  if(preset==='all'){
    const merged=[reviewField].concat(fields.filter(field=>!isAggReviewLikeField(field)));
    if(shouldShowComment) merged.push(commentField);
    return { fields: merged };
  }
  const filtered=fields.filter(field=>matchesAggPresetField(field,preset));
  if(shouldShowComment) filtered.push(commentField);
  return { fields: filtered };
}

function collectAggVisibleFields(rows){
  const map=new Map();
  rows.forEach(row=>{
    (row.fields||[]).forEach(field=>{
      if(field.enabled===false) return;
      const value=formatAggAnswerValue((row.answersMap||{})[field.key]);
      if(!value) return;
      if(!map.has(field.key)){
        map.set(field.key,{
          key:field.key,
          label:field.label||field.key,
          emoji:field.emoji||'',
          type:field.type||'text',
          categories:Array.isArray(field.categories)?field.categories:[],
          source:'answer',
        });
      }
    });
  });
  return Array.from(map.values()).sort((a,b)=>String(a.label||'').localeCompare(String(b.label||''),'ja'));
}

function isAggReviewLikeField(field){
  const haystack=`${String(field && field.key || '')} ${String(field && field.label || '')}`.toLowerCase();
  return /review|ふりかえり/.test(haystack);
}

function formatAggAnswerValue(value){
  if(Array.isArray(value)){
    return value.map(item=>String(item||'').trim()).filter(Boolean).join(' / ');
  }
  if(value===null||value===undefined) return '';
  return String(value).trim();
}

function isAggReviewField(field){
  return String(field&&field.type||'')==='review' || String(field&&field.source||'')==='review';
}

function isAggChipFriendlyField(field){
  const haystack=`${String(field && field.key || '')} ${String(field && field.label || '')}`.toLowerCase();
  return /わかった|りかい|できた|やり方|方法|工夫|考え|理由|まとめ|次|ふりかえり|review|method/.test(haystack);
}

function collectAggChipLabels(rows){
  const labels=[];
  (rows||[]).forEach(row=>{
    (row.fields||[]).forEach(field=>{
      const value=formatAggAnswerValue((row.answersMap||{})[field.key]);
      if(!value || !isAggChipFriendlyField(field)) return;
      labels.push(field.label||field.key||'項目');
    });
  });
  return Array.from(new Set(labels));
}

function matchesAggPresetField(field,preset){
  const categories=((field && field.categories) || []).filter(Boolean);
  if(categories.includes(preset)) return true;
  const haystack=`${String(field.key||'')} ${String(field.label||'')} ${String(field.type||'')}`.toLowerCase();
  const match=(words)=>words.some(word=>haystack.includes(word));
  if(preset==='knowledge'){
    return match(['理解','できた','わかった','まとめ','用語','知識','技能','eval','summary']);
  }
  if(preset==='thinking'){
    return match(['ふりかえり','review','やり方','方法','工夫','理由','考え','説明','まとめ']);
  }
  if(preset==='attitude'){
    return match(['めあて','goal','ふりかえり','review','次','がんば','取り組','やり方','方法']);
  }
  return false;
}

function renderAggFieldValue(row, field){
  const value=field.source==='review'
    ? String(row.review||'')
    : field.source==='comment'
      ? String(row.comment||'')
      : formatAggAnswerValue((row.answersMap||{})[field.key]);
  if(!value) return '';
  if(isAggReviewField(field)) return renderTeacherReviewText_(value, row.fields||[field]);
  return esc(value).replace(/\n/g,'<br>');
}

function renderAggCardFieldValue(row, field){

function buildAggProcessingRows(rows, periods, category){
  const grouped=new Map();
  rows.forEach(row=>{
    const key=String(row.num||'');
    if(!grouped.has(key)){
      grouped.set(key,{
        unitId: row.unitId || '',
        unitName: row.unitName || '',
        subject: row.subject || '',
        num: row.num,
        name: row.name || '',
        periodSummary: [],
        date: row.date || '',
        rank: row.rank || '',
        assessment: row.teacherAssessment || {knowledge:'',thinking:'',attitude:'',memo:''},
        periodMap: {},
      });
    }
    const item=grouped.get(key);
    item.periodMap[String(row.period||'')] = row;
    if(row.period) item.periodSummary.push(`${row.period}時間目`);
    if(!item.rank && row.rank) item.rank=row.rank;
    if(!item.date && row.date) item.date=row.date;
    if(row.teacherAssessment) item.assessment=row.teacherAssessment;
  });
  return Array.from(grouped.values())
    .sort((a,b)=>(Number(a.num)||0)-(Number(b.num)||0))
    .map(row=>buildAggProcessingRow(row, periods, category));
}

function buildAggProcessingRow(row, periods, category){
  return {
    ...row,
    periodSummary: Array.from(new Set(row.periodSummary||[])).join(' / '),
    periods,
    category,
  };
}

function collectAggCategoryEntries(row, category){
  const sourceRows=row.entries||[row];
  const explicit=sourceRows.flatMap(sourceRow=>(sourceRow.fields||[])
    .filter(field=>(((field && field.categories) || []).includes(category)))
    .map(field=>({
      label:field.label||field.key,
      value:String((sourceRow.answersMap||{})[field.key]||'').trim(),
      key:field.key,
      emoji:field.emoji||'',
      explicit:true,
    })))
    .filter(entry=>entry.value);
  if(explicit.length) return explicit;
  return sourceRows.flatMap(sourceRow=>(sourceRow.fields||[])
    .filter(field=>matchesAggPresetField(field, category))
    .map(field=>({
      label:field.label||field.key,
      value:String((sourceRow.answersMap||{})[field.key]||'').trim(),
      key:field.key,
      emoji:field.emoji||'',
      explicit:false,
    })))
    .filter(entry=>entry.value);
}

  const strong=rows
    .filter(r=>((Object.prototype.hasOwnProperty.call(scoreMap, r.rank) ? scoreMap[r.rank] : -1))>=4)
    .sort((a,b)=>((Object.prototype.hasOwnProperty.call(scoreMap, b.rank) ? scoreMap[b.rank] : -1)-(Object.prototype.hasOwnProperty.call(scoreMap, a.rank) ? scoreMap[a.rank] : -1))||String(b.review||'').length-String(a.review||'').length)
    .slice(0,3);
  const support=rows
    .filter(r=>r.rank&&['C','C+','B'].includes(r.rank))
    .sort((a,b)=>((Object.prototype.hasOwnProperty.call(scoreMap, a.rank) ? scoreMap[a.rank] : 99)-(Object.prototype.hasOwnProperty.call(scoreMap, b.rank) ? scoreMap[b.rank] : 99))||String(a.review||'').length-String(b.review||'').length)
    .slice(0,3);
  const rankCounts={};
  rows.forEach(r=>{ if(r.rank) rankCounts[r.rank]=(rankCounts[r.rank]||0)+1; });
  const rankOrder=['S+','S','A+','A','B+','B','C+','C'];
  const understandingStats=collectAggregateUnderstandingStats(rows);

  box.innerHTML=`
    <div class="insight-grid">
      <div class="insight-box">
        <div class="insight-k">対象人数</div>
        <div class="insight-v">${rows.length}</div>

      </div>
      <div class="insight-box">
        <div class="insight-k">理解度</div>
        <div class="insight-v">${understandingStats.label}</div>
        <div class="insight-sub">${understandingStats.sub}</div>
      </div>
      <div class="insight-box">
        <div class="insight-k">A以上</div>
        <div class="insight-v">${rows.filter(r=>((Object.prototype.hasOwnProperty.call(scoreMap, r.rank) ? scoreMap[r.rank] : -1))>=4).length}</div>
        <div class="insight-sub">方略や次への改善が見える記録</div>
      </div>
      <div class="insight-box">
        <div class="insight-k">要支援候補</div>
        <div class="insight-v">${rows.filter(r=>r.rank&&['C','C+','B'].includes(r.rank)).length}</div>
        <div class="insight-sub">短文・感想止まりが中心の記録</div>
      </div>
    </div>
    <div class="analysis-grid">
      <div class="analysis-card">
        <h3>ランク分布</h3>
        <div class="dist-row">${rankOrder.filter(rank=>rankCounts[rank]).map(rank=>`<span class="dist-chip">${rank}<span class="n">${rankCounts[rank]}</span></span>`).join('')||'<span class="insight-sub">ランク未生成</span>'}</div>
      </div>
      <div class="analysis-card">
        <h3>よく書けている児童</h3>
        <ul class="mini-list">${strong.map(row=>`<li>${row.num} ${esc(row.name||'')} ${row.rank} / ${renderTeacherReviewText_(shortText(row.review,38),row.fields||[])}</li>`).join('')||'<li>まだ候補がありません</li>'}</ul>
      </div>
      <div class="analysis-card">
        <h3>支援を見たい児童</h3>
        <ul class="mini-list">${support.map(row=>`<li>${row.num} ${esc(row.name||'')} ${row.rank} / ${renderTeacherReviewText_(shortText(row.review,38),row.fields||[])}</li>`).join('')||'<li>候補はありません</li>'}</ul>
      </div>
    </div>`;
}

function collectAggregateUnderstandingStats(rows){
  const counts={good:0, mid:0, support:0, none:0};
  rows.forEach(row=>{
    const value=getAggregateUnderstandingValue(row);
    if(!value){ counts.none++; return; }
    if(/よく/.test(value)){ counts.good++; return; }
    if(/だいたい/.test(value)){ counts.mid++; return; }
    if(/あまり|わから/.test(value)){ counts.support++; return; }
    counts.none++;
  });
  const total=rows.length||0;
  const understood=counts.good+counts.mid;
  if(!total || !understood){
    return { label:'未入力多め', sub:'理解度の入力がまだ少ないです' };
  }
  const ratio=Math.round((understood/total)*100);
  return {
    label:`${ratio}%`,
    sub:`よく ${counts.good}人 / だいたい ${counts.mid}人 / 支援 ${counts.support}人`,
  };
}

function getAggregateUnderstandingValue(row){
  const fields=Array.isArray(row && row.fields)?row.fields:[];
  const target=fields.find(field=>{
    const text=`${field && field.key || ''} ${field && field.label || ''} ${field && field.type || ''}`.toLowerCase();
    return /理解|りかい|わか|自己評価|じこひょうか|達成|たっせい|self|score|check|eval/.test(text);
  });
  if(!target) return '';
  return formatAggAnswerValue((row.answersMap||{})[target.key]);
}

function shortText(text,max){
  const s=String(text||'').replace(/\s+/g,' ').trim();
  if(!s) return '記録なし';
  return s.length>max?s.slice(0,max)+'…':s;
}

function formatDisplayDate(value){
  if(!value) return '';
  const text=String(value);
  const m=text.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[1]}/${m[2]}/${m[3]}`;
  return text;
}

function formatDisplayDateTime(value){
  if(!value) return '';
  const d=new Date(value);
  if(Number.isNaN(d.getTime())) return String(value);
  const yyyy=d.getFullYear();
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const hh=String(d.getHours()).padStart(2,'0');
  const mi=String(d.getMinutes()).padStart(2,'0');
  const ss=String(d.getSeconds()).padStart(2,'0');
  return `${yyyy}/${mm}/${dd} ${hh}:${mi}:${ss}`;
}

function formatDurationShort(ms){
  const num=Number(ms||0);
  if(!Number.isFinite(num)||num<=0) return '';
  if(num<1000) return `${Math.round(num)}ms`;
  if(num<10000) return `${(num/1000).toFixed(1)}s`;
  return `${Math.round(num/1000)}s`;
}

function renderStudentAiState(student){
  if(!(student && student.submitted)){
    return student && student.review ? '✍️記入中' : '';
  }
  if(String(student && student.draftStatus || '')==='draft' && String(student && student.draftComment || '').trim()){
    return '📝 AI下書きあり';
  }
  if(String(student && student.draftStatus || '')==='returned' && String(student && student.comment || '').trim()){
    return '📤 返却済';
  }
  const status=String(student.aiStatus||'');
  const retry=Number(student.aiRetryCount||0);
  const retryLabel=retry>0?` / retry ${retry}`:'';
  if(status==='done'){
    return `✅ AI完了${retryLabel?`<br><span style="font-size:11px;color:#607D8B;">retry ${retry}</span>`:''}`;
  }
  if(status==='error'){
    const msg=esc(String(student.aiError||'AI失敗'));
    return `⚠️ AI失敗<br><span style="font-size:11px;color:#C62828;">${msg}${retryLabel}</span>`;
  }
  if(status==='processing'){
    return `🤖 AI処理中${retryLabel?`<br><span style="font-size:11px;color:#607D8B;">retry ${retry}</span>`:''}`;
  }
  if(status==='pending'){
    return `⏳ AI待ち${retryLabel?`<br><span style="font-size:11px;color:#607D8B;">retry ${retry}</span>`:''}`;
  }
  return '✅提出済';
}

function calcElapsedMs(value){
  if(!value) return 0;
  const startedAt=new Date(value).getTime();
  if(Number.isNaN(startedAt)) return 0;
  return Math.max(0, Date.now()-startedAt);
}

function requestUnitSummaryReport(options){
  const unitId=String(options && options.unitId || '').trim();
  const period=String(options && options.period || '').trim();
  const box=document.getElementById(options && options.boxId || '');
  if(!unitId||!box){
    showToast('レポート対象が見つかりません',{tone:'error'});
    return;
  }
  box.style.display='block';
  box.classList.add('ready');
  box.textContent=options && options.loadingText || '🤖 レポートを生成中…';
  google.script.run
    .withSuccessHandler(res=>{
      if(!res.ok){
        box.textContent='エラー:'+res.error;
        showToast(options && options.failureToast || 'レポートの生成に失敗しました',{tone:'error'});
        return;
      }
      const title=typeof (options && options.successTitle)==='function' ? options.successTitle(res) : `【${res.unitName}】レポート`;
      box.textContent=`${title}\n\n${res.summary}`;
      showToast(options && options.successToast || 'レポートを生成しました',{tone:'success'});
    })
    .withFailureHandler(err=>{
      box.textContent='エラー:'+((err && err.message)||err||(options && options.failureToast)||'レポートの生成に失敗しました');
      showToast(options && options.failureToast || 'レポートの生成に失敗しました',{tone:'error'});
    })
    .generateUnitSummary(unitId, period);
}

}

function generateGradingDrafts(){
  if(!isTeacherAiReadyOnClient_()){
    showToast('AI未設定です。プロンプトタブでAPIキーを保存してください',{tone:'error'});
    return;
  }
  const mode=(document.getElementById('gradeMode')||{}).value||'unit';
  const subject=(document.getElementById('gradeSubject')||{}).value||'';
  const unitId=(document.getElementById('gradeUnit')||{}).value||'';
  const category=(document.getElementById('gradeCategory')||{}).value||'thinking';
  const period=(document.getElementById('gradePeriod')||{}).value||'';
  if(mode==='unit' && !unitId){
    showToast('単元を選択してください');
    return;
  }
  if(mode==='subject' && !subject){
    showToast('教科を選択してください');
    return;
  }
  const confirmMessage=mode==='subject'
    ? '選択中の教科の各単元について、未設定の児童だけAI仮評定を入れます。よいですか？'
    : '現在の観点について、未設定の児童だけAI仮評定を入れます。よいですか？';
  if(!confirm(confirmMessage)) return;
  const debugBox=document.getElementById('gradeDebug');
  if(debugBox) debugBox.textContent='AI仮評定を作成中…';
  const runner=google.script.run
    .withSuccessHandler(res=>{
      if(!(res && res.ok)){
        if(debugBox) debugBox.textContent='AI仮評定の作成に失敗しました: '+(res && res.error || 'unknown');
        showToast('AI仮評定の作成に失敗しました',{tone:'error'});
        return;
      }
      loadAgg();
      const warning=res.warning ? ` / 一部失敗 ${res.warning}` : '';
      const summary=`AI仮評定を反映しました。対象 ${res.targetCount||0}人 / 反映 ${res.updatedCount||0}人 / 既存あり ${res.skippedCount||0}人${warning}`;
      if(debugBox) debugBox.textContent=summary;
      showToast(summary,{tone:warning?'info':'success',duration:4200});
    })
    .withFailureHandler(err=>{
      const message=(err && err.message)||err||'unknown';
      if(debugBox) debugBox.textContent='AI仮評定の作成に失敗しました: '+message;
      showToast('AI仮評定の作成に失敗しました: '+message,{tone:'error',duration:4200});
    });
  if(mode==='subject'){
    runner.generateTeacherAssessmentDraftsBySubject(subject, category, true);
    return;
  }
  runner.generateTeacherAssessmentDrafts(unitId, category, period, true);
}

function exportGradingCsv(){
  const mode=(document.getElementById('gradeMode')||{}).value||'unit';
  const subject=(document.getElementById('gradeSubject')||{}).value||'';
  const unitId=(document.getElementById('gradeUnit')||{}).value||'';
  const period=(document.getElementById('gradePeriod')||{}).value||'';
  const category=(document.getElementById('gradeCategory')||{}).value||'thinking';
  const rows=buildGradingCsvRows(mode, subject, unitId, period, category);
  if(!rows.length){
    alert('CSVに出力できる評定データがありません');
    return;
  }
  const csv=rows.map(toCsvLine).join('\r\n');
  const filename=[
    'jibun-matome-grading',
    mode==='subject' ? sanitizeClientFileName(subject||'subject') : sanitizeClientFileName(getUnitNameById(unitId)||'unit'),
    category,
    new Date().toISOString().replace(/[:.]/g,'-'),
  ].join('_')+'.csv';
  downloadCsv(csv, filename);
  alert(`評定CSVを出力しました（${rows.length-1}件）`);
}

function buildGradingCsvRows(mode, subject, unitId, period, category){
  if(mode==='subject'){
    if(!subject) return [];
    const units=getGradingUnitsForSubject(subject);
    const rows=buildGradingSubjectRows(subject, category);
    return [
      ['教科','番号','名前'].concat(units.map(unit=>unit.name||'')),
    ].concat(rows.map(row=>[
      subject,
      row.num||'',
      row.name||'',
    ].concat(row.unitEntries.map(unitEntry=>String((unitEntry.assessment||{})[category]||'')))));
  }

  if(!unitId) return [];
  const filtered=allAggData.filter(row=>{
    if(subject&&String(row.subject||'')!==String(subject)) return false;
    if(unitId&&String(row.unitId||'')!==String(unitId)) return false;
    if(period&&String(row.period||'')!==String(period)) return false;
    return true;
  }).sort((a,b)=>{
    const numDiff=(Number(a.num)||0)-(Number(b.num)||0);
    if(numDiff!==0) return numDiff;
    return String(a.name||'').localeCompare(String(b.name||''),'ja');
  });
  const periods=uniqueValues(allAggData
    .filter(row=>(!subject||String(row.subject||'')===String(subject)) && (!unitId||String(row.unitId||'')===String(unitId)))
    .map(row=>row.period)).sort((a,b)=>a-b);
  const processedRows=buildAggProcessingRows(filtered, periods, category);
  return [
    ['教科','単元','番号','名前','評定','ランク','時間別根拠'],
  ].concat(processedRows.map(row=>[
    row.subject||'',
    row.unitName||'',
    row.num||'',
    row.name||'',
    String((row.assessment||{})[category]||''),
    row.rank||'',
    periods.map(currentPeriod=>buildGradingEvidenceTextFromRow(row.periodMap[currentPeriod], category, currentPeriod)).filter(Boolean).join('\n\n'),
  ]));
}

function buildGradingEvidenceTextFromRow(row, category, currentPeriod){
  if(!row) return '';
  const entries=collectAggCategoryEntries(row, category).map(entry=>`${entry.label}: ${entry.value}`);
  const body=entries.length ? entries.join(' / ') : String(row.review||'').trim();
  if(!body) return '';
  return `${currentPeriod}時間目: ${body}`;
}

function toCsvLine(cols){
  return (cols||[]).map(value=>{
    const text=String(value == null ? '' : value);
    return `"${text.replace(/"/g,'""')}"`;
  }).join(',');
}

function downloadCsv(csv, filename){
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename||'jibun-matome.csv';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function sanitizeClientFileName(value){
  return String(value||'').trim().replace(/[\\/:*?"<>|]+/g,'-').replace(/\s+/g,'-')||'data';
}

function getUnitNameById(unitId){
  const found=allUnits.find(unit=>String(unit.id||'')===String(unitId||''));
  return found ? found.name||'' : '';
}

function renderMedal(medal,color){
  if(!medal) return '';
  if(['🥇','🥈','🥉'].includes(medal)) return `<span style="font-size:18px;">${medal}</span>`;
  return `<span class="medal-num" style="background:${color||'#999'}">${medal.replace('th','')}</span>`;
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s){
  return esc(s).replace(/'/g,'&#39;');
}
function escTextArea(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
}
