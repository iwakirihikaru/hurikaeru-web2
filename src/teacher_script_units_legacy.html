    setLessonFieldEditorReadonly_(true);
    document.getElementById('unitFormCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
// =====================================
//  単元 保存・編集・削除
// =====================================
function editUnit(id) {
    var u = allUnits.find(function (u) { return u.id == id; });
    if (!u)
        return;
    resetLessonFieldEditState_();
    resetCustomFieldEditor();
    document.getElementById('editUnitId').value = id;
    document.getElementById('fName').value = u.name;
    document.getElementById('fSubject').value = u.subject;
    document.getElementById('fMax').value = u.maxPeriod;
    editingFields = (u.fields || []).map(function (f) { return (__assign({}, f)); });
    renderFieldList();
    renderPresetBtns();
    document.getElementById('unitFormTitle').textContent = '✏️ 単元を編集';
    document.getElementById('unitSaveBtn').textContent = '更新する';
    document.getElementById('unitSaveBtn').dataset.defaultLabel = '更新する';
    updateUnitSaveStartButton_('更新して授業開始', false);
    document.getElementById('unitCancelBtn').style.display = 'inline-block';
    document.getElementById('unitFormCard').scrollIntoView({ behavior: 'smooth' });
}
function cancelEdit() {
    if (unitSaveState.busy)
        return;
    resetLessonFieldEditState_();
    document.getElementById('editUnitId').value = '';
    document.getElementById('fName').value = '';
    document.getElementById('fSubject').value = '算数';
    document.getElementById('fMax').value = '10';
    resetCustomFieldEditor();
    applySubjectDefault(document.getElementById('fSubject').value);
    renderFieldList();
    renderPresetBtns();
    document.getElementById('unitFormTitle').textContent = '➕ 新しい単元を追加';
    document.getElementById('unitSaveBtn').textContent = '保存する';
    document.getElementById('unitSaveBtn').dataset.defaultLabel = '保存する';
    updateUnitSaveStartButton_('保存して授業開始', false);
    document.getElementById('unitCancelBtn').style.display = 'none';
    setUnitSaveMeta('');
}
function readUnitMaxPeriod_() {
    var raw = String(document.getElementById('fMax').value || '').trim();
    if (raw === '')
        return { ok: false, message: '最大時間数を入力してください。0 は無制限です。' };
    if (!/^\d+$/.test(raw))
        return { ok: false, message: '最大時間数は 0〜99 の整数で入力してください。' };
    var value = parseInt(raw, 10);
    if (value < 0 || value > 99)
        return { ok: false, message: '最大時間数は 0〜99 の整数で入力してください。' };
    return { ok: true, value: value };
}
function setUnitSaveMeta(message, state) {
    var meta = document.getElementById('unitSaveMeta');
    if (!meta)
        return;
    meta.textContent = String(message || '');
    meta.classList.remove('is-busy', 'is-error', 'is-success');
    if (state)
        meta.classList.add("is-".concat(state));
}
function setUnitSaveBusy_(isBusy, buttonLabel) {
    unitSaveState.busy = Boolean(isBusy);
    var saveBtn = document.getElementById('unitSaveBtn');
    var cancelBtn = document.getElementById('unitCancelBtn');
    var jumpBtn = document.querySelector('.btn-jump-add');
    var controls = document.querySelectorAll('#unitFormCard input,#unitFormCard select,#unitFormCard textarea,#unitFormCard button');
    controls.forEach(function (control) { control.disabled = Boolean(isBusy); });
    if (jumpBtn)
        jumpBtn.disabled = Boolean(isBusy);
    if (saveBtn) {
        if (!saveBtn.dataset.defaultLabel)
            saveBtn.dataset.defaultLabel = saveBtn.textContent || '保存する';
        saveBtn.textContent = isBusy ? (buttonLabel || '保存中…') : (saveBtn.dataset.defaultLabel || '保存する');
    }
    if (cancelBtn && !isBusy && cancelBtn.style.display !== 'none')
        cancelBtn.disabled = false;
}
function buildUnitSavePayload_() {
    var id = document.getElementById('editUnitId').value;
    var name = document.getElementById('fName').value.trim();
    var subject = document.getElementById('fSubject').value;
    var maxResult = readUnitMaxPeriod_();
    if (!name) {
        alert('単元名を入力してください');
        return null;
    }
    if (!maxResult.ok) {
        alert(maxResult.message);
        setUnitSaveMeta(maxResult.message, 'error');
        return null;
    }
    return {
        id: id,
        name: name,
        subject: subject,
        maxPeriod: maxResult.value,
        fields: editingFields.map(function (field) { return (__assign({}, field)); }),
    };
}
function applySavedUnitLocally_(savedUnit) {
    if (!savedUnit || !savedUnit.id)
        return;
    var idx = allUnits.findIndex(function (unit) { return String(unit.id) === String(savedUnit.id); });
    if (idx >= 0)
        allUnits[idx] = savedUnit;
    else
        allUnits.unshift(savedUnit);
    if (preloadCache.aggregate)
        preloadCache.aggregate = null;
    if (preloadCache.status)
        clearTeacherStatusPreloadCache_(true);
    persistTeacherPreloadCache_();
    refreshUnitUiAfterMutation_();
}
function invalidateUnitRelatedClientState_(unitId) {
    var normalized = String(unitId || '').trim();
    if (normalized && unitProgressByUnitId && typeof unitProgressByUnitId === 'object') {
        delete unitProgressByUnitId[normalized];
    }
    if (preloadCache.aggregate)
        preloadCache.aggregate = null;
    if (preloadCache.portfolio)
        preloadCache.portfolio = null;
    if (String(activeUnitId || '') === normalized) {
        activeUnitId = null;
        activePeriod = 0;
        latestStatusRows = [];
        latestStatusMeta = {};
        teacherDraftLocalState = {};
        clearTeacherStatusPreloadCache_(true);
    }
    else if (preloadCache.status) {
        clearTeacherStatusPreloadCache_(true);
    }
    if (Array.isArray(allAggData) && normalized) {
        allAggData = allAggData.filter(function (row) { return String(row.unitId || '') !== normalized; });
    }
    if (typeof allAggMeta === 'object' && allAggMeta) {
        allAggMeta = { scope: 'unknown', fetchedAt: 0, unitId: '', subject: '' };
    }
    persistTeacherPreloadCache_();
}
function removeUnitLocally_(unitId) {
    var normalized = String(unitId || '').trim();
    if (!normalized)
        return false;
    var nextUnits = (allUnits || []).filter(function (unit) { return String(unit.id) !== normalized; });
    var removed = nextUnits.length !== allUnits.length;
    if (!removed)
        return false;
    allUnits = nextUnits;
    invalidateUnitRelatedClientState_(normalized);
    if (String(document.getElementById('editUnitId').value || '') === normalized) {
        cancelEdit();
    }
    refreshUnitUiAfterMutation_();
    return true;
}
function refreshUnitUiAfterMutation_() {
    renderUnitList();
    populateUnitSelects();
    if (typeof populateGradingSelects === 'function')
        populateGradingSelects();
    var startUnit = document.getElementById('startUnit');
    if (startUnit) {
        var currentValue_1 = String(startUnit.value || '').trim();
        var exists = allUnits.some(function (unit) { return String(unit.id) === currentValue_1; });
        if (currentValue_1 && !exists) {
            startUnit.value = '';
        }
    }
    updatePeriodSelect();
}
function buildUnitMutationMessage_(prefix) {
    var summaryEl = document.getElementById('unitListSummary');
    var summaryText = summaryEl ? String(summaryEl.textContent || '').trim() : '';
    return summaryText ? "".concat(prefix, " ").concat(summaryText) : prefix;
}
function finishUnitSave_(savedUnit, toastMessage) {
    applySavedUnitLocally_(savedUnit);
    cancelEdit();
    var message = buildUnitMutationMessage_(toastMessage || '単元を保存しました。');
    setUnitSaveMeta(message, 'success');
    showToast(message, { duration: 3600 });
    loadInit();
}
function startSavedUnitLesson_(savedUnit) {
    if (!(savedUnit && savedUnit.id))
        return;
    saveUiState({ curriculumSubtab: 'units' });
    var tabBtn = document.querySelector(".tab[onclick*='status']");
    switchTab('status', tabBtn || null);
    setControlValue('startSubjectFilter', savedUnit.subject || '');
    setControlValue('startUnitSearch', '');
    saveUiState({
        startSubjectFilter: savedUnit.subject || '',
        startUnitSearch: '',
    });
    populateUnitSelects();
    var unitSel = document.getElementById('startUnit');
    if (unitSel)
        unitSel.value = String(savedUnit.id);
    updatePeriodSelect();
    startLesson();
}
function saveUnit(startAfterSave) {
    if (unitSaveState.busy)
        return;
    var isLessonOnly = lessonFieldEditState.mode === 'lesson';
    var payload = isLessonOnly
        ? {
            unitId: lessonFieldEditState.unitId,
            period: lessonFieldEditState.period,
            fields: editingFields.map(function (field) { return (__assign({}, field)); }),
        }
        : buildUnitSavePayload_();
    if (!payload)
        return;
    if (isLessonOnly) {
        setUnitSaveBusy_(true, '保存中…');
        setUnitSaveMeta('この時間の項目を保存しています…', 'busy');
        google.script.run
            .withSuccessHandler(function (res) {
            setUnitSaveBusy_(false);
            if (!(res && res.ok)) {
                var msg = res && res.error || 'この時間の項目保存に失敗しました。';
                setUnitSaveMeta(msg, 'error');
                showToast(msg);
                return;
            }
            cancelEdit();
            setUnitSaveMeta('この時間の項目を保存しました。', 'success');
            showToast('この時間だけ項目を更新しました');
            loadInit();
            loadStatusInit({ startPolling: true });
        })
            .withFailureHandler(function (err) {
            setUnitSaveBusy_(false);
            var msg = err && err.message || 'この時間の項目保存に失敗しました。';
            setUnitSaveMeta(msg, 'error');
            showToast(msg);
        })
            .saveLessonFieldConfig(payload.unitId, payload.period, payload.fields);
        return;
    }
    unitSaveState.requestToken = "unit_".concat(Date.now(), "_").concat(Math.random().toString(36).slice(2, 8));
    payload.requestToken = unitSaveState.requestToken;
    payload.startAfterSave = Boolean(startAfterSave);
    var isEdit = Boolean(String(payload.id || '').trim());
    var nextAction = Boolean(startAfterSave)
        ? (isEdit ? '更新して開始中…' : '保存して開始中…')
        : (isEdit ? '更新中…' : '保存中…');
    setUnitSaveBusy_(true, nextAction);
    setUnitSaveMeta(isEdit ? '単元を更新しています…' : '単元を保存しています…', 'busy');
    google.script.run
        .withSuccessHandler(function (res) {
        setUnitSaveBusy_(false);
        if (!(res && res.ok && res.unit)) {
            var msg = res && res.error || '単元の保存に失敗しました。';
            setUnitSaveMeta(msg, 'error');
            showToast(msg);
            return;
        }
        finishUnitSave_(res.unit, isEdit ? '単元を更新しました' : '単元を保存しました');
        if (payload.startAfterSave) {
            startSavedUnitLesson_(res.unit);
        }
    })
        .withFailureHandler(function (err) {
        setUnitSaveBusy_(false);
        var msg = err && err.message || '単元の保存に失敗しました。';
        setUnitSaveMeta(msg, 'error');
        showToast(msg);
    })
        .saveUnit(payload);
}
function askDelete(id, name) {
    delTargetId = id;
    setDeleteModalBusy_(false);
    document.getElementById('delMsg').textContent = "\u300C".concat(name, "\u300D\u3092\u524A\u9664\u3057\u307E\u3059\u3002\u6388\u696D\u30C7\u30FC\u30BF\u306F\u6B8B\u308A\u307E\u3059\u3002");
    document.getElementById('delModal').classList.add('show');
}
function setDeleteModalBusy_(busy) {
    var confirmBtn = document.getElementById('delConfirmBtn');
    var cancelBtn = document.getElementById('delCancelBtn');
    if (confirmBtn) {
        if (!confirmBtn.dataset.defaultLabel)
            confirmBtn.dataset.defaultLabel = confirmBtn.textContent || '削除する';
        confirmBtn.disabled = Boolean(busy);
        confirmBtn.textContent = busy ? '削除中…' : confirmBtn.dataset.defaultLabel;
    }
    if (cancelBtn)
        cancelBtn.disabled = Boolean(busy);
}
function confirmDelete() {
    var targetId = String(delTargetId || '').trim();
    if (!targetId)
        return;
    setDeleteModalBusy_(true);
    setUnitSaveMeta('単元を削除しています…', 'busy');
    google.script.run
        .withSuccessHandler(function (res) {
        if (!(res && res.ok)) {
            var msg = '単元の削除に失敗しました。';
            setDeleteModalBusy_(false);
            setUnitSaveMeta(msg, 'error');
            showToast(msg);
            return;
        }
        closeModal();
        removeUnitLocally_(targetId);
        var message = buildUnitMutationMessage_('単元を削除しました。');
        setUnitSaveMeta(message, 'success');
        showToast(message, { duration: 3600 });
        loadInit();
    })
        .withFailureHandler(function (err) {
        var msg = err && err.message || '単元の削除に失敗しました。';
        setDeleteModalBusy_(false);
        setUnitSaveMeta(msg, 'error');
        showToast(msg);
    })
        .deleteUnit(targetId);
}
function closeModal() {
    setDeleteModalBusy_(false);
    document.getElementById('delModal').classList.remove('show');
}
</script>
