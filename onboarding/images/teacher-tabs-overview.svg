<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1280" viewBox="0 0 1600 1280" role="img" aria-labelledby="title desc">
  <title id="title">先生画面タブ早見図</title>
  <desc id="desc">先生画面の9つのタブと、各タブでできることをまとめた図</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4ead9"/>
      <stop offset="100%" stop-color="#fffaf1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#b7a388" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1600" height="1280" fill="url(#bg)"/>
  <text x="90" y="110" font-family="'Yu Gothic UI','Hiragino Sans',sans-serif" font-size="56" font-weight="700" fill="#21313a">先生画面 タブ早見図</text>
  <text x="90" y="160" font-family="'Yu Gothic UI','Hiragino Sans',sans-serif" font-size="26" fill="#5e6c72">最初は「単元設定」→「授業状況」。授業後は「単元記録」「ポートフォリオ」をよく使います。</text>

  <g filter="url(#shadow)">
    <rect x="80" y="210" rx="28" ry="28" width="1420" height="980" fill="#fffdf9" stroke="#d9c7ae" stroke-width="2"/>
  </g>

  <g font-family="'Yu Gothic UI','Hiragino Sans',sans-serif">
    <g>
      <rect x="120" y="270" rx="24" ry="24" width="400" height="180" fill="#e9f7f3" stroke="#9ecfbd" stroke-width="2"/>
      <text x="150" y="325" font-size="34" font-weight="700" fill="#155d4f">📡 授業状況</text>
      <text x="150" y="375" font-size="24" fill="#294047">授業開始、提出確認、</text>
      <text x="150" y="411" font-size="24" fill="#294047">AI下書き返却、メダル発表</text>
    </g>
    <g>
      <rect x="600" y="270" rx="24" ry="24" width="400" height="180" fill="#eef4ff" stroke="#a9c0ef" stroke-width="2"/>
      <text x="630" y="325" font-size="34" font-weight="700" fill="#2c4b7d">📚 単元設定</text>
      <text x="630" y="375" font-size="24" fill="#294047">単元名、教科、時間数、</text>
      <text x="630" y="411" font-size="24" fill="#294047">記入項目を作る</text>
    </g>
    <g>
      <rect x="1080" y="270" rx="24" ry="24" width="380" height="180" fill="#fff3e9" stroke="#e6c39e" stroke-width="2"/>
      <text x="1110" y="325" font-size="34" font-weight="700" fill="#8a4c1d">👥 名簿</text>
      <text x="1110" y="375" font-size="24" fill="#294047">出席番号、氏名、</text>
      <text x="1110" y="411" font-size="24" fill="#294047">在籍ON/OFFを整える</text>
    </g>

    <g>
      <rect x="120" y="490" rx="24" ry="24" width="400" height="180" fill="#f5efff" stroke="#c8b6ec" stroke-width="2"/>
      <text x="150" y="545" font-size="34" font-weight="700" fill="#5a438d">🏫 教科デフォルト</text>
      <text x="150" y="595" font-size="24" fill="#294047">教科ごとの定番項目を作り、</text>
      <text x="150" y="631" font-size="24" fill="#294047">新しい単元へ引き継ぐ</text>
    </g>
    <g>
      <rect x="600" y="490" rx="24" ry="24" width="400" height="180" fill="#fff0f3" stroke="#e6b3c0" stroke-width="2"/>
      <text x="630" y="545" font-size="34" font-weight="700" fill="#9b3d5f">🤖 プロンプト</text>
      <text x="630" y="595" font-size="24" fill="#294047">AIコメントや評定の設定、</text>
      <text x="630" y="631" font-size="24" fill="#294047">メダル人数を調整</text>
    </g>
    <g>
      <rect x="1080" y="490" rx="24" ry="24" width="380" height="180" fill="#f2f2f2" stroke="#cfcfcf" stroke-width="2"/>
      <text x="1110" y="545" font-size="34" font-weight="700" fill="#4c4c4c">🪵 ログ</text>
      <text x="1110" y="595" font-size="24" fill="#294047">AI失敗の確認、再実行、</text>
      <text x="1110" y="631" font-size="24" fill="#294047">キュー確認</text>
    </g>

    <g>
      <rect x="120" y="710" rx="24" ry="24" width="400" height="180" fill="#eefaf2" stroke="#b6d8bf" stroke-width="2"/>
      <text x="150" y="765" font-size="34" font-weight="700" fill="#2b6a43">🧒 ポートフォリオ</text>
      <text x="150" y="815" font-size="24" fill="#294047">児童1人分の記録をまとめて見て、</text>
      <text x="150" y="851" font-size="24" fill="#294047">AI所見下書きを作る</text>
    </g>
    <g>
      <rect x="600" y="710" rx="24" ry="24" width="400" height="180" fill="#fff9e8" stroke="#e1d193" stroke-width="2"/>
      <text x="630" y="765" font-size="34" font-weight="700" fill="#8a6a10">📚 単元記録</text>
      <text x="630" y="815" font-size="24" fill="#294047">クラス全体の記録確認、</text>
      <text x="630" y="851" font-size="24" fill="#294047">CSV出力、単元レポート生成</text>
    </g>
    <g>
      <rect x="1080" y="710" rx="24" ry="24" width="380" height="180" fill="#edf7ff" stroke="#afcfe6" stroke-width="2"/>
      <text x="1110" y="765" font-size="34" font-weight="700" fill="#2a5c84">📝 評定する</text>
      <text x="1110" y="815" font-size="24" fill="#294047">観点ごとの評定入力、</text>
      <text x="1110" y="851" font-size="24" fill="#294047">AI仮評定、CSV出力</text>
    </g>
  </g>

  <g font-family="'Yu Gothic UI','Hiragino Sans',sans-serif">
    <rect x="120" y="950" rx="24" ry="24" width="1340" height="180" fill="#21313a"/>
    <text x="160" y="1018" font-size="32" font-weight="700" fill="#ffffff">おすすめの見方</text>
    <text x="160" y="1070" font-size="25" fill="#dfe9ec">1. はじめに「単元設定」で授業の土台を作る</text>
    <text x="160" y="1108" font-size="25" fill="#dfe9ec">2. 授業中は「授業状況」で進み具合を見る</text>
    <text x="760" y="1070" font-size="25" fill="#dfe9ec">3. 授業後は「単元記録」「ポートフォリオ」で振り返る</text>
    <text x="760" y="1108" font-size="25" fill="#dfe9ec">4. 評定が必要な時期に「評定する」を使う</text>
  </g>
</svg>
