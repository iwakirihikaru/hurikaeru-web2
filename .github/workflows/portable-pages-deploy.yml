name: Portable Pages Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'portable-src/**'
      - 'scripts/build-static-port.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/portable-pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: portable-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable
        run: node ./scripts/build-static-port.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portable/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
